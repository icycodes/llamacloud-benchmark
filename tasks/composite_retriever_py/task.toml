version = "1.0"

[metadata]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_LOG = "debug"
POCHI_API_KEY = "${POCHI_API_KEY}"
LLAMA_CLOUD_API_KEY = "${LLAMA_CLOUD_API_KEY}"
LLAMA_CLOUD_PROJECT_NAME = "${LLAMA_CLOUD_PROJECT_NAME}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
POCHI_LOG = "debug"
LLAMA_CLOUD_API_KEY = "${LLAMA_CLOUD_API_KEY}"
LLAMA_CLOUD_PROJECT_NAME = "${LLAMA_CLOUD_PROJECT_NAME}"

[solution.env]

