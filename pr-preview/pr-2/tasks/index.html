ndex's managed RAG-as-a-Service platform. Its agentic document parser, LlamaParse, exposes both a synchronous `LlamaCloud` client and a fully asynchronous `AsyncLlamaCloud` client in the `llama_cloud` Python SDK. When you have a folder of documents to parse, the recommended high-throughput pattern is to drive parses concurrently via `AsyncLlamaCloud` plus `asyncio.gather`, optionally rate-limited with an `asyncio.Semaphore`, so that you are not waiting for each parse job to finish before starting the next.\n\nIn this task you must build that batch parsing pipeline for a small folder of pre-existing PDFs and emit a per-document markdown file.\n\n## Requirements\nWrite a single Python script `batch_parse.py` (placed at `/home/user/batch_parse/batch_parse.py`) that:\n\n1. Imports the **async** client: `from llama_cloud import AsyncLlamaCloud`.\n2. Reads the API key from the `LLAMA_CLOUD_API_KEY` environment variable (do **not** hardcode it; either instantiate `AsyncLlamaCloud()` with no arguments — the SDK will pick the env var up — or pass `api_key=os.getenv(\"LLAMA_CLOUD_API_KEY\")`).\n3. Discovers every `*.pdf` file inside `/home/user/batch_parse/pdfs/` (there are three: `alpha.pdf`, `bravo.pdf`, `charlie.pdf`).\n4. For every PDF concurrently:\n   - Uploads it via `await client.files.create(file=\u003cabsolute path\u003e, purpose=\"parse\")`.\n   - Submits an agentic parse job via `await client.parsing.parse(file_id=\u003cuploaded.id\u003e, tier=\"agentic\", version=\"latest\", expand=[\"markdown\"])`.\n   - Concatenates `result.markdown.pages[*].markdown` in page order (use a single newline between pages).\n   - Writes the concatenated markdown to `/home/user/batch_parse/out/\u003cbasename\u003e.md` (UTF-8) where `\u003cbasename\u003e` is the PDF file name without the `.pdf` extension (e.g. `alpha.pdf` → `out/alpha.md`).\n5. Drives the per-file coroutines concurrently using `asyncio.gather` (NOT a sequential `for ... await ...` loop) and wraps the work in an `async def main(): ...` coroutine launched with `asyncio.run(main())`.\n6. Creates the output directory `/home/user/batch_parse/out/` if it does not already exist.\n\n## Implementation Guide\n1. `cd /home/user/batch_parse`.\n2. Create `batch_parse.py` along these lines:\n   ```python\n   import asyncio\n   import os\n   from pathlib import Path\n\n   from llama_cloud import AsyncLlamaCloud\n\n   PDF_DIR = Path(\"/home/user/batch_parse/pdfs\")\n   OUT_DIR = Path(\"/home/user/batch_parse/out\")\n\n\n   async def parse_one(client: AsyncLlamaCloud, pdf_path: Path) -\u003e None:\n       uploaded = await client.files.create(file=str(pdf_path), purpose=\"parse\")\n       result = await client.parsing.parse(\n           file_id=uploaded.id,\n           tier=\"agentic\",\n           version=\"latest\",\n           expand=[\"markdown\"],\n       )\n       parts = [(p.markdown or \"\") for p in result.markdown.pages]\n       combined = \"\\n\".join(parts)\n       out_path = OUT_DIR / f\"{pdf_path.stem}.md\"\n       out_path.write_text(combined, encoding=\"utf-8\")\n\n\n   async def main() -\u003e None:\n       OUT_DIR.mkdir(parents=True, exist_ok=True)\n       client = AsyncLlamaCloud(api_key=os.environ[\"LLAMA_CLOUD_API_KEY\"])\n       pdf_paths = sorted(PDF_DIR.glob(\"*.pdf\"))\n       await asyncio.gather(*(parse_one(client, p) for p in pdf_paths))\n\n\n   asyncio.run(main())\n   ```\n3. Run it with `python3 batch_parse.py` from `/home/user/batch_parse`. The script blocks until all three parse jobs finish concurrently.\n4. Confirm that `/home/user/batch_parse/out/alpha.md`, `/home/user/batch_parse/out/bravo.md`, and `/home/user/batch_parse/out/charlie.md` were all written.\n\n## Constraints\n- Project path: `/home/user/batch_parse`\n- Input directory: `/home/user/batch_parse/pdfs/` (already populated with `alpha.pdf`, `bravo.pdf`, `charlie.pdf`)\n- Output directory: `/home/user/batch_parse/out/` (must be created by the script if missing)\n- Script path: `/home/user/batch_parse/batch_parse.py`\n- Output files (UTF-8):\n  - `/home/user/batch_parse/out/alpha.md`\n  - `/home/user/batch_parse/out/bravo.md`\n  - `/home/user/batch_parse/out/charlie.md`\n- Use the **async** client `AsyncLlamaCloud` from the `llama_cloud` SDK. Do NOT use the synchronous `LlamaCloud` client. Do NOT call the REST API directly with `curl`, `requests`, or `httpx`.\n- Drive parses concurrently with `asyncio.gather`. A purely sequential `for ... await client.parsing.parse(...)` loop is NOT acceptable.\n- The script must rely on `LLAMA_CLOUD_API_KEY` from the environment — no hardcoded `llx-...` literal anywhere in the script.\n- Each output markdown file MUST contain the unique marker phrase from the corresponding source PDF (see Specific Test Data in the verification plan).\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires the `LLAMA_CLOUD_API_KEY` environment variable.\n"])</script><script>self.__next_f.push([1,"9:T2735,"])</script><script>self.__next_f.push([1,"# Build a LlamaCloud Parse v2 Request Payload From a High-Level Intent\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. Its agentic document parser, LlamaParse, is driven by the v2 `POST /api/v2/parse` endpoint (called for you by `client.parsing.parse(...)` in the `llama-cloud` Python SDK). The Parse v2 request body is a fairly deep JSON object where every knob has a specific home. A common source of bugs is putting options at the wrong nesting level — e.g. placing `custom_prompt` under `processing_options` instead of `agentic_options`, or putting `timeouts` under `processing_options` instead of `processing_control`.\n\nIn this task you will write a small build-only utility that consumes a flat, high-level *intent* JSON file (the kind of thing you might receive from another team or a UI) and emits a fully-formed Parse v2 request body with every field placed at exactly the right path. The script must construct a `LlamaCloud` client (a sanity check that the SDK and credentials are wired up correctly) but it MUST NOT actually call `client.parsing.parse(...)` or contact LlamaCloud over the network.\n\n## Pre-existing Layout\nThe project directory `/home/user/parse_payload` already contains:\n\n```\n/home/user/parse_payload/\n└── intent.json\n```\n\n`intent.json` is exactly:\n\n```json\n{\n  \"file_id\": \"file-demo-abc-123\",\n  \"tier\": \"agentic\",\n  \"version\": \"latest\",\n  \"pages\": \"1-3,5\",\n  \"crop_top\": 0.1,\n  \"crop_bottom\": 0.15,\n  \"ocr_languages\": [\"en\", \"fr\"],\n  \"tables_as_html\": true,\n  \"save_screenshots\": true,\n  \"custom_prompt\": \"This is a financial report. Preserve currency symbols.\",\n  \"enable_cost_optimizer\": true,\n  \"base_timeout_seconds\": 300,\n  \"extra_time_per_page_seconds\": 30,\n  \"ignore_diagonal_text\": true,\n  \"disable_cache\": false\n}\n```\n\n## Requirements\n\nCreate the following inside `/home/user/parse_payload`:\n\n### 1. `build_payload.py`\nA standalone script invoked as `python3 build_payload.py` that performs the following steps in order:\n\n1. **Validate environment**: Read `LLAMA_CLOUD_API_KEY` from `os.environ`. If the variable is unset or empty, exit with a non-zero status and print an error message to stderr.\n2. **Sanity-check the SDK**: Construct a client via `from llama_cloud import LlamaCloud` and instantiate `LlamaCloud(token=\u003capi_key\u003e)`. Do NOT make any network calls (no `client.parsing.parse(...)`, no `client.files.create(...)`, no `requests.*`, no `httpx.*`). Constructing the client is the only SDK interaction.\n3. **Load the intent file** from `/home/user/parse_payload/intent.json` (UTF-8, valid JSON).\n4. **Validate the tier**: The intent's `tier` field MUST be one of `fast`, `cost_effective`, `agentic`, `agentic_plus`. If not, exit with a non-zero status and print an error to stderr.\n5. **Construct the request body** as a Python dict with the exact structure described in the [Output Schema](#output-schema) section below. Each field MUST be placed at the documented nesting level.\n6. **Write the request body** to `/home/user/parse_payload/request_body.json` (UTF-8, indented with 2 spaces). Top-level keys MUST be sorted alphabetically.\n7. **Print a one-line summary** to stdout in this exact format (no extra spaces, no extra text):\n   ```\n   payload_ok file_id=\u003cfile_id\u003e tier=\u003ctier\u003e top_level_keys=\u003cN\u003e\n   ```\n   where `\u003cfile_id\u003e` is the value of `intent[\"file_id\"]`, `\u003ctier\u003e` is the value of `intent[\"tier\"]`, and `\u003cN\u003e` is the number of top-level keys in the resulting payload (an integer).\n\n### Output Schema\n\nThe resulting `request_body.json` must equal EXACTLY (modulo whitespace and key ordering inside the JSON file — top-level keys must be alphabetically sorted in the file):\n\n```json\n{\n  \"agentic_options\": {\n    \"custom_prompt\": \"This is a financial report. Preserve currency symbols.\"\n  },\n  \"crop_box\": {\n    \"bottom\": 0.15,\n    \"top\": 0.1\n  },\n  \"disable_cache\": false,\n  \"file_id\": \"file-demo-abc-123\",\n  \"output_options\": {\n    \"images_to_save\": [\"screenshot\"],\n    \"markdown\": {\n      \"tables\": {\n        \"output_tables_as_markdown\": false\n      }\n    }\n  },\n  \"page_ranges\": {\n    \"target_pages\": \"1-3,5\"\n  },\n  \"processing_control\": {\n    \"timeouts\": {\n      \"base_in_seconds\": 300,\n      \"extra_time_per_page_in_seconds\": 30\n    }\n  },\n  \"processing_options\": {\n    \"cost_optimizer\": {\n      \"enable\": true\n    },\n    \"ignore\": {\n      \"ignore_diagonal_text\": true\n    },\n    \"ocr_parameters\": {\n      \"languages\": [\"en\", \"fr\"]\n    }\n  },\n  \"tier\": \"agentic\",\n  \"version\": \"latest\"\n}\n```\n\nField-by-field mapping (intent key → payload path):\n\n| Intent key | Payload path |\n| --- | --- |\n| `file_id` | top-level `file_id` |\n| `tier` | top-level `tier` |\n| `version` | top-level `version` |\n| `disable_cache` | top-level `disable_cache` |\n| `pages` | `page_ranges.target_pages` |\n| `crop_top` | `crop_box.top` |\n| `crop_bottom` | `crop_box.bottom` |\n| `ocr_languages` | `processing_options.ocr_parameters.languages` |\n| `enable_cost_optimizer` | `processing_options.cost_optimizer.enable` |\n| `ignore_diagonal_text` | `processing_options.ignore.ignore_diagonal_text` |\n| `custom_prompt` | `agentic_options.custom_prompt` |\n| `tables_as_html` | `output_options.markdown.tables.output_tables_as_markdown` (NEGATED — `true` in intent ⇒ `false` in payload, and vice versa) |\n| `save_screenshots` | `output_options.images_to_save` — if `true`, include the string `\"screenshot\"` in the array; if `false`, omit the entire `images_to_save` key |\n| `base_timeout_seconds` | `processing_control.timeouts.base_in_seconds` |\n| `extra_time_per_page_seconds` | `processing_control.timeouts.extra_time_per_page_in_seconds` |\n\nImportant: do NOT include an `expand` key anywhere in the payload — `expand` is a query parameter on the GET result endpoint, not part of the parse request body.\n\n## Implementation Guide\n\n1. `cd /home/user/parse_payload`.\n2. Create `build_payload.py`. A reference implementation:\n   ```python\n   import json\n   import os\n   import sys\n\n   from llama_cloud import LlamaCloud\n\n   INTENT_PATH = \"/home/user/parse_payload/intent.json\"\n   OUT_PATH = \"/home/user/parse_payload/request_body.json\"\n   ALLOWED_TIERS = {\"fast\", \"cost_effective\", \"agentic\", \"agentic_plus\"}\n\n\n   def build_payload(intent: dict) -\u003e dict:\n       payload = {\n           \"file_id\": intent[\"file_id\"],\n           \"tier\": intent[\"tier\"],\n           \"version\": intent[\"version\"],\n           \"disable_cache\": bool(intent[\"disable_cache\"]),\n           \"page_ranges\": {\"target_pages\": intent[\"pages\"]},\n           \"crop_box\": {\n               \"top\": intent[\"crop_top\"],\n               \"bottom\": intent[\"crop_bottom\"],\n           },\n           \"processing_options\": {\n               \"ocr_parameters\": {\"languages\": list(intent[\"ocr_languages\"])},\n               \"cost_optimizer\": {\"enable\": bool(intent[\"enable_cost_optimizer\"])},\n               \"ignore\": {\"ignore_diagonal_text\": bool(intent[\"ignore_diagonal_text\"])},\n           },\n           \"agentic_options\": {\"custom_prompt\": intent[\"custom_prompt\"]},\n           \"output_options\": {\n               \"markdown\": {\n                   \"tables\": {\n                       \"output_tables_as_markdown\": not bool(intent[\"tables_as_html\"]),\n                   },\n               },\n           },\n           \"processing_control\": {\n               \"timeouts\": {\n                   \"base_in_seconds\": int(intent[\"base_timeout_seconds\"]),\n                   \"extra_time_per_page_in_seconds\": int(\n                       intent[\"extra_time_per_page_seconds\"]\n                   ),\n               },\n           },\n       }\n       if intent[\"save_screenshots\"]:\n           payload[\"output_options\"][\"images_to_save\"] = [\"screenshot\"]\n       return payload\n\n\n   def main() -\u003e int:\n       api_key = os.environ.get(\"LLAMA_CLOUD_API_KEY\", \"\").strip()\n       if not api_key:\n           print(\"LLAMA_CLOUD_API_KEY is not set\", file=sys.stderr)\n           return 2\n\n       _client = LlamaCloud(token=api_key)  # sanity check, no network call\n\n       with open(INTENT_PATH, \"r\", encoding=\"utf-8\") as f:\n           intent = json.load(f)\n\n       if intent[\"tier\"] not in ALLOWED_TIERS:\n           print(\n               f\"invalid tier: {intent['tier']!r}; allowed: {sorted(ALLOWED_TIERS)}\",\n               file=sys.stderr,\n           )\n           return 3\n\n       payload = build_payload(intent)\n       sorted_payload = dict(sorted(payload.items()))\n       with open(OUT_PATH, \"w\", encoding=\"utf-8\") as f:\n           json.dump(sorted_payload, f, indent=2)\n\n       print(\n           f\"payload_ok file_id={intent['file_id']} tier={intent['tier']} top_level_keys={len(sorted_payload)}\"\n       )\n       return 0\n\n\n   sys.exit(main())\n   ```\n3. Run the script:\n   ```bash\n   cd /home/user/parse_payload\n   python3 build_payload.py\n   ```\n   This produces `/home/user/parse_payload/request_body.json` and prints the summary line.\n\n## Constraints\n- Project path: `/home/user/parse_payload`\n- Script path: `/home/user/parse_payload/build_payload.py`\n- Input file: `/home/user/parse_payload/intent.json`\n- Output file: `/home/user/parse_payload/request_body.json`\n- Log line: a single line on stdout matching exactly `payload_ok file_id=file-demo-abc-123 tier=agentic top_level_keys=10`.\n- Use the official `llama_cloud` Python SDK (`from llama_cloud import LlamaCloud`).\n- Do NOT make any network calls (no `client.parsing.parse(...)`, no `client.files.create(...)`, no `requests.*`, no `httpx.*`, no `urllib.request.*`, no `curl`).\n- Do NOT hardcode the API key — always read `LLAMA_CLOUD_API_KEY` from the environment.\n- The output JSON must be UTF-8, indented with 2 spaces, and have top-level keys sorted alphabetically.\n- Do NOT include an `expand` key in the payload at any nesting level.\n- The Parse v2 tier value MUST be one of `fast`, `cost_effective`, `agentic`, `agentic_plus`. (For this intent, that is `agentic`.)\n\n## Integrations\n- LlamaCloud — requires the `LLAMA_CLOUD_API_KEY` environment variable (any non-empty string is acceptable; the script only constructs the client and never issues a network request).\n"])</script><script>self.__next_f.push([1,"a:T1646,"])</script><script>self.__next_f.push([1,"# Build a Structured Item Inventory from a Multi-Page PDF with LlamaParse\n\n## Background\nYou are building a document indexing pipeline that needs to know not just the plain text of a PDF, but the *structure* of each page: which blocks are headings, which are paragraphs, which are tables, which are lists, etc. Plain markdown is not enough — downstream services need a typed, page-anchored inventory of every element so chunking, deduplication, and citation can be done deterministically.\n\nThe team uses LlamaCloud's LlamaParse service, which (in non-`fast` tiers) returns a structured `items` array per page where each item has a `type` field (e.g. `heading`, `text`, `table`, `list`). Your job is to write the pipeline step that turns a PDF into this typed inventory.\n\nA pre-existing multi-page PDF is available at `/home/user/myproject/report.pdf` (3 pages). It contains the following section titles, one per page:\n- Page 1: `Project Phoenix Overview` (followed by an introductory paragraph mentioning `Phoenix Initiative`).\n- Page 2: `Implementation Roadmap` (followed by a paragraph mentioning `milestones`).\n- Page 3: `Risk Assessment Summary` (followed by a paragraph mentioning `Mitigation`).\n\nThe Python packages `llama-cloud-services` and `llama-cloud` are already installed in the environment, and the API key is configured via the `LLAMA_CLOUD_API_KEY` environment variable.\n\n## Requirements\n- Implement a Python script at `/home/user/myproject/build_inventory.py`.\n- The script must use the LlamaCloud LlamaParse SDK (either `llama_cloud_services.LlamaParse` with `get_json_result(...)`, or `llama_cloud_services.LlamaParse.parse(...)` and walking `result.pages`, or `llama_cloud.LlamaCloud` with `expand=[\"items\", \"markdown\"]`) to parse `/home/user/myproject/report.pdf` and obtain the per-page `items` arrays.\n- Do NOT use the `fast` tier — `items` is not available there. Use the SDK defaults or explicitly request a non-`fast` tier (e.g. `tier=\"agentic\"`).\n- The script must walk every page and produce a single JSON output at `/home/user/myproject/inventory.json` with this exact top-level structure:\n  ```json\n  {\n    \"source\": \"report.pdf\",\n    \"page_count\": \u003ctotal number of pages, int\u003e,\n    \"item_count\": \u003ctotal number of items across all pages, int\u003e,\n    \"by_type\": { \"\u003citem_type\u003e\": \u003cint\u003e, ... },\n    \"items\": [\n      { \"page\": \u003cint\u003e, \"type\": \"\u003citem_type\u003e\", \"value\": \"\u003cshort text\u003e\" },\n      ...\n    ]\n  }\n  ```\n  Rules for the structure:\n  - `source` MUST be the basename of the parsed file (`\"report.pdf\"`).\n  - `page_count` MUST equal the number of distinct pages parsed (3 for this PDF).\n  - `item_count` MUST equal `len(items)` and MUST equal the sum of the values in `by_type`.\n  - `by_type` MUST be a JSON object mapping item-type strings (e.g. `\"heading\"`, `\"text\"`, `\"table\"`, `\"list\"`) to a non-negative integer count of how many items of that type appear in `items`.\n  - `items` MUST be a JSON list ordered first by ascending `page`, then by the original order of the item within that page.\n  - Each entry in `items` MUST have an integer `page` (1-indexed), a non-empty string `type` (taken verbatim from the LlamaParse item's `type` field), and a non-empty string `value`. The `value` MUST be a short text snippet representing that item: prefer the item's `value` field if present, otherwise its `md` field, otherwise its `text` field. If the resulting string is longer than 500 characters, truncate it to its first 500 characters.\n- Running the script must produce `/home/user/myproject/inventory.json`. Use `python3 build_inventory.py` as the entry point.\n\n## Implementation Guide\n1. Read the API key from the `LLAMA_CLOUD_API_KEY` environment variable (the SDK reads it automatically; if you instantiate the parser explicitly with `api_key=...`, use this env var).\n2. Parse `/home/user/myproject/report.pdf` with LlamaParse and obtain the per-page `items`. Two valid approaches:\n   - `from llama_cloud_services import LlamaParse; parser = LlamaParse(result_type=\"markdown\"); json_results = parser.get_json_result(\"/home/user/myproject/report.pdf\")` → iterate `json_results[0][\"pages\"]`; each page has an `items` list and a `page` index.\n   - Or use the new client: `from llama_cloud import LlamaCloud; client = LlamaCloud(); file = client.files.create(file=\"/home/user/myproject/report.pdf\", purpose=\"parse\"); result = client.parsing.parse(file_id=file.id, tier=\"agentic\", version=\"latest\", expand=[\"items\", \"markdown\"])` → iterate `result.items.pages`; each page has `page_number` and `items`.\n3. For each page (1-indexed) and each item on that page, append `{\"page\": \u003cpage\u003e, \"type\": \u003citem['type']\u003e, \"value\": \u003ctruncated text\u003e}` to the `items` list, preserving original order. Skip items whose computed `value` would be empty (after stripping whitespace).\n4. Build the `by_type` mapping by counting `item[\"type\"]` occurrences in `items`.\n5. Set `source` to `\"report.pdf\"`, `page_count` to the number of pages parsed, `item_count` to `len(items)`.\n6. Write the structure to `/home/user/myproject/inventory.json` using `json.dump(..., indent=2)` with UTF-8 encoding.\n7. Execute the script once so that `inventory.json` exists when verification runs.\n\n## Constraints\n- Project path: /home/user/myproject\n- Output file: /home/user/myproject/inventory.json\n- The script must perform a real LlamaParse API call — do not hardcode the inventory, do not hand-build item types from prior knowledge of the PDF.\n- Do not modify `/home/user/myproject/report.pdf`.\n- The script must exit with code 0 when invoked as `python3 /home/user/myproject/build_inventory.py`.\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires `LLAMA_CLOUD_API_KEY` set in the environment.\n"])</script><script>self.__next_f.push([1,"b:T1f72,"])</script><script>self.__next_f.push([1,"# Download Per-Page Screenshots from a LlamaParse Job\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. Its agentic document parser, LlamaParse, can render every page of a parsed document as a PNG screenshot — this is a common building block for multimodal RAG pipelines that want to feed both extracted text and the page image into a VLM. The pattern is two-stage:\n\n1. **Generate** the screenshots at parse time by setting `output_options={\"images_to_save\": [\"screenshot\"]}`.\n2. **Fetch** them via the `images_content_metadata` expand value, which returns a structured list of `{ filename, presigned_url, ... }` entries. You then download each `presigned_url` with a normal HTTP GET and save the bytes to disk.\n\nA common mistake here is to omit `images_to_save` (in which case the screenshots are never generated and `images_content_metadata.images` comes back empty), or to forget that `images_content_metadata` does NOT inline the bytes — you have to fetch each `presigned_url` yourself.\n\nIn this task you must implement that two-stage pipeline end-to-end against a pre-existing 3-page PDF.\n\n## Pre-existing Layout\nThe project directory `/home/user/screenshot_task` already contains:\n\n```\n/home/user/screenshot_task/\n└── report.pdf            # 3-page PDF, generated deterministically at image-build time\n```\n\nThe 3 pages contain the section titles `Alpha Section`, `Bravo Section`, and `Charlie Section` respectively, in that order.\n\n## Requirements\n\nCreate a single Python script `download_screenshots.py` at `/home/user/screenshot_task/download_screenshots.py` that:\n\n1. Imports the synchronous client: `from llama_cloud import LlamaCloud`.\n2. Authenticates using the `LLAMA_CLOUD_API_KEY` environment variable. Instantiate `LlamaCloud()` with no arguments (the SDK reads the key from the environment) or pass `token=os.environ[\"LLAMA_CLOUD_API_KEY\"]`. **Do NOT hardcode the API key in the script** (no `llx-...` literal).\n3. Uploads `/home/user/screenshot_task/report.pdf` to LlamaCloud via:\n   ```python\n   uploaded = client.files.create(file=\"/home/user/screenshot_task/report.pdf\", purpose=\"parse\")\n   ```\n4. Invokes `client.parsing.parse(...)` EXACTLY ONCE with:\n   - `file_id=uploaded.id`\n   - `tier=\"agentic\"`\n   - `version=\"latest\"`\n   - `output_options={\"images_to_save\": [\"screenshot\"]}` (this is what causes screenshots to be generated)\n   - `expand=[\"images_content_metadata\"]` (so the response contains the list of presigned image URLs)\n5. Reads the resulting `result.images_content_metadata.images` list (each entry has `filename`, `presigned_url`, `content_type`, `size_bytes`, and `index`).\n6. For every image entry, downloads the bytes from `presigned_url` and writes them to `/home/user/screenshot_task/screenshots/\u003cfilename\u003e` (the bytes MUST be the raw response body — do NOT re-encode). Use `urllib.request` from the standard library, or `requests`/`httpx` if you prefer (you may install nothing extra; `urllib.request` is preinstalled). Create the `screenshots/` directory if it does not already exist.\n7. After all downloads succeed, writes a manifest file `/home/user/screenshot_task/manifest.json` (UTF-8, `indent=2`) with this exact shape:\n   ```json\n   {\n     \"source\": \"report.pdf\",\n     \"job_id\": \"\u003cthe parse job id\u003e\",\n     \"page_count\": 3,\n     \"image_count\": \u003cint, must equal len(images)\u003e,\n     \"images\": [\n       { \"filename\": \"\u003cfilename\u003e\", \"size_bytes\": \u003cint\u003e, \"saved_path\": \"/home/user/screenshot_task/screenshots/\u003cfilename\u003e\" },\n       ...\n     ]\n   }\n   ```\n   Rules for the manifest:\n   - `source` MUST be the literal string `\"report.pdf\"`.\n   - `job_id` MUST be the parse job's id (`result.job.id`).\n   - `page_count` MUST be the integer `3`.\n   - `image_count` MUST equal `len(result.images_content_metadata.images)` and MUST equal the number of files written under `screenshots/`.\n   - `images` MUST be a list, one entry per saved file, ordered by ascending `index` from the LlamaParse response.\n   - Each entry's `size_bytes` MUST equal the actual on-disk size of the saved file in bytes.\n   - Each entry's `saved_path` MUST be the absolute path of the saved file (`/home/user/screenshot_task/screenshots/\u003cfilename\u003e`).\n8. The script must run end-to-end as `python3 download_screenshots.py` from `/home/user/screenshot_task` and exit with status 0.\n\n## Implementation Guide\n\n1. `cd /home/user/screenshot_task`.\n2. Create `download_screenshots.py`. A reference implementation:\n   ```python\n   import json\n   import os\n   import urllib.request\n   from pathlib import Path\n\n   from llama_cloud import LlamaCloud\n\n   PROJECT_DIR = Path(\"/home/user/screenshot_task\")\n   PDF_PATH = PROJECT_DIR / \"report.pdf\"\n   SCREENSHOTS_DIR = PROJECT_DIR / \"screenshots\"\n   MANIFEST_PATH = PROJECT_DIR / \"manifest.json\"\n\n\n   def main() -\u003e None:\n       SCREENSHOTS_DIR.mkdir(parents=True, exist_ok=True)\n\n       client = LlamaCloud()  # reads LLAMA_CLOUD_API_KEY from the environment\n\n       uploaded = client.files.create(file=str(PDF_PATH), purpose=\"parse\")\n\n       result = client.parsing.parse(\n           file_id=uploaded.id,\n           tier=\"agentic\",\n           version=\"latest\",\n           output_options={\"images_to_save\": [\"screenshot\"]},\n           expand=[\"images_content_metadata\"],\n       )\n\n       images = sorted(\n           list(result.images_content_metadata.images),\n           key=lambda im: im.index,\n       )\n\n       manifest_entries = []\n       for image in images:\n           dst = SCREENSHOTS_DIR / image.filename\n           with urllib.request.urlopen(image.presigned_url) as resp:\n               data = resp.read()\n           dst.write_bytes(data)\n           manifest_entries.append({\n               \"filename\": image.filename,\n               \"size_bytes\": dst.stat().st_size,\n               \"saved_path\": str(dst),\n           })\n\n       manifest = {\n           \"source\": \"report.pdf\",\n           \"job_id\": result.job.id,\n           \"page_count\": 3,\n           \"image_count\": len(manifest_entries),\n           \"images\": manifest_entries,\n       }\n       with open(MANIFEST_PATH, \"w\", encoding=\"utf-8\") as f:\n           json.dump(manifest, f, indent=2)\n\n\n   main()\n   ```\n3. Run the script:\n   ```bash\n   cd /home/user/screenshot_task\n   python3 download_screenshots.py\n   ```\n4. Confirm the artifacts exist:\n   - `/home/user/screenshot_task/screenshots/` contains one image file per page.\n   - `/home/user/screenshot_task/manifest.json` lists every saved image.\n\n## Constraints\n- Project path: `/home/user/screenshot_task`\n- Input PDF: `/home/user/screenshot_task/report.pdf` (must not be modified)\n- Script path: `/home/user/screenshot_task/download_screenshots.py`\n- Screenshots directory: `/home/user/screenshot_task/screenshots/`\n- Manifest file: `/home/user/screenshot_task/manifest.json`\n- Use the official `llama_cloud` Python SDK (`from llama_cloud import LlamaCloud`). Do NOT call the LlamaCloud REST API directly with `curl`, `requests`, or `httpx`; the only HTTP traffic outside the SDK is the S3 presigned URL download.\n- The script must rely on `LLAMA_CLOUD_API_KEY` from the environment — no hardcoded `llx-...` literal anywhere.\n- `client.parsing.parse(...)` MUST be invoked exactly once. Do NOT issue a second `parsing.parse(...)` call (e.g. once without `images_to_save` and once with) — the screenshots MUST be requested in the single parse call.\n- The `output_options` argument passed to `parsing.parse` MUST include `\"images_to_save\"` containing the literal string `\"screenshot\"`. The `expand` argument MUST include the literal string `\"images_content_metadata\"`.\n- The image files saved to disk MUST be the raw bytes returned by the presigned URLs (do NOT re-encode them or wrap them in JSON).\n- The PDF has 3 pages, so the manifest's `page_count` MUST be `3` and `image_count` MUST be `\u003e= 1`.\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires the `LLAMA_CLOUD_API_KEY` environment variable. The presigned URL download targets `s3.amazonaws.com` (or a comparable LlamaCloud-managed bucket) and requires outbound internet access.\n"])</script><script>self.__next_f.push([1,"c:T10d4,"])</script><script>self.__next_f.push([1,"# Extract a PDF Sales Table to Structured JSON with LlamaParse\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. Its agentic document parser, LlamaParse, accurately converts visually-rich PDFs (including tables) into clean markdown that downstream pipelines can consume. A common real-world use case is taking a financial/operations report and turning a tabular section of the PDF into structured JSON for analytics.\n\nIn this task you must build a small extraction pipeline that takes a pre-existing PDF (`quarterly_sales.pdf`), parses it with LlamaParse using the `llama-cloud` Python SDK, and writes a structured `sales.json` summarizing the product sales table contained in the first page of the document.\n\n## Requirements\nWrite a Python script `extract_sales.py` that uses the `llama-cloud` SDK (`from llama_cloud import LlamaCloud`) to:\n  1. Upload the local PDF `quarterly_sales.pdf` to LlamaCloud with `purpose=\"parse\"`.\n  2. Submit a parse job using `tier=\"agentic\"`, `version=\"latest\"`, and `expand=[\"markdown\"]`.\n  3. Read the markdown text of the first page of the parsed result (i.e. `result.markdown.pages[0].markdown`).\n  4. Parse the product sales table out of that markdown and assemble a Python object with the following exact shape:\n     ```json\n     {\n       \"products\": [\n         {\"name\": \"Widget\",   \"units_sold\": 1200, \"revenue_usd\": 24000},\n         {\"name\": \"Gadget\",   \"units_sold\": 850,  \"revenue_usd\": 21250},\n         {\"name\": \"Sprocket\", \"units_sold\": 430,  \"revenue_usd\": 12900},\n         {\"name\": \"Cog\",      \"units_sold\": 670,  \"revenue_usd\": 18760}\n       ]\n     }\n     ```\n  5. Serialize that object to `sales.json` (UTF-8, indent=2) in the same directory.\n\nThe script must authenticate using the `LLAMA_CLOUD_API_KEY` environment variable (the SDK reads it automatically when `LlamaCloud()` is instantiated with no arguments).\n\n## Implementation Guide\n1. Change into the project directory `/home/user/sales_extraction`.\n2. Create `extract_sales.py` with logic similar to:\n   ```python\n   import json\n   import re\n   from llama_cloud import LlamaCloud\n\n   client = LlamaCloud()  # reads LLAMA_CLOUD_API_KEY from the environment\n   uploaded = client.files.create(file=\"./quarterly_sales.pdf\", purpose=\"parse\")\n   result = client.parsing.parse(\n       file_id=uploaded.id,\n       tier=\"agentic\",\n       version=\"latest\",\n       expand=[\"markdown\"],\n   )\n   page_md = result.markdown.pages[0].markdown\n\n   # Walk the markdown table on the first page and build product records.\n   products = []\n   for line in page_md.splitlines():\n       line = line.strip()\n       if not line.startswith(\"|\"):\n           continue\n       cells = [c.strip() for c in line.strip(\"|\").split(\"|\")]\n       if len(cells) \u003c 3:\n           continue\n       name, units_str, revenue_str = cells[0], cells[1], cells[2]\n       if name.lower() == \"product\" or set(name) \u003c= {\"-\", \":\"}:\n           continue  # header / separator row\n       units = int(re.sub(r\"[^0-9]\", \"\", units_str))\n       revenue = int(re.sub(r\"[^0-9]\", \"\", revenue_str))\n       products.append({\"name\": name, \"units_sold\": units, \"revenue_usd\": revenue})\n\n   payload = {\"products\": products}\n   with open(\"sales.json\", \"w\", encoding=\"utf-8\") as f:\n       json.dump(payload, f, indent=2)\n   ```\n3. Execute the script with `python3 extract_sales.py` from `/home/user/sales_extraction`. The script will block until LlamaCloud finishes parsing and returns the result.\n4. Confirm that `sales.json` has been written.\n\n## Constraints\n- Project path: `/home/user/sales_extraction`\n- Input file: `/home/user/sales_extraction/quarterly_sales.pdf` (already provided)\n- Output file: `/home/user/sales_extraction/sales.json`\n- Script path: `/home/user/sales_extraction/extract_sales.py`\n- Use the `llama-cloud` SDK (the `LlamaCloud` client class). Do NOT call the REST API directly with `curl` or `requests`.\n- The script must rely on `LLAMA_CLOUD_API_KEY` from the environment, not hardcoded.\n- The JSON object must contain a top-level key `products` whose value is a list with exactly 4 entries; each entry must have the keys `name`, `units_sold`, and `revenue_usd` with the numeric fields as integers (not strings).\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires the `LLAMA_CLOUD_API_KEY` environment variable.\n"])</script><script>self.__next_f.push([1,"d:T1943,"])</script><script>self.__next_f.push([1,"# Extract a Resume to Structured JSON with LlamaExtract and a Pydantic Schema\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. In addition to LlamaParse (which converts visually rich documents to clean markdown), LlamaCloud also exposes **LlamaExtract**, a structured-data extraction API. Instead of returning markdown for you to post-process, LlamaExtract takes a **data schema** (defined as a Pydantic model or raw JSON Schema) and returns a structured object that conforms to it.\n\nThe canonical pattern with the `llama-cloud` Python SDK is:\n\n1. Define a `pydantic.BaseModel` describing the fields you want.\n2. Upload the source document with `client.files.create(file=..., purpose=\"extract\")`.\n3. Submit an extraction job with `client.extract.create(file_input=..., configuration={\"data_schema\": Model.model_json_schema(), \"extraction_target\": \"per_doc\", \"tier\": \"agentic\"})`.\n4. Poll `client.extract.get(job.id)` until `status` is `\"COMPLETED\"` (or `\"FAILED\"`/`\"CANCELLED\"`).\n5. Read `job.extract_result` (a dict matching your schema) and persist it as JSON.\n\nIn this task you will build that pipeline end-to-end against a single resume document and persist the extracted structured output to disk.\n\n## Pre-existing Layout\nThe project directory `/home/user/resume_extract` already contains exactly one file, `resume.txt`, with this content:\n\n```\nCandidate Name: Jane Doe\nEmail: jane.doe@example.com\nPhone: 555-123-4567\n\nTechnical Skills: Python, SQL, AWS, Docker, Kubernetes\n\nExperience:\n- Senior Software Engineer at AcmeCorp (2020-Present)\n- Software Engineer at Beta Inc (2018-2020)\n\nEducation: BS Computer Science, MIT, 2018\n```\n\n## Requirements\nCreate a Python script `/home/user/resume_extract/extract_resume.py` that:\n\n1. **Defines a Pydantic schema** named `Resume` at module top level. It MUST be a subclass of `pydantic.BaseModel` and contain exactly these three fields (use `pydantic.Field` with `description=...` so the LLM gets context):\n   - `name: str` — Full name of the candidate.\n   - `email: str` — Email address of the candidate.\n   - `skills: list[str]` — Technical skills and technologies mentioned in the resume.\n2. **Reads the API key** from the `LLAMA_CLOUD_API_KEY` environment variable. Do NOT hardcode the key. If the variable is unset or empty, exit with a non-zero status code and print an error to stderr.\n3. **Instantiates a client** via `from llama_cloud import LlamaCloud` and either `LlamaCloud()` (the SDK reads `LLAMA_CLOUD_API_KEY` from the environment automatically) or `LlamaCloud(api_key=os.environ[\"LLAMA_CLOUD_API_KEY\"])`.\n4. **Uploads `resume.txt`** with `client.files.create(file=\"./resume.txt\", purpose=\"extract\")` and captures the returned `file_obj.id`.\n5. **Submits an extract job** with `client.extract.create(...)`:\n   - `file_input=\u003cuploaded file id\u003e`\n   - `configuration={\"data_schema\": Resume.model_json_schema(), \"extraction_target\": \"per_doc\", \"tier\": \"agentic\"}`\n6. **Polls** `client.extract.get(job.id)` in a loop, sleeping 2 seconds between iterations, until the job status is one of `\"COMPLETED\"`, `\"FAILED\"`, or `\"CANCELLED\"`. If the terminal status is not `\"COMPLETED\"`, exit with a non-zero status and print an error.\n7. **Serializes `job.extract_result`** (a `dict`) to `/home/user/resume_extract/extracted.json` as UTF-8, indented with 2 spaces. The JSON file must contain at least the keys `name`, `email`, and `skills` with values populated from the resume.\n\n## Implementation Guide\n1. `cd /home/user/resume_extract`.\n2. Create `extract_resume.py`. Reference implementation:\n   ```python\n   import json\n   import os\n   import sys\n   import time\n\n   from pydantic import BaseModel, Field\n   from llama_cloud import LlamaCloud\n\n\n   class Resume(BaseModel):\n       name: str = Field(description=\"Full name of the candidate\")\n       email: str = Field(description=\"Email address of the candidate\")\n       skills: list[str] = Field(\n           description=\"Technical skills and technologies mentioned in the resume\"\n       )\n\n\n   def main() -\u003e int:\n       api_key = os.environ.get(\"LLAMA_CLOUD_API_KEY\", \"\").strip()\n       if not api_key:\n           print(\"LLAMA_CLOUD_API_KEY is not set\", file=sys.stderr)\n           return 2\n\n       client = LlamaCloud()  # reads LLAMA_CLOUD_API_KEY from the environment\n\n       file_obj = client.files.create(file=\"./resume.txt\", purpose=\"extract\")\n\n       job = client.extract.create(\n           file_input=file_obj.id,\n           configuration={\n               \"data_schema\": Resume.model_json_schema(),\n               \"extraction_target\": \"per_doc\",\n               \"tier\": \"agentic\",\n           },\n       )\n\n       while job.status not in (\"COMPLETED\", \"FAILED\", \"CANCELLED\"):\n           time.sleep(2)\n           job = client.extract.get(job.id)\n\n       if job.status != \"COMPLETED\":\n           print(f\"extract job ended with status: {job.status}\", file=sys.stderr)\n           return 3\n\n       with open(\"/home/user/resume_extract/extracted.json\", \"w\", encoding=\"utf-8\") as f:\n           json.dump(job.extract_result, f, indent=2)\n       return 0\n\n\n   sys.exit(main())\n   ```\n3. Run the script:\n   ```bash\n   cd /home/user/resume_extract\n   python3 extract_resume.py\n   ```\n   The script will block until LlamaExtract finishes and returns the result. On success it creates `/home/user/resume_extract/extracted.json`.\n\n## Constraints\n- Project path: `/home/user/resume_extract`\n- Input file: `/home/user/resume_extract/resume.txt` (already provided — do NOT modify it)\n- Script path: `/home/user/resume_extract/extract_resume.py`\n- Output file: `/home/user/resume_extract/extracted.json`\n- Use the official `llama_cloud` Python SDK (`from llama_cloud import LlamaCloud`). Do NOT call the REST API directly with `curl`, `requests`, `httpx`, or `urllib.request`.\n- Use a Pydantic v2 `BaseModel` with `pydantic.Field` descriptions to define the schema. The configuration passed to `client.extract.create` must include `\"data_schema\": Resume.model_json_schema()`, `\"extraction_target\": \"per_doc\"`, and `\"tier\": \"agentic\"`.\n- Do NOT hardcode the API key — always read `LLAMA_CLOUD_API_KEY` from the environment.\n- `extracted.json` must be a valid JSON object containing the keys `name`, `email`, and `skills`. `skills` must be a non-empty JSON array of strings.\n\n## Integrations\n- LlamaCloud (LlamaExtract) — requires the `LLAMA_CLOUD_API_KEY` environment variable. The script makes real network calls to the LlamaExtract API.\n"])</script><script>self.__next_f.push([1,"e:T114b,"])</script><script>self.__next_f.push([1,"# Extract Every Table from a Multi-Page PDF to CSV with LlamaParse\n\n## Background\nYou are building a financial data pipeline. Analysts need every table from a multi-page report exported as standalone CSV files (one CSV per table) so they can load them directly into pandas / a data warehouse. The team has chosen LlamaCloud's LlamaParse service because it returns structured `items` per page (headings, paragraphs, tables, etc.), so tables can be found and exported deterministically.\n\nA pre-existing multi-page PDF lives at `/home/user/myproject/quarterly_report.pdf`. It has 2 pages and each page contains a clearly tabular block:\n- Page 1: a quarterly revenue table with columns `Quarter`, `Revenue`, `Profit`.\n- Page 2: an employee headcount table with columns `Department`, `Headcount`, `Open Roles`.\n\nThe Python packages `llama-cloud-services` and `llama-cloud` are already installed in the environment, and the API key is configured via the `LLAMA_CLOUD_API_KEY` environment variable.\n\n## Requirements\n- Implement a Python script at `/home/user/myproject/extract_tables.py`.\n- The script must use the LlamaCloud LlamaParse SDK (`llama_cloud.LlamaCloud` is recommended, but `llama_cloud_services.LlamaParse` is also acceptable) to parse `/home/user/myproject/quarterly_report.pdf` with the `items` view available (e.g. `tier=\"agentic\"`, `version=\"latest\"`, `expand=[\"items\", \"markdown\"]`).\n- The script must walk every parsed page, collect every element whose type is `\"table\"`, and export each table to its own CSV file under the directory `/home/user/myproject/tables/`. Each CSV filename MUST follow the deterministic pattern `table_p{page:03d}_{i}.csv`, where `page` is the 1-indexed page the table was found on and `i` is the 0-indexed order of the table within that page (`table_p001_0.csv`, `table_p002_0.csv`, ...).\n- The script must also write a summary JSON file to `/home/user/myproject/tables_summary.json` with this exact top-level structure:\n  ```json\n  {\n    \"source\": \"quarterly_report.pdf\",\n    \"table_count\": \u003ctotal number of tables found\u003e,\n    \"tables\": [\n      {\"page\": \u003cint\u003e, \"file\": \"table_pNNN_M.csv\", \"rows\": \u003cint\u003e, \"cols\": \u003cint\u003e}\n    ]\n  }\n  ```\n  - `tables` MUST be a JSON list ordered by `(page ASC, file ASC)`.\n  - Each object MUST have an integer `page` (1-indexed), a string `file` matching the CSV filename written in `/home/user/myproject/tables/`, an integer `rows` (number of rows in that table, including header row if present), and an integer `cols` (number of columns).\n  - `table_count` MUST equal the length of `tables`.\n- Running the script must produce the CSV files and the summary JSON. Use `python3 extract_tables.py` as the entry point.\n\n## Implementation Guide\n1. Read the API key from the `LLAMA_CLOUD_API_KEY` environment variable (the SDK reads it automatically).\n2. Upload `/home/user/myproject/quarterly_report.pdf` via `client.files.create(file=\"...\", purpose=\"parse\")` and call `client.parsing.parse(file_id=..., tier=\"agentic\", version=\"latest\", expand=[\"items\", \"markdown\"])`.\n3. Iterate `result.items.pages`; for each `page`, iterate `page.items`. Tables have `getattr(item, \"type\", None) == \"table\"` and expose a `csv` string field plus a `rows` field (a list of lists).\n4. Make sure the directory `/home/user/myproject/tables/` exists, then write `item.csv` to `/home/user/myproject/tables/table_p{page.page_number:03d}_{i}.csv` (UTF-8, no BOM). `i` is the order of the table within that page (start at 0).\n5. Compute the row count and column count for each table from `item.rows` (or by re-parsing the CSV with `csv.reader`) and append an entry to the summary list.\n6. Sort the summary list by `(page, file)` and serialize it as JSON to `/home/user/myproject/tables_summary.json` using `json.dump(... , indent=2)`.\n7. Execute the script once so that the output files exist when verification runs.\n\n## Constraints\n- Project path: /home/user/myproject\n- Output directory: /home/user/myproject/tables/\n- Summary file: /home/user/myproject/tables_summary.json\n- The script must perform a real LlamaParse API call — do not hardcode CSV contents, do not hand-write CSV from prior knowledge of the PDF.\n- Do not modify `/home/user/myproject/quarterly_report.pdf`.\n- The script must exit with code 0 when invoked as `python3 /home/user/myproject/extract_tables.py`.\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires `LLAMA_CLOUD_API_KEY` set in the environment.\n"])</script><script>self.__next_f.push([1,"f:T222a,"])</script><script>self.__next_f.push([1,"# Incremental Ingestion Plan for a LlamaCloud Index\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG platform. The `client.pipelines.files.create()` endpoint uses **additive/upsert semantics** — files NOT included in the request remain unchanged in the index, and files INCLUDED are added or re-indexed. To keep a managed index in sync with a local folder *cheaply*, you should only upsert files whose content has actually changed and only delete files that disappeared locally.\n\nIn this task you will build the planning half of that workflow: a script that computes a content-addressed manifest of a local folder, diffs it against a prior manifest, and writes a structured `upload_plan.json` describing exactly which files to upload, update, delete, or skip. The script must also construct a `llama_cloud.LlamaCloud` client (sanity check that the SDK and API key are wired up correctly) but it MUST NOT make any network calls.\n\n## Pre-existing Layout\n\nThe project directory `/home/user/incremental_ingest` already contains:\n\n```\n/home/user/incremental_ingest/\n├── data/\n│   ├── intro.txt        # content unchanged since last sync\n│   ├── glossary.txt     # content has been edited since last sync\n│   └── changelog.txt    # brand-new file, not in the prior manifest\n└── prior_manifest.json  # snapshot of the previous sync, contains entries for intro.txt, glossary.txt, and removed_doc.txt\n```\n\nThe schema of `prior_manifest.json` is:\n```json\n{\n  \"files\": {\n    \"\u003crelative_path\u003e\": {\"sha256\": \"\u003chex sha256\u003e\", \"size\": \u003cint bytes\u003e}\n  }\n}\n```\n\n`removed_doc.txt` exists ONLY in `prior_manifest.json` — there is NO physical file for it on disk anymore. Your script must treat that as a deletion.\n\n## Requirements\n\nCreate the following inside `/home/user/incremental_ingest`:\n\n### 1. `sync.py`\nA standalone script that, when invoked as `python3 sync.py`, performs the following steps in order:\n\n1. **Validate environment**: Read `LLAMA_CLOUD_API_KEY` from `os.environ`. If the variable is unset or empty, exit with a non-zero status and print an error to stderr.\n2. **Sanity-check the SDK**: Construct a client via `from llama_cloud import LlamaCloud` and instantiate `LlamaCloud(token=\u003capi_key\u003e)`. Do NOT make any network calls (no `files.create`, no `pipelines.*`). The construction itself is what we are validating.\n3. **Scan local data**: Walk the directory `/home/user/incremental_ingest/data` recursively. For every regular file, compute its SHA-256 hex digest (lower-case) and its size in bytes. Use forward-slash-joined paths *relative to the data directory* as the file's key (e.g. `intro.txt`, not `/home/user/incremental_ingest/data/intro.txt`).\n4. **Write the current manifest**: Persist the new manifest to `/home/user/incremental_ingest/current_manifest.json` using exactly the same schema as `prior_manifest.json`:\n   ```json\n   {\n     \"files\": {\n       \"\u003crelative_path\u003e\": {\"sha256\": \"\u003chex\u003e\", \"size\": \u003cint\u003e}\n     }\n   }\n   ```\n   The JSON file must be UTF-8 encoded, indented with 2 spaces, and `files` must be sorted alphabetically by key.\n5. **Compute the diff** against `/home/user/incremental_ingest/prior_manifest.json`:\n   - `added`: keys present in the current manifest but absent from the prior manifest.\n   - `modified`: keys present in BOTH manifests but with a different `sha256`.\n   - `removed`: keys present in the prior manifest but absent from the current manifest.\n   - `unchanged`: keys present in both manifests with identical `sha256`.\n6. **Write the upload plan** to `/home/user/incremental_ingest/upload_plan.json` with the following exact schema:\n   ```json\n   {\n     \"to_upload\": [\"\u003crelative_path\u003e\", ...],   // sorted union of added + modified\n     \"to_delete\": [\"\u003crelative_path\u003e\", ...],   // sorted list of removed\n     \"unchanged\": [\"\u003crelative_path\u003e\", ...],   // sorted list of unchanged\n     \"added\": [\"\u003crelative_path\u003e\", ...],       // sorted list of added (subset of to_upload)\n     \"modified\": [\"\u003crelative_path\u003e\", ...],    // sorted list of modified (subset of to_upload)\n     \"summary\": {\n       \"added\": \u003cint\u003e,\n       \"modified\": \u003cint\u003e,\n       \"removed\": \u003cint\u003e,\n       \"unchanged\": \u003cint\u003e,\n       \"total_current\": \u003cint\u003e,    // number of files in current_manifest\n       \"total_prior\": \u003cint\u003e       // number of files in prior_manifest\n     }\n   }\n   ```\n   Every list MUST be sorted alphabetically. The JSON file must be UTF-8 encoded and indented with 2 spaces.\n7. **Print a one-line summary** to stdout in this exact format (do not change spacing or wording):\n   ```\n   added=\u003cN\u003e modified=\u003cN\u003e removed=\u003cN\u003e unchanged=\u003cN\u003e\n   ```\n\n## Implementation Guide\n\n1. `cd /home/user/incremental_ingest`.\n2. Create `sync.py`. A reference implementation:\n   ```python\n   import hashlib\n   import json\n   import os\n   import sys\n\n   from llama_cloud import LlamaCloud\n\n   DATA_DIR = \"/home/user/incremental_ingest/data\"\n   PRIOR_PATH = \"/home/user/incremental_ingest/prior_manifest.json\"\n   CURRENT_PATH = \"/home/user/incremental_ingest/current_manifest.json\"\n   PLAN_PATH = \"/home/user/incremental_ingest/upload_plan.json\"\n\n\n   def sha256_of_file(path: str) -\u003e str:\n       h = hashlib.sha256()\n       with open(path, \"rb\") as f:\n           for chunk in iter(lambda: f.read(65536), b\"\"):\n               h.update(chunk)\n       return h.hexdigest()\n\n\n   def build_manifest(root: str) -\u003e dict:\n       files = {}\n       for dirpath, _dirnames, filenames in os.walk(root):\n           for name in filenames:\n               abs_path = os.path.join(dirpath, name)\n               rel = os.path.relpath(abs_path, root).replace(os.sep, \"/\")\n               files[rel] = {\n                   \"sha256\": sha256_of_file(abs_path),\n                   \"size\": os.path.getsize(abs_path),\n               }\n       return {\"files\": dict(sorted(files.items()))}\n\n\n   def main() -\u003e int:\n       api_key = os.environ.get(\"LLAMA_CLOUD_API_KEY\", \"\").strip()\n       if not api_key:\n           print(\"LLAMA_CLOUD_API_KEY is not set\", file=sys.stderr)\n           return 2\n\n       # Sanity-check the SDK — do NOT make any network calls.\n       _client = LlamaCloud(token=api_key)\n\n       current = build_manifest(DATA_DIR)\n       with open(CURRENT_PATH, \"w\", encoding=\"utf-8\") as f:\n           json.dump(current, f, indent=2)\n\n       with open(PRIOR_PATH, \"r\", encoding=\"utf-8\") as f:\n           prior = json.load(f)\n\n       cur_files = current[\"files\"]\n       old_files = prior.get(\"files\", {})\n\n       added = sorted(set(cur_files) - set(old_files))\n       removed = sorted(set(old_files) - set(cur_files))\n       common = set(cur_files) \u0026 set(old_files)\n       modified = sorted(\n           k for k in common if cur_files[k][\"sha256\"] != old_files[k][\"sha256\"]\n       )\n       unchanged = sorted(\n           k for k in common if cur_files[k][\"sha256\"] == old_files[k][\"sha256\"]\n       )\n\n       to_upload = sorted(set(added) | set(modified))\n\n       plan = {\n           \"to_upload\": to_upload,\n           \"to_delete\": removed,\n           \"unchanged\": unchanged,\n           \"added\": added,\n           \"modified\": modified,\n           \"summary\": {\n               \"added\": len(added),\n               \"modified\": len(modified),\n               \"removed\": len(removed),\n               \"unchanged\": len(unchanged),\n               \"total_current\": len(cur_files),\n               \"total_prior\": len(old_files),\n           },\n       }\n       with open(PLAN_PATH, \"w\", encoding=\"utf-8\") as f:\n           json.dump(plan, f, indent=2)\n\n       print(\n           f\"added={len(added)} modified={len(modified)} removed={len(removed)} unchanged={len(unchanged)}\"\n       )\n       return 0\n\n\n   sys.exit(main())\n   ```\n3. Run the script:\n   ```bash\n   cd /home/user/incremental_ingest\n   python3 sync.py\n   ```\n   This must produce both `current_manifest.json` and `upload_plan.json`.\n\n## Constraints\n- Project path: `/home/user/incremental_ingest`\n- Script path: `/home/user/incremental_ingest/sync.py`\n- Output files: `/home/user/incremental_ingest/current_manifest.json` and `/home/user/incremental_ingest/upload_plan.json`\n- Use the official `llama_cloud` Python SDK (`from llama_cloud import LlamaCloud`). Do NOT call any LlamaCloud HTTP endpoint via `requests` or `curl`.\n- Do NOT hardcode the API key — always read `LLAMA_CLOUD_API_KEY` from the environment.\n- All file keys in the manifests and in `upload_plan.json` must be POSIX-style relative paths (use `/`, never `\\\\`).\n- All list fields inside `upload_plan.json` MUST be sorted alphabetically.\n- SHA-256 digests MUST be lower-case hex.\n- The script must not make any network calls to LlamaCloud.\n\n## Integrations\n- LlamaCloud — requires the `LLAMA_CLOUD_API_KEY` environment variable (any non-empty string is acceptable; no outbound network call is made).\n"])</script><script>self.__next_f.push([1,"10:T11d5,"])</script><script>self.__next_f.push([1,"# Parse a PDF Once, then Retrieve Plain Text from the Same Job\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. Its `llama-cloud` Python SDK exposes LlamaParse, an agentic document parser. A powerful — and often overlooked — capability is that **parse results are persisted on the server**: you can run a parse job once with a minimal `expand` list (saving response size and download time), and then later call `client.parsing.get(job_id=..., expand=[...])` to retrieve *additional* representations of the same job (markdown, plain text, items, etc.) **without re-parsing the file**.\n\nIn this task you must implement this two-stage retrieval pattern: parse the PDF once for full markdown, persist the `job_id`, and then make a second call against the same `job_id` to fetch the full plain-text rendering of the same job. This avoids paying for parsing twice when downstream consumers need both markdown and plain text.\n\n## Requirements\nCreate a single Python script at `/home/user/llama_task/parse_and_retrieve.py` that:\n\n1. Imports the `LlamaCloud` client from the `llama_cloud` SDK (i.e. `from llama_cloud import LlamaCloud`).\n2. Authenticates using the `LLAMA_CLOUD_API_KEY` environment variable. Instantiate `LlamaCloud()` with no arguments — the SDK reads the key from the environment automatically. **Do NOT hardcode the API key in the script.**\n3. Stage 1 — Parse:\n   - Uploads `/home/user/llama_task/report.pdf` with `client.files.create(file=\"./report.pdf\", purpose=\"parse\")`.\n   - Calls `client.parsing.parse(file_id=\u003cuploaded.id\u003e, tier=\"agentic\", version=\"latest\", expand=[\"markdown_full\"])`. The SDK blocks until the job finishes.\n   - Writes the parsed full markdown (`result.markdown_full`) to `/home/user/llama_task/output.md` (UTF-8).\n   - Writes the parse job's id (`result.job.id`) to `/home/user/llama_task/job_id.txt` (UTF-8, no trailing newline required).\n4. Stage 2 — Retrieve text from the same job (without re-parsing):\n   - Calls `client.parsing.get(job_id=\u003cresult.job.id\u003e, expand=[\"text_full\"])`.\n   - Writes the returned plain text (`text_result.text_full`) to `/home/user/llama_task/output.txt` (UTF-8).\n5. The script must NOT upload `report.pdf` a second time and must NOT call `client.parsing.parse(...)` a second time. The plain text MUST come from `client.parsing.get(...)` against the previously-obtained `job_id`.\n\n## Implementation Guide\n1. `cd /home/user/llama_task`.\n2. Create `parse_and_retrieve.py` with logic similar to:\n   ```python\n   from llama_cloud import LlamaCloud\n\n   client = LlamaCloud()  # reads LLAMA_CLOUD_API_KEY from the environment\n\n   # Stage 1: upload + parse, asking only for full markdown\n   uploaded = client.files.create(file=\"./report.pdf\", purpose=\"parse\")\n   result = client.parsing.parse(\n       file_id=uploaded.id,\n       tier=\"agentic\",\n       version=\"latest\",\n       expand=[\"markdown_full\"],\n   )\n\n   job_id = result.job.id\n   with open(\"output.md\", \"w\", encoding=\"utf-8\") as f:\n       f.write(result.markdown_full)\n   with open(\"job_id.txt\", \"w\", encoding=\"utf-8\") as f:\n       f.write(job_id)\n\n   # Stage 2: retrieve a different representation of the SAME job, no re-parsing\n   text_result = client.parsing.get(job_id=job_id, expand=[\"text_full\"])\n   with open(\"output.txt\", \"w\", encoding=\"utf-8\") as f:\n       f.write(text_result.text_full)\n   ```\n3. Run the script once: `python3 parse_and_retrieve.py`.\n4. Confirm that `output.md`, `output.txt`, and `job_id.txt` were all written in `/home/user/llama_task`.\n\n## Constraints\n- Project path: `/home/user/llama_task`\n- Input file: `/home/user/llama_task/report.pdf` (already provided)\n- Script path: `/home/user/llama_task/parse_and_retrieve.py`\n- Output files (all UTF-8):\n  - `/home/user/llama_task/output.md` — full markdown (from `result.markdown_full`)\n  - `/home/user/llama_task/output.txt` — full plain text (from `text_result.text_full` returned by `client.parsing.get`)\n  - `/home/user/llama_task/job_id.txt` — the parse job id returned by stage 1\n- Use the `llama-cloud` SDK (`from llama_cloud import LlamaCloud`). Do NOT call the REST API directly with `curl`, `requests`, or `httpx`.\n- The script must rely on `LLAMA_CLOUD_API_KEY` from the environment — no hardcoded `llx-...` literal.\n- `client.parsing.parse(...)` MUST be invoked exactly once. The plain-text rendering MUST come from `client.parsing.get(job_id=..., expand=[\"text_full\"])` against the job returned by stage 1.\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires the `LLAMA_CLOUD_API_KEY` environment variable.\n"])</script><script>self.__next_f.push([1,"11:Tc62,"])</script><script>self.__next_f.push([1,"# Parse a Multi-Page PDF to Per-Page JSON with LlamaParse\n\n## Background\nYou are building an ingestion pipeline that needs page-level granularity for downstream chunking and citation. Plain combined Markdown is not enough — each page must remain individually addressable so that retrieval results can cite specific pages of the source document. The team uses LlamaCloud's LlamaParse service.\n\nA pre-existing multi-page PDF is available at `/home/user/myproject/report.pdf` (3 pages). The Python packages `llama-cloud-services` and `llama-cloud` are pre-installed, and the API key is available via the `LLAMA_CLOUD_API_KEY` environment variable.\n\n## Requirements\n- Implement a Python script at `/home/user/myproject/parse_pages.py`.\n- The script must call the LlamaCloud LlamaParse SDK (either `llama_cloud_services.LlamaParse` or the `llama_cloud.LlamaCloud` client) to parse `/home/user/myproject/report.pdf` with Markdown output.\n- The script must write the per-page parsed Markdown to `/home/user/myproject/pages.json` as a JSON document with this exact top-level structure:\n  ```json\n  {\n    \"source\": \"report.pdf\",\n    \"page_count\": \u003ctotal number of pages\u003e,\n    \"pages\": [\n      {\"page\": 1, \"markdown\": \"...page 1 markdown...\"},\n      {\"page\": 2, \"markdown\": \"...page 2 markdown...\"},\n      {\"page\": 3, \"markdown\": \"...page 3 markdown...\"}\n    ]\n  }\n  ```\n  - `pages` MUST be a JSON list of objects.\n  - Each object MUST have an integer `page` field that is 1-indexed and matches the page number, and a non-empty string `markdown` field with that page's parsed content.\n  - `pages` MUST be ordered by ascending page number (1, 2, 3).\n  - `page_count` MUST equal the length of `pages`.\n- Running the script must produce the JSON file. Use `python3 parse_pages.py` as the entry point.\n\n## Implementation Guide\n1. Read the API key from the `LLAMA_CLOUD_API_KEY` environment variable (the SDK reads it automatically).\n2. Parse `/home/user/myproject/report.pdf` with LlamaParse and request per-page Markdown output. Two valid approaches:\n   - `llama_cloud_services.LlamaParse(result_type=\"markdown\").load_data(\"/home/user/myproject/report.pdf\")` returns one `Document` per page; use `documents[i].text` and 1-indexed page numbers.\n   - `llama_cloud.LlamaCloud()` with `client.files.create(...)` and `client.parsing.parse(file_id=..., tier=\"agentic\", version=\"latest\", expand=[\"markdown\"])`; the result exposes `result.markdown.pages`, each having a `markdown` attribute.\n3. Build the JSON structure described above, ordered by ascending page number.\n4. Write it to `/home/user/myproject/pages.json` using `json.dump(...)` with UTF-8 encoding.\n5. Execute the script once so that `pages.json` exists when verification runs.\n\n## Constraints\n- Project path: /home/user/myproject\n- Output file: /home/user/myproject/pages.json\n- The script must perform a real LlamaParse API call — do not hardcode the Markdown content.\n- Do not modify `/home/user/myproject/report.pdf`.\n- The script must exit with code 0 when invoked as `python3 /home/user/myproject/parse_pages.py`.\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires `LLAMA_CLOUD_API_KEY` set in the environment.\n"])</script><script>self.__next_f.push([1,"12:Tf03,"])</script><script>self.__next_f.push([1,"# Preserve Hyperlink Destinations When Parsing a PDF with LlamaParse (`annotate_links`)\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. Its agentic document parser, LlamaParse, converts visually rich PDFs into clean markdown. By default LlamaParse renders link **anchor text** in the markdown output, but the underlying URLs are dropped — which is unhelpful for downstream RAG pipelines that want to retain citations and follow-up references.\n\nFlipping `output_options.markdown.annotate_links` to `True` instructs LlamaParse to preserve link destinations in the rendered markdown (so a hyperlink that says \"Visit our docs\" pointing at `https://example.com/docs` is rendered as a markdown link such as `[Visit our docs](https://example.com/docs)` instead of plain text).\n\nIn this task you must build a small pipeline that parses a single-page PDF containing two embedded hyperlinks and writes the link-annotated markdown to disk so the URLs are retained.\n\n## Requirements\nWrite a Python script `parse_with_links.py` that uses the `llama-cloud` SDK (`from llama_cloud import LlamaCloud`) to:\n  1. Upload the local PDF `references.pdf` to LlamaCloud with `purpose=\"parse\"`.\n  2. Submit a parse job with all of the following options:\n     - `tier=\"agentic\"`\n     - `version=\"latest\"`\n     - `output_options={\"markdown\": {\"annotate_links\": True}}` (so the URL of every hyperlink in the PDF is preserved in the rendered markdown)\n     - `expand=[\"markdown\"]`\n  3. Concatenate the `markdown` field of every page returned by the parser (`result.markdown.pages`) in order, using a single newline as the separator between pages.\n  4. Write that concatenated markdown to `links_output.md` in the same directory (UTF-8 encoded).\n\nThe script must authenticate via the `LLAMA_CLOUD_API_KEY` environment variable (the SDK reads it automatically when `LlamaCloud()` is instantiated with no arguments). Do NOT hardcode an API key.\n\n## Implementation Guide\n1. Change into the project directory `/home/user/links_task`.\n2. Create `parse_with_links.py` with logic similar to:\n   ```python\n   from llama_cloud import LlamaCloud\n\n   client = LlamaCloud()  # reads LLAMA_CLOUD_API_KEY from the environment\n   uploaded = client.files.create(file=\"./references.pdf\", purpose=\"parse\")\n   result = client.parsing.parse(\n       file_id=uploaded.id,\n       tier=\"agentic\",\n       version=\"latest\",\n       output_options={\n           \"markdown\": {\"annotate_links\": True},\n       },\n       expand=[\"markdown\"],\n   )\n\n   parts = [(p.markdown or \"\") for p in result.markdown.pages]\n   combined = \"\\n\".join(parts)\n   with open(\"links_output.md\", \"w\", encoding=\"utf-8\") as f:\n       f.write(combined)\n   ```\n3. Execute the script with `python3 parse_with_links.py` from `/home/user/links_task`. The script will block until LlamaCloud finishes parsing and then writes the markdown file.\n4. Confirm that `links_output.md` has been written.\n\n## Constraints\n- Project path: `/home/user/links_task`\n- Input file: `/home/user/links_task/references.pdf` (already provided — a 1-page PDF with two embedded hyperlinks)\n- Output file: `/home/user/links_task/links_output.md`\n- Script path: `/home/user/links_task/parse_with_links.py`\n- Use the `llama-cloud` SDK (the `LlamaCloud` client class). Do NOT call the REST API directly with `curl` or `requests`.\n- The parse call MUST pass `output_options` with `markdown.annotate_links` set to `True`. This is the documented switch that preserves link destinations in the rendered markdown.\n- The script must rely on `LLAMA_CLOUD_API_KEY` from the environment, not hardcoded.\n- The resulting `links_output.md` must preserve both source URLs verbatim: `https://example.com/docs` and `https://llamaindex.ai`.\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires the `LLAMA_CLOUD_API_KEY` environment variable.\n"])</script><script>self.__next_f.push([1,"13:Ta16,"])</script><script>self.__next_f.push([1,"# Parse a PDF Report to Markdown with LlamaParse\n\n## Background\nLlamaCloud is LlamaIndex's managed platform for production-grade document parsing and retrieval. Its `llama-cloud` Python SDK exposes LlamaParse, an agentic document parser that turns PDFs into clean, structured markdown that downstream RAG pipelines can consume.\n\nIn this task you must build a small parsing pipeline that takes a pre-existing PDF report and produces a markdown rendering of its first page using the LlamaCloud SDK.\n\n## Requirements\n- Write a Python script `parse_report.py` that uses the `llama-cloud` SDK (`from llama_cloud import LlamaCloud`) to:\n  1. Upload the local PDF `report.pdf` to LlamaCloud with `purpose=\"parse\"`.\n  2. Submit a parse job using `tier=\"agentic\"`, `version=\"latest\"`, and `expand=[\"markdown\"]`.\n  3. Read the markdown text for the first page of the parsed result (i.e. `result.markdown.pages[0].markdown`).\n  4. Write that markdown text to `output.md` in the same directory.\n- The script must authenticate using the `LLAMA_CLOUD_API_KEY` environment variable (the SDK reads it automatically when `LlamaCloud()` is instantiated with no arguments).\n- Running the script must produce a non-empty `output.md`.\n\n## Implementation Guide\n1. Change into the project directory `/home/user/llama_task`.\n2. Create `parse_report.py` with logic similar to:\n   ```python\n   from llama_cloud import LlamaCloud\n\n   client = LlamaCloud()  # reads LLAMA_CLOUD_API_KEY from the environment\n   uploaded = client.files.create(file=\"./report.pdf\", purpose=\"parse\")\n   result = client.parsing.parse(\n       file_id=uploaded.id,\n       tier=\"agentic\",\n       version=\"latest\",\n       expand=[\"markdown\"],\n   )\n   first_page_md = result.markdown.pages[0].markdown\n   with open(\"output.md\", \"w\", encoding=\"utf-8\") as f:\n       f.write(first_page_md)\n   ```\n3. Execute the script with `python3 parse_report.py` from `/home/user/llama_task`. The script will block until LlamaCloud finishes parsing and returns the result.\n4. Confirm that `output.md` was written.\n\n## Constraints\n- Project path: `/home/user/llama_task`\n- Input file: `/home/user/llama_task/report.pdf` (already provided)\n- Output file: `/home/user/llama_task/output.md`\n- Script path: `/home/user/llama_task/parse_report.py`\n- Use the `llama-cloud` SDK (the `LlamaCloud` client class). Do NOT call the REST API directly with `curl` or `requests`.\n- The script must rely on `LLAMA_CLOUD_API_KEY` from the environment, not hardcoded.\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires the `LLAMA_CLOUD_API_KEY` environment variable.\n"])</script><script>self.__next_f.push([1,"14:Te69,"])</script><script>self.__next_f.push([1,"# Parse Only Specific Pages of a PDF with LlamaParse (`page_ranges.target_pages`)\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. Its agentic document parser, LlamaParse, turns visually rich PDFs into clean markdown. By default LlamaParse parses every page of a document, which is wasteful when you only need a subset. For partial parses, the `parsing.parse` API accepts a top-level `page_ranges` argument with a `target_pages` field that takes a comma-separated string of **1-based** page numbers and ranges (e.g. `\"1,3,7-12\"`). Pages outside of that selection are skipped entirely and their content does not appear in the result.\n\nIn this task you must build a small parsing pipeline that takes a pre-existing 4-page PDF (`catalog.pdf`) and parses only **pages 1 and 3** using the `llama-cloud` Python SDK, then writes the combined markdown text of those two pages to `selected_pages.md`.\n\n## Requirements\nWrite a Python script `parse_selected.py` that uses the `llama-cloud` SDK (`from llama_cloud import LlamaCloud`) to:\n  1. Upload the local PDF `catalog.pdf` to LlamaCloud with `purpose=\"parse\"`.\n  2. Submit a parse job with all of the following options:\n     - `tier=\"agentic\"`\n     - `version=\"latest\"`\n     - `page_ranges={\"target_pages\": \"1,3\"}` (LlamaParse must only parse pages 1 and 3)\n     - `expand=[\"markdown\"]`\n  3. Concatenate the `markdown` field of every page returned by the parser (`result.markdown.pages`) in order, using a single newline as the separator between pages.\n  4. Write that concatenated markdown to `selected_pages.md` in the same directory (UTF-8 encoded).\n\nThe script must authenticate via the `LLAMA_CLOUD_API_KEY` environment variable (the SDK reads it automatically when `LlamaCloud()` is instantiated with no arguments). Do NOT hardcode an API key.\n\n## Implementation Guide\n1. Change into the project directory `/home/user/catalog_task`.\n2. Create `parse_selected.py` with logic similar to:\n   ```python\n   from llama_cloud import LlamaCloud\n\n   client = LlamaCloud()  # reads LLAMA_CLOUD_API_KEY from the environment\n   uploaded = client.files.create(file=\"./catalog.pdf\", purpose=\"parse\")\n   result = client.parsing.parse(\n       file_id=uploaded.id,\n       tier=\"agentic\",\n       version=\"latest\",\n       page_ranges={\"target_pages\": \"1,3\"},\n       expand=[\"markdown\"],\n   )\n\n   parts = [(p.markdown or \"\") for p in result.markdown.pages]\n   combined = \"\\n\".join(parts)\n   with open(\"selected_pages.md\", \"w\", encoding=\"utf-8\") as f:\n       f.write(combined)\n   ```\n3. Execute the script with `python3 parse_selected.py` from `/home/user/catalog_task`. The script will block until LlamaCloud finishes parsing and then writes the markdown file.\n4. Confirm that `selected_pages.md` has been written.\n\n## Constraints\n- Project path: `/home/user/catalog_task`\n- Input file: `/home/user/catalog_task/catalog.pdf` (already provided — a 4-page PDF)\n- Output file: `/home/user/catalog_task/selected_pages.md`\n- Script path: `/home/user/catalog_task/parse_selected.py`\n- Use the `llama-cloud` SDK (the `LlamaCloud` client class). Do NOT call the REST API directly with `curl` or `requests`.\n- The parse call MUST pass `page_ranges` with `target_pages=\"1,3\"`. Do NOT pass `target_pages` as a top-level keyword argument; it belongs inside `page_ranges`.\n- The script must rely on `LLAMA_CLOUD_API_KEY` from the environment, not hardcoded.\n- The output `selected_pages.md` must only contain content from pages 1 and 3 of the source PDF. Content unique to pages 2 and 4 (the words `Bracket` and `Dynamo`) must NOT appear.\n\n## Integrations\n- LlamaCloud (LlamaParse) — requires the `LLAMA_CLOUD_API_KEY` environment variable.\n"])</script><script>self.__next_f.push([1,"15:T1486,"])</script><script>self.__next_f.push([1,"# Region-Aware LlamaCloud Client Factory\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. It is deployed in two regions:\n\n| Region | API base URL |\n| --- | --- |\n| North America (NA) | `https://api.cloud.llamaindex.ai` |\n| Europe (EU) | `https://api.cloud.eu.llamaindex.ai` |\n\nThe `llama_cloud` Python SDK's `LlamaCloud` client defaults to the NA endpoint. If your organization (and your API key) live in EU, you **must** pass `base_url='https://api.cloud.eu.llamaindex.ai'` when constructing the client, otherwise every request will fail with an authentication error. This is one of the most common LlamaCloud setup mistakes.\n\nIn this task you will build a small, region-aware client factory and a runner script that resolves the right base URL based on a `region` argument and constructs a properly-configured `LlamaCloud` client.\n\n## Requirements\nCreate two files inside the project directory `/home/user/region_setup`:\n\n### 1. `client_factory.py`\nA reusable module that defines all of the following at module top level:\n\n- A constant `NA_BASE_URL` set to the string `\"https://api.cloud.llamaindex.ai\"`.\n- A constant `EU_BASE_URL` set to the string `\"https://api.cloud.eu.llamaindex.ai\"`.\n- A function `resolve_base_url(region: str) -\u003e str` that:\n  - Returns `EU_BASE_URL` when `region` (stripped and lower-cased) is exactly the string `\"eu\"`.\n  - Returns `NA_BASE_URL` for any other input (e.g. `\"na\"`, `\"us\"`, `\"NA\"`, `\"default\"`, or an empty string).\n- A function `make_client(region: str) -\u003e LlamaCloud` that:\n  - Imports `LlamaCloud` from the `llama_cloud` SDK (i.e. `from llama_cloud import LlamaCloud`).\n  - Reads the API key from the `LLAMA_CLOUD_API_KEY` environment variable (do NOT hardcode it; use `os.environ[\"LLAMA_CLOUD_API_KEY\"]`).\n  - Calls `resolve_base_url(region)` to pick the correct base URL.\n  - Returns `LlamaCloud(token=\u003capi_key\u003e, base_url=\u003cbase_url\u003e)`.\n\n### 2. `run.py`\nA runner script that exercises the factory:\n\n- It takes a single positional command-line argument: the region string (`sys.argv[1]`).\n- It imports `make_client` and `resolve_base_url` from `client_factory`.\n- It calls `make_client(region)` (which sanity-checks that the client can be constructed).\n- It builds a JSON payload of the form:\n  ```json\n  {\n    \"region\": \"\u003cinput region\u003e\",\n    \"base_url\": \"\u003cresolved base url\u003e\",\n    \"client_type\": \"\u003cclass name of the returned client\u003e\"\n  }\n  ```\n  where `client_type` must equal `\"LlamaCloud\"` (i.e. `type(client).__name__`).\n- It writes that payload to a file named `resolved_\u003cregion\u003e.json` inside `/home/user/region_setup`, encoded as UTF-8 with `indent=2`.\n\n## Implementation Guide\n1. `cd /home/user/region_setup`.\n2. Create `client_factory.py` with the constants and the two functions described above. Reference implementation:\n   ```python\n   import os\n   from llama_cloud import LlamaCloud\n\n   NA_BASE_URL = \"https://api.cloud.llamaindex.ai\"\n   EU_BASE_URL = \"https://api.cloud.eu.llamaindex.ai\"\n\n   def resolve_base_url(region: str) -\u003e str:\n       if (region or \"\").strip().lower() == \"eu\":\n           return EU_BASE_URL\n       return NA_BASE_URL\n\n   def make_client(region: str) -\u003e LlamaCloud:\n       api_key = os.environ[\"LLAMA_CLOUD_API_KEY\"]\n       base_url = resolve_base_url(region)\n       return LlamaCloud(token=api_key, base_url=base_url)\n   ```\n3. Create `run.py`:\n   ```python\n   import json\n   import os\n   import sys\n\n   from client_factory import make_client, resolve_base_url\n\n\n   def main() -\u003e None:\n       region = sys.argv[1]\n       client = make_client(region)\n       payload = {\n           \"region\": region,\n           \"base_url\": resolve_base_url(region),\n           \"client_type\": type(client).__name__,\n       }\n       out_path = os.path.join(\n           os.path.dirname(os.path.abspath(__file__)),\n           f\"resolved_{region}.json\",\n       )\n       with open(out_path, \"w\", encoding=\"utf-8\") as f:\n           json.dump(payload, f, indent=2)\n\n\n   main()\n   ```\n4. Run the script once for each region:\n   ```bash\n   python3 run.py na\n   python3 run.py eu\n   ```\n   This must produce both `resolved_na.json` and `resolved_eu.json` in `/home/user/region_setup`.\n\n## Constraints\n- Project path: `/home/user/region_setup`\n- Module path: `/home/user/region_setup/client_factory.py`\n- Runner path: `/home/user/region_setup/run.py`\n- Output files: `/home/user/region_setup/resolved_na.json` and `/home/user/region_setup/resolved_eu.json`\n- Use the official `llama_cloud` SDK (import `from llama_cloud import LlamaCloud`). Do NOT call the REST API directly with `curl` or `requests`.\n- Do NOT hardcode the API key — always read `LLAMA_CLOUD_API_KEY` from the environment.\n- The base URLs in `client_factory.py` must be exact string literals (no trailing slash, no `http://`):\n  - `NA_BASE_URL == \"https://api.cloud.llamaindex.ai\"`\n  - `EU_BASE_URL == \"https://api.cloud.eu.llamaindex.ai\"`\n- Region matching in `resolve_base_url` must be case-insensitive but only the literal `\"eu\"` (after `strip().lower()`) selects EU. All other inputs MUST fall back to NA.\n\n## Integrations\n- LlamaCloud — requires the `LLAMA_CLOUD_API_KEY` environment variable (any non-empty string is acceptable for construction; no network call is made during client instantiation).\n"])</script><script>self.__next_f.push([1,"16:T16a8,"])</script><script>self.__next_f.push([1,"# Summarize a Multi-Page PDF with LlamaParse Using HTML Table Output\n\n## Background\nLlamaCloud is LlamaIndex's managed RAG-as-a-Service platform. Its ag
