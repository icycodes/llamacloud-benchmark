macloud-benchmark/pr-preview/pr-5/_next/static/chunks/3ecbb78a8ff87549.js\",\"/llamacloud-benchmark/pr-preview/pr-5/_next/static/chunks/28c0ea01e9ff9346.js\",\"/llamacloud-benchmark/pr-preview/pr-5/_next/static/chunks/be08138953094657.js\"],\"TasksPageClient\"]\n16:I[9986,[\"/llamacloud-benchmark/pr-preview/pr-5/_next/static/chunks/d2c13bb33c4fcd54.js\",\"/llamacloud-benchmark/pr-preview/pr-5/_next/static/chunks/c21188132e0e0d48.js\"],\"default\"]\n:HL[\"/llamacloud-benchmark/pr-preview/pr-5/_next/static/chunks/8559b4084af3d173.css\",\"style\"]\n:HL[\"/llamacloud-benchmark/pr-preview/pr-5/_next/static/media/83afe278b6a6bb3c-s.p.3a6ba036.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n8:T1a9f,"])</script><script>self.__next_f.push([1,"# Classify a Folder of Documents with LlamaClassify (Python)\n\n## Background\nYou are building a small intake automation prototype on **LlamaCloud** that needs to triage incoming business documents into three categories: **invoices**, **receipts**, and **contracts**. Instead of writing hand-tuned regexes, you will use **LlamaClassify** — the natural-language document classification service exposed by the official `llama-cloud` Python SDK — to label each document with a `type`, `confidence`, and `reasoning`.\n\nLlamaClassify is invoked via the `client.classifier.classify(...)` convenience method on a `llama_cloud.LlamaCloud` client. You pass a list of classification rules (each is a `{type, description}` natural-language rule), the API uploads-and-jobs are handled for you, and the response contains one classification result per file.\n\nThe `llama-cloud` Python SDK is already installed in the environment, the `LLAMA_CLOUD_API_KEY` environment variable is set, and three sample PDFs are pre-staged in `/home/user/myproject/docs/`:\n- `invoice.pdf` — a one-page invoice with an `INVOICE` header, an invoice number `INV-2024-0042`, a bill-to section, and a line-item table with subtotal, tax, and total.\n- `receipt.pdf` — a short single-page point-of-sale receipt from `Corner Cafe` showing two purchased items and a total amount.\n- `contract.pdf` — a one-page legal-style document headed `SERVICES AGREEMENT` between two parties, with clauses on `Scope of Work`, `Term`, and `Governing Law`.\n\nBecause this task may run multiple times concurrently against the shared LlamaCloud account, you must read the `trial_id` from `/logs/artifacts/trial_id` and tag the output artifacts with it. LlamaClassify itself is stateless per request (no global resource needs to carry the trial id), so only your output files have to include it.\n\n## Requirements\nWrite a Python script at `/home/user/myproject/classify_docs.py` that:\n- Reads the `trial_id` value from `/logs/artifacts/trial_id`.\n- Discovers every `*.pdf` file under `/home/user/myproject/docs/` (it should find at least the three pre-staged files).\n- Uploads each PDF to LlamaCloud with `client.files.create(file=..., purpose=\"classify\")` to obtain a `file_id` for each file.\n- Calls `client.classifier.classify(...)` **once** with the list of all uploaded `file_id`s and **three** natural-language rules covering:\n  - `type=\"invoice\"` — documents with an invoice number, bill-to section, and line-item totals.\n  - `type=\"receipt\"` — short point-of-sale receipts with merchant, items, and a total.\n  - `type=\"contract\"` — legal agreements with parties, clauses, and signature blocks.\n  Use the default `mode=\"FAST\"` (text-based classification is sufficient for this fixture).\n- Writes a JSON document to `/home/user/myproject/output.json` with the **exact** top-level shape:\n  ```json\n  {\n    \"trial_id\": \"\u003ctrial_id\u003e\",\n    \"total_files\": \u003cN\u003e,\n    \"results\": [\n      {\n        \"file_name\": \"invoice.pdf\",\n        \"type\": \"invoice\",\n        \"confidence\": 0.97,\n        \"reasoning\": \"\u003cshort string\u003e\"\n      },\n      ...\n    ]\n  }\n  ```\n  where:\n  - `trial_id` is the value read from `/logs/artifacts/trial_id`.\n  - `total_files` is the number of PDFs that were classified (an integer ≥ 3 for the staged fixture).\n  - `results` is a list with one entry per file. Each entry must contain at minimum the keys `file_name` (the basename of the source PDF, e.g. `\"invoice.pdf\"`), `type` (one of `invoice` / `receipt` / `contract`), `confidence` (a number), and `reasoning` (a non-empty string).\n- Writes a plain-text log to `/home/user/myproject/output.log` containing at minimum these lines (one fact per line):\n  - `trial_id: \u003ctrial_id\u003e`\n  - `total_files: \u003cN\u003e` — same integer as `total_files` in `output.json`.\n  - `invoice.pdf: invoice`\n  - `receipt.pdf: receipt`\n  - `contract.pdf: contract`\n  The three filename lines must use the format `\u003cfile_name\u003e: \u003cclassified_type\u003e` and must reflect the actual labels predicted by the service for each fixture PDF.\n\n## Implementation Hints\n- Instantiate the synchronous client with `from llama_cloud import LlamaCloud` followed by `client = LlamaCloud()`. The SDK reads `LLAMA_CLOUD_API_KEY` from the environment automatically.\n- Use `pathlib.Path(\"/home/user/myproject/docs\").glob(\"*.pdf\")` (or equivalent) to discover the input PDFs, sort the resulting list for deterministic ordering, and remember the mapping from each `file_id` back to its source filename — you will need it when writing `output.json` and `output.log`.\n- Open each file in binary mode (e.g. `open(path, \"rb\")`) and pass it to `client.files.create(file=..., purpose=\"classify\")`. The returned object exposes `.id`.\n- The `client.classifier.classify(...)` convenience method handles job submission and polling for you; it returns a result with an `items` attribute. Each `item` exposes `.file_id` and (when successful) `.result` with `.type`, `.confidence`, and `.reasoning`. Always check that `item.result` is not `None` before using it.\n- Write JSON with `json.dump(obj, f, indent=2)` so the file is human-readable, and write the log with simple `\\n`-separated lines.\n- The script must run end to end with `python3 classify_docs.py` from `/home/user/myproject` and exit with status code `0`.\n\n## Acceptance Criteria\n- Project path: `/home/user/myproject`\n- Script path: `/home/user/myproject/classify_docs.py`\n- Command: `python3 classify_docs.py` (run from `/home/user/myproject`)\n- The script must exit with return code `0`.\n- Output files created by the script:\n  - `/home/user/myproject/output.json` — must be valid JSON with the top-level shape described above:\n    - `trial_id` (string) equal to the value at `/logs/artifacts/trial_id`.\n    - `total_files` (integer) equal to the number of `*.pdf` files under `/home/user/myproject/docs/` (≥ 3).\n    - `results` (list) with one entry per PDF; each entry contains the keys `file_name`, `type`, `confidence`, and `reasoning`.\n    - For each of the three fixture files, the entry whose `file_name` equals `invoice.pdf` must have `type == \"invoice\"`, the entry whose `file_name` equals `receipt.pdf` must have `type == \"receipt\"`, and the entry whose `file_name` equals `contract.pdf` must have `type == \"contract\"`. Comparisons are case-insensitive and whitespace-trimmed on the `type` value.\n  - `/home/user/myproject/output.log` — must contain:\n    - A line in the format `trial_id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` is the exact value at `/logs/artifacts/trial_id`.\n    - A line in the format `total_files: \u003cN\u003e` where `\u003cN\u003e` parses as an integer ≥ 3.\n    - A line `invoice.pdf: invoice` (case-insensitive match on the type).\n    - A line `receipt.pdf: receipt` (case-insensitive match on the type).\n    - A line `contract.pdf: contract` (case-insensitive match on the type).\n\n"])</script><script>self.__next_f.push([1,"9:T1642,"])</script><script>self.__next_f.push([1,"# Cross-Index Retrieval with `LlamaCloudCompositeRetriever`\n\n## Background\nYou are building a small Retrieval-Augmented Generation (RAG) prototype on **LlamaCloud** that needs to answer questions whose evidence is spread across **two separate managed indices**. LlamaCloud exposes a dedicated `LlamaCloudCompositeRetriever` class that lets you query several `LlamaCloudIndex` instances together and rerank the unioned nodes server-side, without needing a separate LLM API key (we use `CompositeRetrievalMode.FULL`).\n\nThe Python SDKs `llama-index-core` and `llama-cloud-services` are already installed in the environment. The LlamaCloud account is already provisioned and the API key is exposed via the environment variable `LLAMA_CLOUD_API_KEY`. The default project name to use is `Default`.\n\nTwo pre-staged, plain-text corpora exist on disk:\n\n- `/home/user/myproject/docs_astronomy/` contains a file describing a fictional internal initiative named **Project Aurora**, whose stated mission is to *catalog every star in the Milky Way*.\n- `/home/user/myproject/docs_cooking/` contains a short **Honey Lemon Tea** recipe that boils 250 ml of water with honey and lemon juice.\n\nBecause this task may run multiple times concurrently against the same LlamaCloud project, every externally visible name **MUST be unique per trial run**: read the `trial_id` from `/logs/artifacts/trial_id` and append it as a suffix to every base name listed below.\n\n## Requirements\nWrite a Python script at `/home/user/myproject/build_composite.py` that:\n- Reads the `trial_id` value from `/logs/artifacts/trial_id`.\n- Builds two **separate** managed `LlamaCloudIndex` instances against project `Default`, using documents loaded from the two pre-staged folders:\n  - From `/home/user/myproject/docs_astronomy/` create an index named `harbor-cmp-astro-\u003ctrial_id\u003e`.\n  - From `/home/user/myproject/docs_cooking/` create an index named `harbor-cmp-cook-\u003ctrial_id\u003e`.\n- Creates a `LlamaCloudCompositeRetriever` in the same project with:\n  - `name = \"harbor-cmp-retriever-\u003ctrial_id\u003e\"`,\n  - `create_if_not_exists = True`,\n  - `mode = CompositeRetrievalMode.FULL`,\n  - `rerank_top_n = 5`.\n- Attaches **both** indices to the composite retriever via `add_index(...)`. Provide a short, distinguishing `description` for each (for example, `\"Astronomy notes about Project Aurora\"` and `\"Cooking recipes including Honey Lemon Tea\"`).\n- Uses the composite retriever to retrieve nodes for **two** queries (in this exact order):\n  1. `astronomy_query`: `What is the mission of Project Aurora?`\n  2. `cooking_query`: `How do you make Honey Lemon Tea?`\n- Writes a Markdown summary to `/home/user/myproject/output.md` containing the headings below (in this order) and the **full text of the top-1 retrieved node** under each sub-heading:\n  - `# LlamaCloud Composite Retrieval Result`\n  - `## Astronomy Query Top Node`\n  - `## Cooking Query Top Node`\n- Writes a plain-text log to `/home/user/myproject/output.log` containing at minimum the following five lines (one fact per line), using the actual `trial_id` value:\n  - `trial_id: \u003ctrial_id\u003e`\n  - `astro_index_name: harbor-cmp-astro-\u003ctrial_id\u003e`\n  - `cook_index_name: harbor-cmp-cook-\u003ctrial_id\u003e`\n  - `composite_retriever_name: harbor-cmp-retriever-\u003ctrial_id\u003e`\n  - `astro_num_retrieved: \u003cNa\u003e` and `cook_num_retrieved: \u003cNc\u003e` where each is a positive integer giving the number of nodes returned for that query.\n\n## Implementation Hints\n- Import `LlamaCloudIndex` and `LlamaCloudCompositeRetriever` from `llama_cloud_services` (they are re-exported there), and `CompositeRetrievalMode` from `llama_cloud`.\n- Use `from llama_index.core import SimpleDirectoryReader` to load each folder into a list of `Document` objects.\n- `LlamaCloudIndex.from_documents(documents, name=..., project_name=\"Default\", api_key=...)` blocks until ingestion is finished and returns a ready-to-use index.\n- The composite retriever's `.retrieve(query)` method returns a list of `NodeWithScore` objects; ea t/extract_invoice.py` that:\n- Reads the `trial_id` value from `/logs/artifacts/trial_id`.\n- Defines a **Pydantic** schema for the invoice. The model **MUST** include at least the following fields with reasonable types and field descriptions:\n  - `invoice_number` (string)\n  - `invoice_date` (string in `YYYY-MM-DD` form is acceptable)\n  - `vendor_name` (string)\n  - `customer_name` (string)\n  - `subtotal` (number)\n  - `tax` (number)\n  - `total` (number)\n  - `line_items` — a list of nested objects, each with at least `description` (string), `quantity` (number), `unit_price` (number), and `amount` (number).\n- Uploads `/home/user/myproject/invoice.pdf` to LlamaCloud with `client.files.create(file=..., purpose=\"extract\")`.\n- Submits an extraction job with `client.extract.create(file_input=\u003cfile_id\u003e, configuration={\"data_schema\": Invoice.model_json_schema(), \"extraction_target\": \"per_doc\", \"tier\": \"agentic\"})`.\n- Polls the job (e.g. with `client.extract.get(job.id)`) until the status reaches a terminal state. The job must end in status `COMPLETED`; if it ends in `FAILED` or `CANCELLED`, the script must raise an error and exit non-zero.\n- Writes the structured extraction result as a single JSON document to `/home/user/myproject/invoice.json` with the exact top-level shape:\n  ```json\n  {\n    \"trial_id\": \"\u003ctrial_id\u003e\",\n    \"job_id\": \"\u003cthe LlamaExtract job id\u003e\",\n    \"status\": \"COMPLETED\",\n    \"data\": { /* the extracted invoice object (the single per-doc result) */ }\n  }\n  ```\n  where `data` is the single per-document extraction result returned by the service (it must be a JSON object, **not** wrapped in a list, even though `job.extract_result` may itself be a list of per-document results).\n- Writes a plain-text log to `/home/user/myproject/output.log` containing at minimum these four lines (one fact per line):\n  - `trial_id: \u003ctrial_id\u003e`\n  - `job_status: COMPLETED`\n  - `invoice_number: \u003cthe extracted invoice number\u003e`\n  - `total: \u003cthe extracted total as a decimal number\u003e`\n\n## Implementation Hints\n- Import the synchronous client with `from llama_cloud import LlamaCloud` and the schema base with `from pydantic import BaseModel, Field`. The client picks up `LLAMA_CLOUD_API_KEY` from the environment automatically.\n- `client.extract.create(...)` returns a job object that exposes `.id`, `.status`, and (once finished) `.extract_result`. Status moves through `PENDING` -\u003e `RUNNING` -\u003e `COMPLETED`. Poll with `client.extract.get(job.id)` until `status` is in `{\"COMPLETED\", \"FAILED\", \"CANCELLED\"}`; sleep ~2 seconds between polls.\n- `job.extract_result` is typically a list of per-document objects (because the API supports per-page / per-doc extraction); pick the **first** per-doc result for this single-document task and store **that object** under the `data` key (do not store the whole list).\n- Convert the Pydantic model to a JSON schema using `Invoice.model_json_schema()`.\n- The script must run end to end with `python3 extract_invoice.py` from `/home/user/myproject` and exit with status code `0`.\n\n## Acceptance Criteria\n- Project path: `/home/user/myproject`\n- Script path: `/home/user/myproject/extract_invoice.py`\n- Command: `python3 extract_invoice.py` (run from `/home/user/myproject`)\n- The script must exit with return code `0`.\n- Output files created by the script:\n  - `/home/user/myproject/invoice.json` — must be valid JSON with the top-level shape described above:\n    - `trial_id` (string) equal to the value at `/logs/artifacts/trial_id`.\n    - `job_id` (non-empty string).\n    - `status` (string) equal to `COMPLETED`.\n    - `data` (object, not a list) — the single per-doc extraction result. It must:\n      - Have an `invoice_number` field that equals (case-insensitive) `INV-2024-0042`.\n      - Have a `vendor_name` field whose value contains the substring `Acme` (case-insensitive).\n      - Have a `cus e 1 has a `Revenue by Product` table with columns `Product`, `Q1 Revenue (USD)`, `Q2 Revenue (USD)` and rows for `Widget A`, `Widget B`, `Service Plan`.\n- Page 2 has a `Regional Sales` table with columns `Region`, `Q1 Units`, `Q2 Units` and rows for `North America`, `Europe`, `Asia Pacific`.\n\nBecause this task may run multiple times concurrently against the same LlamaCloud account, you must read the `trial_id` from `/logs/artifacts/trial_id` and tag the output artifacts with it (the parsing service itself is stateless for a single parse call, so no global resource needs to carry the trial id — only your output files do).\n\n## Requirements\nWrite a Python script at `/home/user/myproject/extract_tables.py` that:\n- Reads the `trial_id` value from `/logs/artifacts/trial_id`.\n- Uses the `llama_cloud` Python SDK to upload `/home/user/myproject/report.pdf` and then runs a parse job that returns per-page Markdown.\n- Extracts, for every page returned by LlamaParse, any **Markdown tables** present on that page (a Markdown table is a contiguous block of lines that start with `|` and includes a header-separator row like `|---|---|---|`).\n- Writes a single JSON file to `/home/user/myproject/tables.json` with the exact top-level shape:\n  ```json\n  {\n    \"trial_id\": \"\u003ctrial_id\u003e\",\n    \"num_pages\": \u003cinteger\u003e,\n    \"num_tables\": \u003cinteger\u003e,\n    \"tables\": [\n      {\"page\": \u003cinteger\u003e, \"markdown\": \"\u003cthe markdown table as a single string, including the header separator row\u003e\"},\n      ...\n    ]\n  }\n  ```\n  where:\n  - `trial_id` is the exact value read from `/logs/artifacts/trial_id`.\n  - `num_pages` is the total number of pages returned by LlamaParse.\n  - `num_tables` is the length of the `tables` array.\n  - Each entry in `tables` corresponds to one Markdown table found on the document, in document order. `page` is 1-indexed and matches the LlamaParse page numbering.\n- Writes a plain-text log to `/home/ ort contains at least two tables).\n    - `tables` (array) with `num_tables` entries; each entry has integer `page` (\u003e= 1) and string `markdown` that:\n      - Contains at least one line starting with `|`.\n      - Contains a Markdown header-separator row matching the pattern `\\|\\s*[-: ]+\\s*\\|` (i.e., a `|---|---|`-style row).\n    - Across all `tables[*].markdown` strings combined, the following substrings must appear (case-insensitive):\n      - `Widget A`\n      - `Service Plan`\n      - `North America`\n      - `Asia Pacific`\n  - `/home/user/myproject/output.log` — must contain:\n    - A line matching `trial_id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` equals the value in `/logs/artifacts/trial_id`.\n    - A line matching `num_pages: \u003cN\u003e` where `\u003cN\u003e` is a positive integer (\u003e= 1).\n    - A line matching `num_tables: \u003cM\u003e` where `\u003cM\u003e` is a positive integer (\u003e= 2).\n\n"])</script><script>self.__next_f.push([1,"c:T1b3e,"])</script><script>self.__next_f.push([1,"# Incremental File Ingestion into an Existing LlamaCloud Managed Index\n\n## Background\nYou are extending a small Retrieval-Augmented Generation (RAG) prototype on **LlamaCloud**, the managed RAG-as-a-Service platform from LlamaIndex. The prototype already has a baseline managed `LlamaCloudIndex` built from a small \"initial\" corpus. New documents arrive over time and the team does NOT want to rebuild the whole index each time — they want to *incrementally* add the new files to the same managed index and continue retrieving against it.\n\nThe Python SDK `llama-index-indices-managed-llama-cloud` (which exposes `LlamaCloudIndex`) is already installed. The LlamaCloud account is already provisioned, and the API key is available in the environment variable `LLAMA_CLOUD_API_KEY`. The default project name to use is `Default`.\n\nTwo pre-staged plain-text corpora exist on disk:\n\n- `/home/user/myproject/docs_initial/` — contains exactly **one** file (`project_aurora.txt`) describing a fictional internal initiative named **Project Aurora**, whose stated mission is to *catalog every star in the Milky Way*.\n- `/home/user/myproject/docs_new/` — contains exactly **one** file (`project_borealis.txt`) describing a different fictional initiative named **Project Borealis**, whose stated mission is to *map every ocean current on Earth*.\n\nBecause this task may run multiple times concurrently against the same LlamaCloud project, your managed index name **MUST be unique per trial run**: read the `trial_id` from `/logs/artifacts/trial_id` and append it as a suffix to the base name `harbor-inc-idx`.\n\n## Requirements\nWrite a Python script at `/home/user/myproject/incremental_ingest.py` that:\n- Reads the `trial_id` value from `/logs/artifacts/trial_id`.\n- Phase 1 — **Initial build**: Loads every file in `/home/user/myproject/docs_initial/` as a list of LlamaIndex `Document` objects (e.g. via `SimpleDirectoryReader`) and creates a **new** managed `LlamaCloudIndex` from those documents using:\n  - `name = \"harbor-inc-idx-\u003ctrial_id\u003e\"` (substituting the actual `trial_id`)\n  - `project_name = \"Default\"`\n  - Authentication via the `LLAMA_CLOUD_API_KEY` environment variable\n  Wait for ingestion to finish (`LlamaCloudIndex.from_documents(...)` does this synchronously by default).\n- Phase 2 — **Incremental ingestion**: For every file path under `/home/user/myproject/docs_new/`, upload that file into the **already created** managed index using the SDK method `index.upload_file(file_path=..., wait_for_ingestion=True)`. Do **NOT** rebuild the index. Do **NOT** call `from_documents` again with the combined corpora.\n- Phase 3 — **Retrieval**: Use the index's retriever (`index.as_retriever(...)`) to run two retrievals against the *same* index, in this order:\n  1. `aurora_query`: `What is the mission of Project Aurora?`\n  2. `borealis_query`: `What is the mission of Project Borealis?`\n  For each query, identif ated company overview and an unrelated honey-lemon-tea recipe) so that retrieval is non-trivial.\n\nBecause this task may run multiple times concurrently against the same LlamaCloud project, your managed-index name **MUST be unique per trial run**: read `trial_id` from `/logs/artifacts/trial_id` and append it as a suffix to the base index name `harbor-qe-idx`.\n\n## Requirements\nWrite a Python script at `/home/user/myproject/run_query_engine.py` that:\n- Reads the `trial_id` value from `/logs/artifacts/trial_id`.\n- Loads every file in `/home/user/myproject/docs/` as LlamaIndex `Document` objects (for example via `SimpleDirectoryReader`).\n- Creates a **new** managed `LlamaCloudIndex` from those documents using:\n  - `name = \"harbor-qe-idx-\u003ctrial_id\u003e\"` (substituting the actual `trial_id`),\n  - `project_name = \"Default\"`,\n  - authentication via the `LLAMA_CLOUD_API_KEY` environment variable.\n  - The constructor must block until ingestion is finished so the index is queryable.\n- Builds a query engine from that index using `index.as_query_engine(llm=\u003cOpenAI LLM\u003e)` where the LLM is a `llama_index.llms.openai.OpenAI` instance configured with model `gpt-4o-mini`. The query engine must use the configured OpenAI LLM for response synthesis (do **NOT** disable response synthesis).\n- Issues the following query against the query engine and captures both the synthesized response text **and** the underlying source nodes:\n\n  \u003e `What is the mission of Project Aurora?`\n\n- Writes a Markdown report to `/home/user/myproject/output.md` that contains the following sections in this order:\n  - A top heading `# LlamaCloud Query Engine Result`.\n  - A sub-heading `## Question` followed by the exact question text on the next line.\n  - A sub-heading `## Answer` followed by the LLM-synthesized response (the full response text, not just a snippet).\n  - A sub-heading `## Source Nodes` followed by at least one source-node block. For each source node, emit the source-node text under the `## Source Nodes` heading. The combined content under this heading **must** include text that mentions both `Project Aurora` and `catalog every star in the Milky Way` (case-insensitive).\n- Writes a plain-text log to `/home/user/myproject/output.log` containing at minimum the following lines (one fact per line), using the actual `trial_id` value:\n  - `trial_id: \u003ctrial_id\u003e`\n  - `index_name: harbor-qe-idx-\u003ctrial_id\u003e`\n  - `llm_model: gpt-4o-mini`\n  - `num_source_nodes: \u003cN\u003e` where `\u003cN\u003e` is a positive integer (\u003e= 1) giving the number of source nodes the query engine returned.\n  - `answer_length: \u003cL\u003e` where `\u003cL\u003e` is the character length of the synthesized answer (a positive integer).\n\n## Implementation Hints\n- Import `LlamaCloudIndex` from `llama_index.indices.managed.llama_cloud`, `SimpleDirectoryReader` from `llama_index.core`, and `OpenAI` from `llama_index.llms.openai`.\n- `LlamaCloudIndex.from_documents(documents, name=..., project_name=\"Default\")` reads `LLAMA_CLOUD_API_KEY` from the environment and returns a ready-to-use index.\n- `index.as_query_engine(llm=OpenAI(model=\"gpt-4o-mini\"))` returns a query engine whose `.query(question)` method returns a `Response` object with `.response` (the synthesized answer string) and `.source_nodes` (a list of `NodeWithScore` objects, each with `.node.get_content()`/`.node.text` and `.score`).\n- The script must run end to end with `python3 run_query_engine.py` from `/home/user/myproject` and exit with status code `0`.\n- The combined source-node text written under `## Source Nodes` is what the verifier checks for the `Project Aurora` and `catalog every star in the Milky Way` substrings — the synthesized answer itself is **not** required to contain those exact phrases.\n\n## Acceptance Criteria\n- Project path: `/home/user/myproject`\n- Script path: `/home/user/myproject/run_query_engine.py`\n- Command: `python3 run_query_engine.py` (run from `/home/user/myproject`)\n- The script must exit with return code `0`.\n- A managed LlamaCloud index named exactly `harbor-qe-idx-\u003ctrial_id\u003e` must exist in project `Default` after the script runs, where `\u003ctrial_id\u003e` is the value of `/logs/artifacts/trial_id`.\n- Output files created by the script:\n  - `/home/user/myproject/output.md` — non-empty Markdown that contains, in order:\n    - The top heading `# LlamaCloud Query Engine Result`.\n    - The sub-heading `## Question` followed by the text `What is the mission of Project Aurora?` on a subsequent line.\n    - The sub-heading `## Answer` followed by a non-empty answer body.\n    - The sub-heading `## Source Nodes` followed by content that contains, somewhere in the section, both the case-insensitive substrings `Project Aurora` and `catalog every star in the Milky Way`.\n  - `/home/user/myproject/output.log` — must contain lines matching:\n    - `trial_id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` equals the value in `/logs/artifacts/trial_id`.\n    - `index_name: harbor-qe-idx-\u003ctrial_id\u003e`.\n    - `llm_model: gpt-4o-mini`.\n    - `num_source_nodes: \u003cN\u003e` where `\u003cN\u003e` is a positive integer (\u003e= 1).\n    - `answer_length: \u003cL\u003e` where `\u003cL\u003e` is a positive integer (\u003e= 1).\n\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"GOYV2IX0Wf5pZHfliEwx3\",\"c\":[\"\",\"tasks\",\"\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"tasks\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/llamacloud-benchmark/pr-preview/pr-5/_next/static/chunks/8559b4084af3d173.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-0\",{\"src\":\"/llamacloud-benchmark/pr-preview/pr-5/_next/static/chunks/babff0e7418ab052.js\",\"async\":true,\"nonce\"
