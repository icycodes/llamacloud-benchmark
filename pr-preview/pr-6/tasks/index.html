rogram that creates a brand-new LlamaCloud managed index from three local text documents that each have an explicit `id_`, then removes one specific document from the existing managed index using its `ref_doc_id`, and finally proves through retrieval that the deleted document is no longer reachable from the index while the remaining documents still are.\n\nThe task workspace `/home/user/delete_task` is pre-seeded with three text files in `/home/user/delete_task/data`:\n- `history.txt` — Atlantean history facts (must be assigned `ref_doc_id` `atlantis-history`).\n- `cuisine.txt` — Atlantean cuisine facts (must be assigned `ref_doc_id` `atlantis-cuisine`).\n- `secret.txt` — A note about a fictional secret artifact called the Lumina Sphere (must be assigned `ref_doc_id` `atlantis-secret`).\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Build a Python script `manage_index.py` in `/home/user/delete_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Constructs **three** `llama_index.core.Document` objects from the three seeded files, assigning each document the explicit `id_` listed above (`atlantis-history`, `atlantis-cuisine`, `atlantis-secret`). The text content of each document must be the contents of the corresponding seed file.\n  - Creates a brand-new LlamaCloud managed index whose name is `harbor-delete-index-${trial_id}` (the literal base name `harbor-delete-index-` followed by the value read from `/logs/artifacts/trial_id`) inside the `Default` project, populated with all three documents.\n  - After the index exists and is fully ingested, deletes the document whose `ref_doc_id` is `atlantis-secret` from the same managed index using `LlamaCloudIndex.delete_ref_doc(...)`. The pipeline itself must remain — only that one document is removed.\n  - Uses the updated index as a retriever (with a reasonably high top-k such as `5`) to fetch nodes for the query `What is the Lumina Sphere of Atlantis?` and writes the retrieved context into the log so the verifier can confirm the deletion took effect.\n  - Uses the updated index as a retriever to fetch nodes for the query `What is the national dish of Atlantis?` and writes the retrieved context into the log so the verifier can confirm the remaining documents are still searchable.\n  - Writes a log file `/home/user/delete_task/output.log` summarizing the workflow.\n- The script must run end-to-end with `python3 manage_index.py` and exit with status code `0`.\n\n## Implementation Hints\n- The managed-index integration is `llama_index.indices.managed.llama_cloud.LlamaCloudIndex` (already pre-installed). `LlamaCloudIndex.from_documents(documents, name=..., project_name=\"Default\")` will create the managed pipeline and ingest the documents synchronously; passing `verbose=True` is helpful while debugging.\n- Construct `Document` objects directly so you can assign explicit IDs, e.g. `Document(text=open(...).read(), id_=\"atlantis-secret\")`. The same `id_` value is the `ref_doc_id` used by deletion APIs.\n- `LlamaCloudIndex.delete_ref_doc(ref_doc_id, verbose=True)` deletes a single document by its `ref_doc_id` and internally waits for the managed pipeline to finish processing the deletion before returning, so retrieval performed after the call should already reflect the change.\n- `index.as_retriever(similarity_top_k=5)` returns a retriever; calling `.retrieve(\"\u003cquestion\u003e\")` returns a list of `NodeWithScore` items whose `.get_content()` (or `.text`) attribute holds the retrieved text. Log the joined content so the verifier can search it.\n- Append `trial_id` to the index name so parallel trials do not collide. Read it once from `/logs/artifacts/trial_id` and reuse it everywhere.\n\n## Acceptance Criteria\n- Project path: `/home/user/delete_task`\n- Script path: `/home/user/delete_task/manage_index.py`\n- Log file: `/home/user/delete_task/output.log`\n- Command: `python3 /home/user/delete_task/manage_index.py`\n  - The command must exit with status code `0`.\n- The created LlamaCloud managed index name must be `harbor-delete-index-${trial_id}` where `trial_id` is the value read from `/logs/artifacts/trial_id`, and it must live in the LlamaCloud `Default` project.\n- The log file must:\n  - Be a non-empty UTF-8 text file.\n  - Contain a line of the form `Index name: harbor-delete-index-\u003ctrial_id\u003e` so the verifier can confirm the resource name.\n  - Contain a line of the form `Deleted document id: atlantis-secret` so the verifier can confirm which `ref_doc_id` was removed.\n  - Contain a section that prints the retrieved context returned by the retriever for the query `What is the Lumina Sphere of Atlantis?`. This retrieved context **must not** contain the case-insensitive phrase `Lumina Sphere` (because the document that mentioned it was deleted).\n  - Contain a section that prints the retrieved context returned by the retriever for the query `What is the national dish of Atlantis?`. This retrieved context **must** contain a recognizable phrase from `cuisine.txt` (specifically the case-insensitive phrase `grilled seaweed`) to prove the remaining documents are still searchable.\n\n"])</script><script>self.__next_f.push([1,"9:T11ed,"])</script><script>self.__next_f.push([1,"# Extract Structured Invoice Data with LlamaExtract (Python)\n\n## Background\nLlamaCloud's LlamaExtract service turns unstructured documents into clean, schema-validated JSON. You are given a deterministic invoice PDF at `/home/user/extract_task/invoice.pdf` that was generated when the environment was built. Build a small Python script that uploads the invoice to LlamaCloud, runs LlamaExtract against a Pydantic-defined schema, and writes the resulting structured object to a JSON file so a downstream verifier can audit the fields.\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Build a Python script `extract.py` in `/home/user/extract_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable (read by the SDK from the environment).\n  - Uploads `/home/user/extract_task/invoice.pdf` to the LlamaCloud `files` resource with `purpose=\"extract\"`, using the literal external file id `harbor-invoice-${trial_id}.pdf` so concurrent runs do not collide on shared identifiers.\n  - Defines a Pydantic schema named `Invoice` with the following fields (each with a `description` so LlamaExtract can locate them):\n    - `invoice_number: str` — the invoice identifier printed on the document.\n    - `vendor_name: str` — the name of the company issuing the invoice.\n    - `customer_name: str` — the name of the company being billed.\n    - `total_amount: float` — the grand total amount due in the invoice currency.\n    - `currency: str` — the ISO 4217 currency code of the total amount.\n  - Submits an extraction job with `client.extract.create(...)` using the JSON schema of the Pydantic `Invoice` model, `extraction_target=\"per_doc\"`, and an `agentic` tier so the managed LLM is used.\n  - Polls `client.extract.get(job.id)` until the job reaches a terminal status (`COMPLETED`, `FAILED`, or `CANCELLED`).\n  - On success, writes the extracted object to `/home/user/extract_task/output.json` as UTF-8 JSON. The JSON file must be a single object that matches the `Invoice` schema (i.e. the top level is the object with `invoice_number`, `vendor_name`, `customer_name`, `total_amount`, `currency`).\n  - Writes a companion log line `Extract job id: \u003cjob_id\u003e` to `/home/user/extract_task/output.log` so the verifier can locate the job.\n- The script must run end-to-end with `python3 extract.py` and exit with status `0`.\n\n## Implementation Hints\n- The LlamaCloud Python SDK is exposed via `from llama_cloud import LlamaCloud`. Instantiating `LlamaCloud()` automatically reads `LLAMA_CLOUD_API_KEY` from the environment.\n- Upload the PDF with `client.files.create(file=\"/home/user/extract_task/invoice.pdf\", purpose=\"extract\", external_file_id=f\"harbor-invoice-{trial_id}.pdf\")`. The returned object exposes `.id`, which you pass as `file_input` to the extract job.\n- Use `Invoice.model_json_schema()` (Pydantic v2) as the value for the `data_schema` configuration field.\n- The extraction job is asynchronous: `client.extract.create(...)` returns immediately with a job id and a status. Poll with `client.extract.get(job.id)` every couple of seconds (e.g. `time.sleep(2)`) until `job.status` is one of `COMPLETED`, `FAILED`, or `CANCELLED`.\n- On `COMPLETED`, the extracted payload is on `job.extract_result` (a dict that already matches your schema). Serialize it with `json.dumps(...)`.\n- Make sure the JSON written to `output.json` has the schema fields at the top level. If the SDK returns the result wrapped in metadata, unwrap to the actual `Invoice` payload before writing.\n\n## Acceptance Criteria\n- Project path: `/home/user/extract_task`\n- Script path: `/home/user/extract_task/extract.py`\n- Output file: `/home/user/extract_task/output.json`\n- Log file: `/home/user/extract_task/output.log`\n- Command: `python3 /home/user/extract_task/extract.py`\n  - The command must exit with status code `0`.\n- LlamaCloud usage:\n  - The script must use `from llama_cloud import LlamaCloud` (the official LlamaCloud Python SDK shipped via the `llama-cloud` package).\n  - The uploaded file must use the LlamaCloud `external_file_id` value `harbor-invoice-${trial_id}.pdf` where `trial_id` is read from `/logs/artifacts/trial_id`.\n- `output.json` must be valid UTF-8 JSON and decode into a single JSON object whose top level keys are exactly `invoice_number`, `vendor_name`, `customer_name`, `total_amount`, `currency` (no extra wrapping under `data`, `result`, etc.).\n- `output.log` must contain a line matching the pattern `Extract job id: \u003cjob_id\u003e` where `\u003cjob_id\u003e` is the id of the extract job returned by LlamaCloud.\n\n"])</script><script>self.__next_f.push([1,"a:T15b6,"])</script><script>self.__next_f.push([1,"# Extract Structured Invoice Data with LlamaCloud LlamaExtract (Python)\n\n## Background\nLlamaCloud's LlamaExtract service turns unstructured documents into validated, schema-conformant JSON. In this task you must build a small Python program that uses the official `llama-cloud` SDK to upload a multi-page invoice PDF, run a schema-driven extraction job against it, and persist the resulting structured data to disk so a downstream verifier can confirm the extraction worked.\n\nThe task workspace `/home/user/extract_task` already contains the source PDF at `/home/user/extract_task/sample.pdf`. The PDF is a fictional ACME Corporation invoice with:\n- A header section on page 1 with the invoice number, the customer name, and the customer email.\n- A line-item table on page 2 with four rows. Each row has an item name, quantity, unit price, and line total.\n- A grand-total row at the bottom of the table.\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Write a Python script `extract.py` in `/home/user/extract_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Uses the official LlamaCloud Python SDK (`llama-cloud` package, imported as `from llama_cloud import LlamaCloud`) to upload `sample.pdf` with `purpose=\"extract\"` and run a schema-driven extraction job via `client.extract.create(...)`.\n  - Defines a Pydantic v2 `BaseModel` data schema for the invoice that includes (at minimum) the fields below, and passes its `model_json_schema()` as the `data_schema` in the extraction `configuration`:\n    - `invoice_number` (string)\n    - `customer_name` (string)\n    - `customer_email` (string)\n    - `line_items` (list of objects, each with `item` (string), `quantity` (integer), `unit_price` (number), and `total` (number))\n    - `total_amount` (number) — the grand total of the invoice\n  - Uses the extraction tier `agentic` and `extraction_target=\"per_doc\"`. Polls the job (using `client.extract.get(job.id)`) until its status reaches `COMPLETED`, `FAILED`, or `CANCELLED`. If the job does not complete successfully, the script must exit with a non-zero exit code.\n  - On success, writes the `extract_result` payload as JSON to `/home/user/extract_task/output.json` (UTF-8, indented). The top-level JSON object must contain all of the schema fields described above with the values that the extractor returned for them.\n  - Also writes a human-readable log file `/home/user/extract_task/output.log` with the lines required in the Acceptance Criteria below.\n- The script must run end-to-end with `python3 extract.py` from `/home/user/extract_task` and exit with status code `0`.\n\n## Implementation Hints\n- The LlamaCloud Python SDK (`pip install llama-cloud`) is already pre-installed. Instantiating `LlamaCloud()` with no arguments will pick up `LLAMA_CLOUD_API_KEY` from the environment automatically.\n- Upload the file with `client.files.create(file=\"./sample.pdf\", purpose=\"extract\")` to obtain a file id. Pass that file id to `client.extract.create(file_input=..., configuration={...})`.\n- The extraction job is asynchronous — use a polling loop with `time.sleep(...)` between calls to `client.extract.get(job.id)` until the status is one of the terminal states. The `agentic` tier typically finishes within ~60 seconds for a short PDF.\n- A Pydantic v2 model's JSON schema is produced by `Model.model_json_schema()`. Compose the line-item schema as a nested model (e.g. `class LineItem(BaseModel): ...`) and reference it from `Invoice.line_items: list[LineItem]`.\n- After the job completes, `job.extract_result` is already a JSON-serializable dict mirroring the schema. Use `json.dump(job.extract_result, fh, indent=2)` to write it.\n- Read `trial_id` once at the top of the script and use it in the log file (see Acceptance Criteria) so concurrent trials do not collide on log assertions.\n\n## Acceptance Criteria\n- Project path: `/home/user/extract_task`\n- Source PDF: `/home/user/extract_task/sample.pdf`\n- Script path: `/home/user/extract_task/extract.py`\n- Structured output: `/home/user/extract_task/output.json`\n- Log file: `/home/user/extract_task/output.log`\n- Command: `python3 /home/user/extract_task/extract.py` (run from `/home/user/extract_task`).\n  - The command must exit with status code `0`.\n- `extract.py` must import from `llama_cloud` (e.g. the literal substring `from llama_cloud` or `import llama_cloud`) and define a Pydantic `BaseModel` for the invoice schema.\n- The structured output file `/home/user/extract_task/output.json` must:\n  - Be a non-empty UTF-8 JSON document.\n  - Parse as a JSON object with the following top-level keys: `invoice_number`, `customer_name`, `customer_email`, `line_items`, `total_amount`.\n  - `line_items` must be a JSON array with at least one element; each element must be an object with the keys `item`, `quantity`, `unit_price`, and `total`.\n  - The extracted fields must match the source PDF (invoice number, customer name, customer email, line items, and total amount must be the values actually present in `sample.pdf`).\n- The log file `/home/user/extract_task/output.log` must contain:\n  - A line of the form `Trial id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` is the value read from `/logs/artifacts/trial_id`.\n  - A line of the form `Invoice number: \u003cinvoice_number\u003e` matching the value in `output.json`.\n  - A line of the form `Line item count: \u003cN\u003e` where `\u003cN\u003e` is the count of items in the `line_items` array.\n  - A line of the form `Total amount: \u003ctotal_amount\u003e` matching the value in `output.json`.\n\n"])</script><script>self.__next_f.push([1,"b:T12a1,"])</script><script>self.__next_f.push([1,"# Incrementally Ingest Documents into a LlamaCloud Managed Index (Python)\n\n## Background\nA real-world LlamaCloud RAG pipeline typically grows over time: a project starts with a small seed corpus, and then new documents are added to the existing managed index as more data becomes available. In this task you must build a Python script that (a) creates a new LlamaCloud managed index from an initial corpus, (b) incrementally inserts additional documents into the same index after it has been created, and (c) retrieves content from the updated index to confirm the new documents are searchable.\n\nThe task workspace `/home/user/ingest_task` is pre-seeded with two folders:\n- `/home/user/ingest_task/initial_data` — contains the documents that should be used to **create** the managed index.\n- `/home/user/ingest_task/extra_data` — contains the documents that must be **inserted later** (after the index already exists).\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Build a Python script `ingest.py` in `/home/user/ingest_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Creates a brand-new LlamaCloud managed index whose name is `harbor-incremental-index-${trial_id}` (the literal base name `harbor-incremental-index-` followed by the value read from `/logs/artifacts/trial_id`) inside the `Default` project. The index must be populated **only** from the documents inside `/home/user/ingest_task/initial_data` at creation time.\n  - After the index exists, loads the documents in `/home/user/ingest_task/extra_data` and incrementally adds each one to the **same** managed index (i.e. the index from the previous step must not be deleted and re-created — the additional documents must be inserted into the already-created managed index).\n  - Uses the updated index to retrieve nodes relevant to the query `What is the Atlantis Aurora?` and confirms that the retrieved context contains content that was added via the incremental insert step.\n  - Writes a log file `/home/user/ingest_task/output.log` summarizing what happened so the verifier can confirm both stages of the workflow.\n- The script must run end-to-end with `python3 ingest.py` and exit with status code `0`.\n\n## Implementation Hints\n- The managed-index integration is `llama_index.indices.managed.llama_cloud.LlamaCloudIndex` (already pre-installed). `LlamaCloudIndex.from_documents(documents, name=..., project_name=\"Default\")` will create the managed pipeline and ingest the documents synchronously; passing `verbose=True` is helpful while debugging.\n- For the incremental step, the `LlamaCloudIndex` object exposes an `insert(document)` method that adds a single `llama_index.core.Document` to the existing managed pipeline. Iterate over the extra documents and call `insert` on each one.\n- Use `SimpleDirectoryReader` from `llama_index.core` to load both directories, or construct `Document` objects directly from the file text — either approach is fine, but make sure the file names from `extra_data` are preserved in the document metadata so they can be ingested correctly.\n- `index.as_retriever()` returns a retriever; calling `.retrieve(\"\u003cquestion\u003e\")` returns a list of `NodeWithScore` items whose `.get_content()` (or `.text`) attribute holds the retrieved text. Log the joined content so the verifier can search it.\n- Append `trial_id` to the index name so parallel trials do not collide. Read it once from `/logs/artifacts/trial_id` and reuse it everywhere.\n\n## Acceptance Criteria\n- Project path: `/home/user/ingest_task`\n- Script path: `/home/user/ingest_task/ingest.py`\n- Log file: `/home/user/ingest_task/output.log`\n- Command: `python3 /home/user/ingest_task/ingest.py`\n  - The command must exit with status code `0`.\n- The created LlamaCloud managed index name must be `harbor-incremental-index-${trial_id}` where `trial_id` is the value read from `/logs/artifacts/trial_id`, and it must live in the LlamaCloud `Default` project.\n- The log file must:\n  - Be a non-empty UTF-8 text file.\n  - Contain a line of the form `Index name: harbor-incremental-index-\u003ctrial_id\u003e` so the verifier can confirm the resource name.\n  - Contain a line of the form `Inserted documents: \u003cN\u003e` where `\u003cN\u003e` is the integer count of documents that were incrementally added from `/home/user/ingest_task/extra_data` (must be at least 1).\n  - Contain a section that prints the retrieved context returned by the retriever for the query `What is the Atlantis Aurora?`. The retrieved context must include text that originated from the incrementally inserted documents (specifically, content about the Atlantis Aurora) so that the verifier can confirm the incremental ingestion actually made the new content searchable.\n\n"])</script><script>self.__next_f.push([1,"c:Td03,"])</script><script>self.__next_f.push([1,"# Create and Query a LlamaCloud Managed Index (Python)\n\n## Background\nLlamaCloud provides a managed RAG service that handles document ingestion, embedding, and vector storage in the cloud. You will build a small Python program that ingests a local corpus into a brand-new LlamaCloud managed index and then retrieves relevant context for a question using that index.\n\nThe task workspace `/home/user/index_task` already contains a small text corpus in `/home/user/index_task/data` with two pre-seeded files describing a fictional country called Atlantis.\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Build a Python script `build_index.py` in `/home/user/index_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Loads the local corpus from `/home/user/index_task/data` using LlamaIndex's `SimpleDirectoryReader`.\n  - Creates a new LlamaCloud managed index whose name is `harbor-managed-index-${trial_id}` (the literal base name `harbor-managed-index-` followed by the value read from `/logs/artifacts/trial_id`) inside the `Default` project, using the managed embeddings provided by LlamaCloud (no separate OpenAI key is required).\n  - Uses the LlamaCloud index as a retriever to fetch nodes relevant to the query string `What is the capital of Atlantis?`.\n  - Writes the retrieval result to a log file `/home/user/index_task/output.log` so a downstream verifier can confirm the retrieval worked.\n- The script must run end-to-end with `python3 build_index.py` and exit with status `0`.\n\n## Implementation Hints\n- Install package `llama-index-indices-managed-llama-cloud` exposes `from llama_index.indices.managed.llama_cloud import LlamaCloudIndex` (already pre-installed in the environment).\n- `LlamaCloudIndex.from_documents(documents, name, project_name=\"Default\")` will both create the managed pipeline on LlamaCloud and ingest the documents. It blocks until ingestion is complete when called synchronously; using `verbose=True` is helpful while debugging.\n- `index.as_retriever()` returns a retriever you can call with `.retrieve(\"\u003cyour question\u003e\")` to obtain a list of `NodeWithScore` items. Use the joined `node.get_content()` (or `.text`) of those items as the retrieval result string.\n- Make sure to read `trial_id` from `/logs/artifacts/trial_id` and append it to the index name so concurrent runs do not collide.\n\n## Acceptance Criteria\n- Project path: `/home/user/index_task`\n- Script path: `/home/user/index_task/build_index.py`\n- Log file: `/home/user/index_task/output.log`\n- Command: `python3 /home/user/index_task/build_index.py`\n  - The command must exit with status code `0`.\n- The created LlamaCloud managed index name must be `harbor-managed-index-${trial_id}` where `trial_id` is the value read from `/logs/artifacts/trial_id`, and it must live in the LlamaCloud `Default` project.\n- The log file must:\n  - Be a non-empty UTF-8 text file.\n  - Contain a line of the form `Index name: harbor-managed-index-\u003ctrial_id\u003e` so the verifier can confirm the resource name.\n  - Contain a section that prints the retrieved context returned by the LlamaCloud retriever for the query `What is the capital of Atlantis?`. The retrieved context must include the textual answer for the capital of Atlantis present in the seeded corpus.\n\n"])</script><script>self.__next_f.push([1,"d:Tf5e,"])</script><script>self.__next_f.push([1,"# Create and Query a LlamaCloud Managed Index (TypeScript)\n\n## Background\nLlamaCloud provides a managed RAG service that handles document ingestion, embedding, and vector storage in the cloud. In this task you will build a small TypeScript program that ingests a local corpus into a brand-new LlamaCloud managed index and then retrieves relevant context for a question using that index, using the official LlamaCloud TypeScript framework (`llama-cloud-services`).\n\nThe task workspace `/home/user/index_task_ts` already contains a small text corpus in `/home/user/index_task_ts/data` with two pre-seeded files describing a fictional country called Atlantis.\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Build a TypeScript script `build_index.ts` in `/home/user/index_task_ts` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Loads the local corpus from `/home/user/index_task_ts/data` (the seeded `facts.txt` and `history.txt`) and turns the file contents into `Document` objects.\n  - Creates a new LlamaCloud managed index whose name is `harbor-managed-index-ts-${trial_id}` (the literal base name `harbor-managed-index-ts-` followed by the value read from `/logs/artifacts/trial_id`) inside the `Default` project, using the managed embeddings provided by LlamaCloud (no separate OpenAI key is required).\n  - Uses the LlamaCloud index as a retriever to fetch nodes relevant to the query string `What is the capital of Atlantis?`.\n  - Writes the retrieval result to a log file `/home/user/index_task_ts/output.log` so a downstream verifier can confirm the retrieval worked.\n- The script must run end-to-end with `npx tsx build_index.ts` from `/home/user/index_task_ts` and exit with status code `0`.\n\n## Implementation Hints\n- The TypeScript managed-index integration lives in the `llama-cloud-services` npm package and the `Document` class comes from `llamaindex`. Both packages are already globally installed and resolvable from the project directory (via `NODE_PATH`).\n- Use `LlamaCloudIndex.fromDocuments({ documents, name, projectName: \"Default\", apiKey: process.env.LLAMA_CLOUD_API_KEY })` to create the managed pipeline and ingest the documents in a single call. Setting `verbose: true` is helpful while debugging.\n- `index.asRetriever()` returns a retriever. Call `await retriever.retrieve({ query: \"\u003cyour question\u003e\" })` to get a list of `NodeWithScore` items; concatenate each node's text (via `node.node.getContent({ MetadataMode: ... })` or `node.node.text`) to build the retrieval result string for the log.\n- Read `trial_id` from `/logs/artifacts/trial_id` and append it to the index name so concurrent runs do not collide.\n- `tsx` is preinstalled globally so the script can be executed with `npx tsx build_index.ts` directly.\n\n## Acceptance Criteria\n- Project path: `/home/user/index_task_ts`\n- Script path: `/home/user/index_task_ts/build_index.ts`\n- Log file: `/home/user/index_task_ts/output.log`\n- Command: `npx tsx build_index.ts` (run from `/home/user/index_task_ts`).\n  - The command must exit with status code `0`.\n- LlamaCloud usage:\n  - `build_index.ts` must import from the `llama-cloud-services` TypeScript package (e.g. the literal substring `llama-cloud-services`).\n- The created LlamaCloud managed index name must be `harbor-managed-index-ts-${trial_id}` where `trial_id` is the value read from `/logs/artifacts/trial_id`, and it must live in the LlamaCloud `Default` project.\n- The log file must:\n  - Be a non-empty UTF-8 text file.\n  - Contain a line of the form `Index name: harbor-managed-index-ts-\u003ctrial_id\u003e` so the verifier can confirm the resource name.\n  - Contain a section that prints the retrieved context returned by the LlamaCloud retriever for the query `What is the capital of Atlantis?`. The retrieved context must include the textual answer for the capital of Atlantis present in the seeded corpus.\n\n"])</script><script>self.__next_f.push([1,"e:T1a95,"])</script><script>self.__next_f.push([1,"# Retrieve from a LlamaCloud Managed Index Using Metadata Filters (Python)\n\n## Background\nLlamaCloud managed indices store the metadata attached to every ingested document and let you constrain retrieval to a subset of those documents at query time via LlamaIndex's `MetadataFilters` API. This is critical for multi-tenant RAG pipelines and for any application that wants to keep its documents in a single managed index but answer questions against only one slice of them (for example, only the documents whose `category` is `finance`).\n\nIn this task you must build a small Python program that creates a brand-new LlamaCloud managed index whose documents have explicit `category` metadata, and then performs **two** retrievals against that managed index: one filtered by `category == \"finance\"` and one filtered by `category == \"sports\"`. The retrieved context must reflect the filter so that a downstream verifier can confirm the filtering actually took effect.\n\nThe task workspace `/home/user/metadata_filter_task` already contains three small text corpora under `/home/user/metadata_filter_task/data`, each in its own subdirectory named after its category:\n- `/home/user/metadata_filter_task/data/finance/finance.txt` — a fact about a corporate quarterly revenue figure.\n- `/home/user/metadata_filter_task/data/sports/sports.txt` — a fact about a tennis championship winner.\n- `/home/user/metadata_filter_task/data/geography/geography.txt` — a fact about a fictional mountain.\n\nEach seeded file contains a single deterministic distinctive phrase that does not appear in any of the other files, so that the verifier can tell exactly which document the retriever returned.\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Build a Python script `filter_retrieve.py` in `/home/user/metadata_filter_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Constructs `llama_index.core.Document` objects for **every** seeded file. Each `Document` must include a `category` metadata field whose value is the name of the parent subdirectory (i.e. `finance`, `sports`, or `geography`). The text content of each `Document` must be the contents of the corresponding seed file.\n  - Creates a brand-new LlamaCloud managed index whose name is `harbor-metadata-filter-index-${trial_id}` (the literal base name `harbor-metadata-filter-index-` followed by the value read from `/logs/artifacts/trial_id`) inside the `Default` project, populated with **all** of the constructed documents at once. The index must use the managed embeddings provided by LlamaCloud (no separate OpenAI key is required).\n  - Performs **two** retrievals against the **same** managed index using `index.as_retriever(filters=MetadataFilters(...), similarity_top_k=5)`:\n    1. A retrieval with a metadata filter requiring `category == \"finance\"` for the query `What were the company quarterly results?`.\n    2. A retrieval with a metadata filter requiring `category == \"sports\"` for the query `Who won the tennis championship?`.\n  - Writes a log file `/home/user/metadata_filter_task/output.log` summarizing the workflow so the verifier can inspect both retrievals (see Acceptance Criteria for the exact lines and sections that must appear).\n- The script must run end-to-end with `python3 filter_retrieve.py` and exit with status code `0`.\n\n## Implementation Hints\n- The managed-index integration is `llama_index.indices.managed.llama_cloud.LlamaCloudIndex` (already pre-installed). `LlamaCloudIndex.from_documents(documents, name=..., project_name=\"Default\")` will create the managed pipeline and ingest the documents synchronously; passing `verbose=True` is helpful while debugging.\n- Construct each `Document` directly so you can assign the `metadata` dict explicitly, e.g. `Document(text=open(path).read(), metadata={\"category\": \"finance\"})`. The category value must be a plain string equal to the parent directory name.\n- The metadata filtering primitives live in `llama_index.core.vector_stores`: `MetadataFilter`, `MetadataFilters`, and `FilterOperator`. Build a filters object with a single equality filter and pass it as the `filters=` argument of `index.as_retriever(...)`.\n- `retriever.retrieve(\"\u003cquery\u003e\")` returns a list of `NodeWithScore` items whose `.get_content()` (or `.text`) attribute holds the retrieved text. Print and log the joined content so the verifier can search it.\n- The point of the metadata filter is that retrieval results must be restricted to documents whose `category` metadata matches the filter value. The retriever output for the `category == \"finance\"` filter must NOT contain text that only exists in the sports or geography seed files (and vice versa for the sports filter).\n- Read `trial_id` from `/logs/artifacts/trial_id` and append it to the index name so concurrent runs do not collide.\n\n## Acceptance Criteria\n- Project path: `/home/user/metadata_filter_task`\n- Script path: `/home/user/metadata_filter_task/filter_retrieve.py`\n- Log file: `/home/user/metadata_filter_task/output.log`\n- Command: `python3 /home/user/metadata_filter_task/filter_retrieve.py`\n  - The command must exit with status code `0`.\n- The created LlamaCloud managed index name must be `harbor-metadata-filter-index-${trial_id}` where `trial_id` is the value read from `/logs/artifacts/trial_id`, and it must live in the LlamaCloud `Default` project.\n- The script source must reference both `MetadataFilters` and `MetadataFilter` (so the verifier can confirm that the LlamaIndex metadata-filtering API was actually used).\n- The log file must:\n  - Be a non-empty UTF-8 text file.\n  - Contain a line of the form `Index name: harbor-metadata-filter-index-\u003ctrial_id\u003e` so the verifier can confirm the resource name.\n  - Contain a line of the form `Document count: \u003cN\u003e` where `\u003cN\u003e` is the integer total count of documents that were ingested into the managed index (must be `3`).\n  - Contain a section that prints the retrieved context returned for the `category == \"finance\"` filtered retrieval. The section must be introduced by a line equal to `=== finance retrieval ===` so the verifier can locate it. The retrieved context in that section must include a distinctive phrase from the seeded `finance/finance.txt` file and must NOT include any of the distinctive phrases from the sports or geography seed files.\n  - Contain a section that prints the retrieved context returned for the `category == \"sports\"` filtered retrieval. The section must be introduced by a line equal to `=== sports retrieval ===` so the verifier can locate it. The retrieved context in that section must include a distinctive phrase from the seeded `sports/sports.txt` file and must NOT include any of the distinctive phrases from the finance or geography seed files.\n\n"])</script><script>self.__next_f.push([1,"f:T156c,"])</script><script>self.__next_f.push([1,"# Parse PDF Bytes with LlamaParse Using `file_name` Metadata (Python)\n\n## Background\nIn many real-world pipelines, PDFs do not arrive as files on disk — they come through an upload endpoint, a queue, an S3 stream, or some other source that yields raw bytes. LlamaCloud's `LlamaParse` parser supports this directly through the `load_data` API, but when you pass raw bytes (or a binary file object) instead of a path, the parser cannot infer the document type from a file extension. You **must** supply a hint via `extra_info={\"file_name\": \"...\"}`; otherwise `LlamaParse.load_data` raises a `ValueError` with the message `file_name must be provided in extra_info when passing bytes` and no parsing is performed.\n\nIn this task you must build a small Python program that takes a directory full of PDFs, loads each one **as raw bytes** (no file paths), parses every PDF with `LlamaParse` using the `file_name`-in-`extra_info` pattern, and writes per-document markdown output plus a manifest summarizing what was parsed.\n\nThe task workspace `/home/user/parse_bytes_task` is pre-seeded with three deterministic PDFs in `/home/user/parse_bytes_task/docs/`:\n- `alpha_report.pdf` — a short status report.\n- `beta_invoice.pdf` — a tiny one-line invoice.\n- `gamma_memo.pdf` — a brief internal memo.\nEach PDF contains a clearly identifiable headline string that makes the parsed output easy to audit.\n\n## Requirements\n- Write a Python script `parse_bytes.py` in `/home/user/parse_bytes_task` that authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n- Use the official `LlamaParse` client from `llama_cloud_services` (i.e. `from llama_cloud_services import LlamaParse`), configured with `result_type=\"markdown\"`.\n- For **every** PDF inside `/home/user/parse_bytes_task/docs/`:\n  - Read the file into memory as raw `bytes` (use Python's built-in file I/O — do not pass the path string to `load_data`).\n  - Call `parser.load_data(file_bytes, extra_info={\"file_name\": \u003cbasename\u003e})` where `\u003cbasename\u003e` is the original PDF file name (for example `alpha_report.pdf`).\n  - Concatenate the `.text` of every returned `Document` (joined with a blank line between pages) and write the result to `/home/user/parse_bytes_task/output/\u003cstem\u003e.md`, where `\u003cstem\u003e` is the file name without the `.pdf` extension (for example `/home/user/parse_bytes_task/output/alpha_report.md`).\n- After processing every file, write a manifest file at `/home/user/parse_bytes_task/output/manifest.json` whose top-level value is a JSON object of the form:\n  ```json\n  {\n    \"parsed\": [\n      {\"file_name\": \"alpha_report.pdf\", \"output\": \"output/alpha_report.md\", \"chars\": \u003cint\u003e},\n      {\"file_name\": \"beta_invoice.pdf\", \"output\": \"output/beta_invoice.md\", \"chars\": \u003cint\u003e},\n      {\"file_name\": \"gamma_memo.pdf\",   \"output\": \"output/gamma_memo.md\",   \"chars\": \u003cint\u003e}\n    ]\n  }\n  ```\n  - `chars` is the integer character count of the corresponding markdown file's contents.\n  - The `parsed` list must contain exactly one entry per PDF in `docs/`, with `file_name` being the original PDF name.\n  - Entries must be sorted alphabetically by `file_name` (so `alpha_report.pdf` comes first).\n- The script must run end-to-end with `python3 parse_bytes.py` and exit with status code `0` on success.\n\n## Implementation Hints\n- `LlamaParse` (from `llama_cloud_services`) reads `LLAMA_CLOUD_API_KEY` automatically when instantiated with no `api_key` argument.\n- When you pass raw bytes to `parser.load_data`, the parser inspects the file extension of `extra_info[\"file_name\"]` to pick the right parsing strategy — forgetting the `file_name` key will make the SDK raise immediately with `file_name must be provided in extra_info when passing bytes`.\n- `parser.load_data` returns a list of `Document` objects; each `Document` exposes the parsed markdown via the `.text` attribute.\n- Iterate over the directory deterministically (for example with `sorted(os.listdir(...))`) so the manifest order is stable.\n- Make sure to create the `/home/user/parse_bytes_task/output/` directory before writing files into it.\n\n## Acceptance Criteria\n- Project path: `/home/user/parse_bytes_task`\n- Input directory: `/home/user/parse_bytes_task/docs` (contains `alpha_report.pdf`, `beta_invoice.pdf`, `gamma_memo.pdf`).\n- Script path: `/home/user/parse_bytes_task/parse_bytes.py`\n- Output directory: `/home/user/parse_bytes_task/output`\n- Manifest file: `/home/user/parse_bytes_task/output/manifest.json`\n- Per-document markdown files: `/home/user/parse_bytes_task/output/\u003cstem\u003e.md` for each PDF in `docs/`.\n- Command: `python3 /home/user/parse_bytes_task/parse_bytes.py`\n  - The command must exit with status code `0`.\n- `parse_bytes.py` must import `LlamaParse` from `llama_cloud_services` and must call `load_data` with raw `bytes` (not a file path) plus `extra_info={\"file_name\": ...}`.\n- Each generated markdown file must be a non-empty UTF-8 file whose contents reflect the source PDF (it must include the document's headline text from the source PDF).\n- `manifest.json` schema:\n  ```json\n  {\n    \"parsed\": [\n      {\"file_name\": \"\u003coriginal.pdf\u003e\", \"output\": \"output/\u003cstem\u003e.md\", \"chars\": \u003cint\u003e}\n    ]\n  }\n  ```\n  - The top-level object must contain a `parsed` array of length equal to the number of PDFs in `docs/`.\n  - Entries are sorted alphabetically by `file_name`.\n  - For each entry, `chars` must equal the actual character count (in characters, not bytes) of the contents of the file referenced by `output`.\n\n"])</script><script>self.__next_f.push([1,"10:T8ac,"])</script><script>self.__next_f.push([1,"# Parse a PDF Report to Markdown with LlamaParse (Python)\n\n## Background\nYou are given a financial PDF report at `/home/user/parse_task/sample.pdf`. The report contains a title, a paragraph of text, and a small table. You need to convert this PDF into clean markdown using LlamaCloud's LlamaParse service so that the output preserves the headings, body text, and tabular structure for use in a downstream RAG pipeline.\n\n## Requirements\n- Write a Python script `parse.py` in `/home/user/parse_task` that authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n- Use the official LlamaCloud Python SDK (`llama-cloud` package, i.e. `from llama_cloud import LlamaCloud`) to upload `sample.pdf` and run a parse job.\n- Retrieve the parsed markdown for the document and write the full markdown text (concatenation of all pages, separated by blank lines) to `/home/user/parse_task/output.md`.\n- The script must run end-to-end with `python3 parse.py` and exit with status code `0` on success.\n\n## Implementation Hints\n- The LlamaCloud Python SDK reads `LLAMA_CLOUD_API_KEY` automatically when you instantiate `LlamaCloud()`.\n- Use `client.files.create(file=..., purpose=\"parse\")` to upload the PDF, then `client.parsing.parse(file_id=..., tier=\"agentic\", version=\"latest\", expand=[\"markdown\"])` to run the parse job. The SDK polls for completion.\n- The result object exposes the parsed markdown per page; iterate over the pages and join their markdown content.\n- You do not need to call any other LlamaCloud endpoints (no index creation is required for this task).\n\n## Acceptance Criteria\n- Project path: `/home/user/parse_task`\n- Script path: `/home/user/parse_task/parse.py`\n- Output file: `/home/user/parse_task/output.md`\n- Command: `python3 /home/user/parse_task/parse.py`\n  - The command must exit with status code `0`.\n- The output file must exist and be non-empty UTF-8 text.\n- The markdown content in `/home/user/parse_task/output.md` must faithfully reflect the source PDF, including:\n  - The report title heading text.\n  - The body paragraph that mentions the total revenue figure.\n  - A markdown representation of the revenue table that lists every department row from the source PDF.\n\n"])</script><script>self.__next_f.push([1,"11:Ta1f,"])</script><script>self.__next_f.push([1,"# Parse a PDF Report to Markdown with LlamaParse (TypeScript)\n\n## Background\nYou are given a financial PDF report at `/home/user/parse_task_ts/sample.pdf`. The report contains a title, a paragraph of body text, and a small revenue table. You must convert this PDF into clean markdown using LlamaCloud's LlamaParse service from a TypeScript script so that the headings, body text, and tabular structure are preserved for a downstream RAG pipeline.\n\n## Requirements\n- Write a TypeScript ns the total revenue figure.\n  - A markdown representation of the revenue table that contains every department row from the source PDF.\n\n"])</script><script>self.__next_f.push([1,"12:T1371,"])</script><script>self.__next_f.push([1,"# Extract PDF Tables to CSV Files Using LlamaParse Items Tree (Python)\n\n## Background\nLlamaCloud's LlamaParse service can return a structured **items tree** describing every typed element found on each page (tables, headings, figures, lists, etc.). For analytical pipelines you often want to pull every table out of a PDF and persist each one as its own CSV file so they can be loaded into pandas/Excel for downstream processing. In this task you must use the official `llama-cloud` Python SDK (the v2 API exposed via `from llama_cloud import LlamaCloud`) to parse a seeded financial PDF and write **one CSV file per table** found by LlamaParse.\n\nThe task workspace `/home/user/tables_task` is pre-seeded with a deterministic two-page PDF at `/home/user/tables_task/sample.pdf` that was generated when the environment was built. The PDF contains two distinct tables (one on each page):\n- A `Quarterly Department Revenue` table with the columns `Department`, `Q1 Revenue`, and `Q2 Revenue`.\n- A `Top Selling Products` table with the columns `Product` and `Units Sold`.\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Write a Python script `extract_tables.py` in `/home/user/tables_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable (read by the SDK from the environment).\n  - Uses the official LlamaCloud Python SDK (`llama-cloud` package, imported as `from llama_cloud import LlamaCloud`) to upload `sample.pdf` with `purpose=\"parse\"` and run a parse job with `tier=\"agentic\"`, `version=\"latest\"`, and `expand=[\"items\"]` so that the structured items tree is returned.\n  - Iterates over every page in `result.items.pages` and, for every item whose `type == \"table\"`, writes the table to its own CSV file at `/home/user/tables_task/tables/table_{n:03d}.csv` (where `n` starts at `1` and is incremented in the order tables are encountered while iterating pages in ascending `page_number` order and items in the natural list order). The CSV file must be UTF-8 text and must contain every row of the table (header row included), with one CSV row per table row.\n  - Writes a log file `/home/user/tables_task/output.log` summarising the run (see Acceptance Criteria for the exact lines that must appear).\n- The script must run end-to-end with `python3 extract_tables.py` from `/home/user/tables_task` and exit with status code `0`.\n\n## Implementation Hints\n- Install package: `llama-cloud\u003e=2.1` is already pre-installed in the environment.\n- Instantiate `LlamaCloud()` with no arguments to pick up `LLAMA_CLOUD_API_KEY` automatically.\n- Upload the file with `client.files.create(file=\"./sample.pdf\", purpose=\"parse\")` and pass `file_id=file.id` into `client.parsing.parse(...)`. The SDK polls for completion internally.\n- The structured items tree is returned when you request `expand=[\"items\"]`. Each table item exposes an `rows` attribute (a list-of-lists) and a pre-formatted `csv` attribute (a CSV string for the same table). Either can be used to write the CSV file — the simplest path is to write the `csv` field directly if it is non-empty; otherwise fall back to building the CSV from `rows` with Python's `csv` module.\n- The output CSV files live under `/home/user/tables_task/tables/`. Create the directory if it does not already exist.\n- Read `trial_id` once at the top of the script and embed it in `output.log` so the verifier can correlate the run with the trial.\n\n## Acceptance Criteria\n- Project path: `/home/user/tables_task`\n- Source PDF: `/home/user/tables_task/sample.pdf`\n- Script path: `/home/user/tables_task/extract_tables.py`\n- CSV output directory: `/home/user/tables_task/tables/`\n- Log file: `/home/user/tables_task/output.log`\n- Command: `python3 /home/user/tables_task/extract_tables.py` (run from `/home/user/tables_task`).\n  - The command must exit with status code `0`.\n- LlamaCloud usage:\n  - `extract_tables.py` must import from `llama_cloud` (e.g. the literal substring `from llama_cloud` or `import llama_cloud`).\n  - The source file must contain the literal substring `expand` and the literal substring `items` (proving the executor wired LlamaParse's items tree feature).\n- The CSV directory `/home/user/tables_task/tables/` must contain at least two CSV files named `table_001.csv` and `table_002.csv` (zero-padded to width 3). Each file must:\n  - Be a non-empty UTF-8 text file.\n  - Be parseable with Python's `csv.reader`.\n  - Contain a header row and at least one data row.\n- The log file `/home/user/tables_task/output.log` must contain:\n  - A line of the form `Trial id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` is the value read from `/logs/artifacts/trial_id`.\n  - A line of the form `Tables extracted: \u003cN\u003e` where `\u003cN\u003e` is the integer number of tables that were extracted (must be at least `2`).\n  - For every CSV file produced, a line of the form `CSV file: tables/table_\u003cNNN\u003e.csv` (one line per CSV file, using the same zero-padded numbering used on disk).\n\n"])</script><script>self.__next_f.push([1,"13:T125e,"])</script><script>self.__next_f.push([1,"# Parse Only Specific Pages of a Multi-Page PDF with LlamaParse `target_pages` (Python)\n\n## Background\nLlamaCloud's LlamaParse parser supports a `target_pages` argument that lets you parse only a subset of the pages of a multi-page PDF, which is helpful for very large documents where you already know which pages are interesting and want to avoid paying for the rest. In this task you must build a small Python program that uses LlamaParse to extract markdown from **only pages 1 and 3** (zero-indexed) of a deterministic five-page PDF, and write the extracted markdown plus a small log file that the verifier will inspect.\n\nThe task workspace `/home/user/parse_pages_task` is pre-seeded with a five-page PDF at `/home/user/parse_pages_task/sample.pdf` (generated at image build time, identical across runs). Each page contains exactly one visible marker phrase so that the verifier can confirm which pages were actually parsed:\n\n- Page index `0`: `Marker-Alpha-Page-Zero`\n- Page index `1`: `Marker-Bravo-Page-One`\n- Page index `2`: `Marker-Charlie-Page-Two`\n- Page index `3`: `Marker-Delta-Page-Three`\n- Page index `4`: `Marker-Echo-Page-Four`\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Write a Python script `parse_pages.py` in `/home/user/parse_pages_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Uses the official LlamaParse Python SDK (e.g. `from llama_cloud_services import LlamaParse` or `from llama_parse import LlamaParse`) to parse `sample.pdf`.\n  - Configures the parser with `result_type=\"markdown\"` and `target_pages=\"1,3\"` so that only the second and fourth pages of the PDF (0-indexed pages `1` and `3`) are parsed.\n  - Concatenates the markdown returned for the parsed pages (separated by blank lines if there is more than one) and writes the full markdown to `/home/user/parse_pages_task/output.md` as UTF-8 text.\n  - Writes a companion log file `/home/user/parse_pages_task/output.log` so the verifier can correlate the produced artifacts with the trial (see Acceptance Criteria for the exact lines that must appear).\n- The script must run end-to-end with `python3 parse_pages.py` from `/home/user/parse_pages_task` and exit with status code `0`.\n\n## Implementation Hints\n- The LlamaParse Python SDK reads `LLAMA_CLOUD_API_KEY` automatically when the environment variable is set, so you don't have to pass `api_key=...` explicitly.\n- `LlamaParse` accepts the `target_pages` argument as a comma-separated string of 0-indexed page numbers (range syntax such as `0-2,5` is also supported). To skip pages `0`, `2`, and `4` of this PDF, pass `target_pages=\"1,3\"`.\n- Call `parser.load_data(\"./sample.pdf\")` to get back a list of `Document` objects whose `.text` attribute is the markdown for the parsed pages. Joining the `.text` of every returned document with `\"\\n\\n\"` is enough to assemble the final markdown.\n- Read `trial_id` once at the top of the script and embed it in the log file so the verifier can correlate the run with the trial.\n\n## Acceptance Criteria\n- Project path: `/home/user/parse_pages_task`\n- Source PDF: `/home/user/parse_pages_task/sample.pdf`\n- Script path: `/home/user/parse_pages_task/parse_pages.py`\n- Markdown output: `/home/user/parse_pages_task/output.md`\n- Log file: `/home/user/parse_pages_task/output.log`\n- Command: `python3 /home/user/parse_pages_task/parse_pages.py` (run from `/home/user/parse_pages_task`).\n  - The command must exit with status code `0`.\n- LlamaParse usage:\n  - `parse_pages.py` must import LlamaParse from either `llama_cloud_services` or `llama_parse` (e.g. the literal substring `from llama_cloud_services import` or `from llama_parse import`).\n  - The source file must contain the literal substring `target_pages` (proving the executor configured the feature).\n- The markdown output `/home/user/parse_pages_task/output.md` must:\n  - Be a non-empty UTF-8 text file.\n  - Contain the marker phrases from the two pages that were requested (`Marker-Bravo-Page-One` and `Marker-Delta-Page-Three`).\n  - **Not** contain the marker phrases from the three pages that were skipped (`Marker-Alpha-Page-Zero`, `Marker-Charlie-Page-Two`, and `Marker-Echo-Page-Four`).\n- The log file `/home/user/parse_pages_task/output.log` must contain:\n  - A line of the form `Trial id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` is the value read from `/logs/artifacts/trial_id`.\n  - A line of the form `Target pages: 1,3` echoing the exact `target_pages` string that was sent to the parser.\n  - A line of the form `Parsed pages count: \u003cN\u003e` where `\u003cN\u003e` is the number of pages LlamaParse returned for this job; it must be exactly `2` because two pages were requested.\n\n"])</script><script>self.__next_f.push([1,"14:T1828,"])</script><script>self.__next_f.push([1,"# Parse a Multi-Page PDF into Structured JSON with LlamaParse (Python)\n\n## Background\nLlamaCloud's `LlamaParse` parser supports several output modes. While `result_type=\"markdown\"` returns clean markdown documents, `result_type=\"json\"` (used together with `parser.get_json_result(...)`) returns a much richer structured representation that contains, per page, the page number, the extracted text, the markdown rendering, and the list of structured items (headings, paragraphs, tables, etc.). This JSON view is the right primitive when a downstream pipeline wants programmatic access to the page-level structure instead of a single flat markdown blob.\n\nIn this task you must build a small Python program that uses `LlamaParse` in JSON mode to parse a deterministic three-page PDF and write a structured per-page JSON manifest that a downstream system could consume directly.\n\nThe task workspace `/home/user/parse_json_task` is pre-seeded with a three-page PDF at `/home/user/parse_json_task/sample.pdf` (generated at image build time, identical across runs). Every page contains exactly one distinct marker phrase and one quarterly-revenue sentence so the manifest can be verified deterministically:\n\n- Page `1`: `JSON-Mode-Page-One` and the sentence `The total revenue in Q1 was $500,000.`\n- Page `2`: `JSON-Mode-Page-Two` and the sentence `The total revenue in Q2 was $750,000.`\n- Page `3`: `JSON-Mode-Page-Three` and the sentence `The total revenue in Q3 was $1,000,000.`\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Write a Python script `parse_to_json.py` in `/home/user/parse_json_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Uses the official LlamaParse Python SDK (e.g. `from llama_cloud_services import LlamaParse` or `from llama_parse import LlamaParse`) configured with `result_type=\"json\"` to parse `sample.pdf`.\n  - Calls `parser.get_json_result(...)` (the JSON-mode entry point) to obtain the structured per-page payload returned by LlamaParse. The returned object is a list with one element per parsed PDF; the element exposes a `job_id` and a `pages` list whose entries contain at least the keys `page`, `text`, and `md`.\n  - Writes a JSON manifest to `/home/user/parse_json_task/output.json` (UTF-8, JSON-pretty-printed with `indent=2`) with the shape:\n    ```json\n    {\n      \"trial_id\": \"\u003ctrial_id from /logs/artifacts/trial_id\u003e\",\n      \"job_id\": \"\u003cLlamaParse job id\u003e\",\n      \"page_count\": 3,\n      \"pages\": [\n        {\"page\": 1, \"text\": \"\u003cextracted page 1 text\u003e\", \"markdown\": \"\u003cextracted page 1 markdown\u003e\"},\n        {\"page\": 2, \"text\": \"\u003cextracted page 2 text\u003e\", \"markdown\": \"\u003cextracted page 2 markdown\u003e\"},\n        {\"page\": 3, \"text\": \"\u003cextracted page 3 text\u003e\", \"markdown\": \"\u003cextracted page 3 markdown\u003e\"}\n      ]\n    }\n    ```\n    Entries in `pages` must be sorted by ascending `page` number. Each `text` and `markdown` value must be the corresponding string returned by LlamaParse for that page.\n  - Writes a companion log file `/home/user/parse_json_task/output.log` containing the lines required in the Acceptance Criteria below so the verifier can correlate the produced artifacts with the trial and the LlamaParse job.\n- The script must run end-to-end with `python3 parse_to_json.py` from `/home/user/parse_json_task` and exit with status code `0`.\n\n## Implementation Hints\n- The LlamaParse Python SDK reads `LLAMA_CLOUD_API_KEY` from the environment automatically when the variable is set; you do not need to pass `api_key=...` explicitly.\n- The relevant constructor flag is `result_type=\"json\"`. With that setting, the call `parser.get_json_result(\"./sample.pdf\")` returns a list of dictionaries. Each dictionary describes one parsed file and contains at least `job_id` and `pages`. Inside `pages`, each entry has `page` (1-indexed), `text`, and `md`.\n- Use the standard library `json` module to serialize the manifest and write it with UTF-8 encoding.\n- Read `trial_id` once at the top of the script and embed it in both the JSON manifest and the log file.\n\n## Acceptance Criteria\n- Project path: `/home/user/parse_json_task`\n- Source PDF: `/home/user/parse_json_task/sample.pdf`\n- Script path: `/home/user/parse_json_task/parse_to_json.py`\n- JSON manifest: `/home/user/parse_json_task/output.json`\n- Log file: `/home/user/parse_json_task/output.log`\n- Command: `python3 /home/user/parse_json_task/parse_to_json.py` (run from `/home/user/parse_json_task`).\n  - The command must exit with status code `0`.\n- LlamaParse usage:\n  - `parse_to_json.py` must import `LlamaParse` from either `llama_cloud_services` or `llama_parse` (the source must contain the literal substring `from llama_cloud_services import` or `from llama_parse import`).\n  - The source must contain the literal substring `result_type` configured to the JSON output mode (e.g. `result_type=\"json\"`).\n  - The source must call `get_json_result` (so the JSON-mode entry point is actually used).\n- The JSON manifest `/home/user/parse_json_task/output.json` must:\n  - Be a non-empty UTF-8 file that parses with `json.load(...)` into a single object.\n  - Contain top-level keys `trial_id`, `job_id`, `page_count`, and `pages`.\n  - `trial_id` must equal the value read from `/logs/artifacts/trial_id`.\n  - `page_count` must be the integer `3`.\n  - `pages` must be a JSON array of length `3` whose entries are sorted by ascending `page`.\n  - Each entry in `pages` must be a JSON object containing the keys `page`, `text`, and `markdown`.\n  - The `page` values must be exactly `1`, `2`, `3` in order.\n  - The `text` field of each page must contain the marker phrase for that page (`JSON-Mode-Page-One`, `JSON-Mode-Page-Two`, `JSON-Mode-Page-Three` respectively) and the page's quarterly-revenue dollar value (`$500,000`, `$750,000`, `$1,000,000` respectively).\n- The log file `/home/user/parse_json_task/output.log` must contain:\n  - A line of the form `Trial id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` is the value read from `/logs/artifacts/trial_id`.\n  - A line of the form `Job id: \u003cjob_id\u003e` where `\u003cjob_id\u003e` is the same LlamaParse job id stored in `output.json`.\n  - A line of the form `Page count: 3`.\n\n"])</script><script>self.__next_f.push([1,"15:T15b7,"])</script><script>self.__next_f.push([1,"# Parse a Receipt PDF with a LlamaParse Custom Prompt (Python)\n\n## Background\nLlamaParse, LlamaCloud's agentic parser, supports a `custom_prompt` that lets you instruct the parsing agent in natural language. This is useful when the document contains a lot of noise (promotional text, survey codes, marketing) and you only care about a specific subset of the content (e.g. line items on a receipt). In this task you must build a small Python program that uses the official `llama-cloud` Python SDK to parse a deterministic receipt PDF with a custom prompt so that the markdown output contains **only** the receipt line items and the final amount due.\n\nThe task workspace `/home/user/prompted_parse_task` already contains the seeded receipt PDF at `/home/user/prompted_parse_task/sample.pdf`. The PDF is generated at image build time and is identical across runs. It includes:\n- A merchant header block.\n- A promotional / coupon section with a survey code that should be filtered out.\n- A line-item table with three items (item name + price each):\n  - `Big Mac Meal` — `$8.99`\n  - `Snack Oreo McFlurry` — `$2.69`\n  - `Happy Meal 6 Pc` — `$4.89`\n- A totals block with a subtotal, tax, and the final `Total` of `$17.36`.\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Write a Python script `parse_with_prompt.py` in `/home/user/prompted_parse_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable (the LlamaCloud SDK reads it automatically from the environment).\n  - Uses the official LlamaCloud Python SDK (`llama-cloud` package, i.e. `from llama_cloud import LlamaCloud` or `AsyncLlamaCloud`) to upload `sample.pdf` with `purpose=\"parse\"` and run a parse job.\n  - Passes a natural-language `custom_prompt` to the parser via `processing_options.auto_mode_configuration[].parsing_conf.custom_prompt`. The custom prompt must instruct the parser to keep only the line items (item name and price) and the final `Total` of the receipt, and to drop everything else (header, promotional text, survey codes, subtotal, tax).\n  - Uses the `agentic` tier and asks for the markdown output via `expand=[\"markdown\"]`.\n  - Concatenates the markdown of every parsed page (separated by blank lines if there is more than one) and writes the full result to `/home/user/prompted_parse_task/output.md` as UTF-8 text.\n  - Writes a companion log file `/home/user/prompted_parse_task/output.log` with the required fields described below so the verifier can correlate the produced artifacts with the trial.\n- The script must run end-to-end with `python3 parse_with_prompt.py` from `/home/user/prompted_parse_task` and exit with status code `0`.\n\n## Implementation Hints\n- The LlamaCloud Python SDK is already installed. `LlamaCloud()` (or `AsyncLlamaCloud()`) instantiated with no arguments will pick up `LLAMA_CLOUD_API_KEY` from the environment automatically.\n- Upload the PDF with `client.files.create(file=\"./sample.pdf\", purpose=\"parse\")` to obtain a file id, then call `client.parsing.parse(file_id=..., tier=\"agentic\", version=\"latest\", expand=[\"markdown\"], processing_options=...)`. The SDK polls the job to completion for you.\n- The `custom_prompt` lives on the `parsing_conf` of an `auto_mode_configuration` entry inside `processing_options`. The typed helpers `ProcessingOptions`, `ProcessingOptionsAutoModeConfiguration`, and `ProcessingOptionsAutoModeConfigurationParsingConf` are available in `llama_cloud.types.parsing_create_params`; plain dicts with the same shape also work.\n- The result object exposes `.markdown.pages`, a list with one entry per page. Join the `.markdown` of every page to build the final markdown text.\n- Read `trial_id` once at the top of the script and embed it in the log file so the verifier can correlate the run.\n- Because the custom prompt is interpreted by an LLM the markdown shape may vary slightly between runs, but every required line item (item name + price) and the final total must remain in the output.\n\n## Acceptance Criteria\n- Project path: `/home/user/prompted_parse_task`\n- Source PDF: `/home/user/prompted_parse_task/sample.pdf`\n- Script path: `/home/user/prompted_parse_task/parse_with_prompt.py`\n- Markdown output: `/home/user/prompted_parse_task/output.md`\n- Log file: `/home/user/prompted_parse_task/output.log`\n- Command: `python3 /home/user/prompted_parse_task/parse_with_prompt.py` (run from `/home/user/prompted_parse_task`).\n  - The command must exit with status code `0`.\n- LlamaCloud usage:\n  - `parse_with_prompt.py` must import from the `llama_cloud` Python SDK (e.g. the literal substring `from llama_cloud` or `import llama_cloud`).\n  - The parse job must be configured with a non-empty `custom_prompt` placed on a `parsing_conf` inside `processing_options.auto_mode_configuration` so the agentic parser receives the natural-language instruction.\n- The markdown output `/home/user/prompted_parse_task/output.md` must:\n  - Be a non-empty UTF-8 text file.\n  - Contain every line-item name and its price from the seeded receipt (item names and the dollar prices).\n  - Contain the final total of the receipt.\n- The log file `/home/user/prompted_parse_task/output.log` must contain:\n  - A line of the form `Trial id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` is the value read from `/logs/artifacts/trial_id`.\n  - A line of the form `Custom prompt: \u003cprompt\u003e` echoing the custom prompt string that was sent to the parser.\n  - A line of the form `Parse job id: \u003cjob_id\u003e` where `\u003cjob_id\u003e` is the id of the parsing job returned by LlamaCloud.\n\n"])</script><script>self.__next_f.push([1,"16:T16ab,"])</script><script>self.__next_f.push([1,"# Save LlamaParse Page Screenshots to Disk (Python)\n\n## Background\nLlamaCloud's v2 parsing service can render a high-resolution screenshot of every page of a document alongside the parsed text. In multimodal RAG pipelines this is useful when you want to keep a visual copy of every page (e.g. to feed it into a vision LLM later). When the parser is configured with `output_options.images_to_save = [\"screenshot\"]` the API exposes each page screenshot through a presigned download URL on the `images_content_metadata` field of the parse result. Your job is to build a small Python program that drives this end to end: upload a deterministic three-page PDF, parse it with screenshots enabled, download every per-page screenshot, and save each one as a PNG file on disk.\n\nThe task workspace `/home/user/screenshot_task` is pre-seeded with a three-page PDF at `/home/user/screenshot_task/sample.pdf`. The PDF is generated at image build time and is identical across runs. Each page contains a single, distinct marker phrase so the verifier can confirm the right document was parsed:\n- Page 1: `Screenshot-Mode-Page-One`\n- Page 2: `Screenshot-Mode-Page-Two`\n- Page 3: `Screenshot-Mode-Page-Three`\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Write a Python script `save_screenshots.py` in `/home/user/screenshot_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable (the LlamaCloud SDK reads it automatically from the environment).\n  - Uses the official LlamaCloud Python SDK (`llama-cloud` package, i.e. `from llama_cloud import LlamaCloud` or `from llama_cloud import AsyncLlamaCloud`) to upload `sample.pdf` with `purpose=\"parse\"` and run a parse job.\n  - Configures the parse job to use the `agentic` tier, asks the parser to render per-page screenshots via `output_options.images_to_save=[\"screenshot\"]`, and requests both `markdown` (so the agent can produce the markdown output the parser tier requires) and `images_content_metadata` (so the script gets the presigned download URLs for the screenshots) on the result.\n  - Iterates over the entries in `result.images_content_metadata.images`, downloads each presigned URL with an HTTP `GET`, and writes the bytes to a file under `/home/user/screenshot_task/screenshots/`. Each saved file must:\n    - Be named `page_\u003cNN\u003e.png` where `\u003cNN\u003e` is the 1-indexed page number zero-padded to two digits (`page_01.png`, `page_02.png`, `page_03.png`).\n    - Contain the raw PNG bytes returned by the presigned URL (the file must start with the standard PNG signature `\\x89PNG\\r\\n\\x1a\\n` and be a valid image).\n  - Writes a companion log file `/home/user/screenshot_task/output.log` whose contents are described in the Acceptance Criteria.\n- The script must run end-to-end with `python3 save_screenshots.py` from `/home/user/screenshot_task` and exit with status code `0`.\n\n## Implementation Hints\n- The LlamaCloud Python SDK is already installed. `LlamaCloud()` instantiated with no arguments will pick up `LLAMA_CLOUD_API_KEY` from the environment automatically.\n- Upload the PDF with `client.files.create(file=\"./sample.pdf\", purpose=\"parse\")` to obtain a file id, then call `client.parsing.parse(file_id=..., tier=\"agentic\", version=\"latest\", output_options={\"images_to_save\": [\"screenshot\"]}, expand=[\"markdown\", \"images_content_metadata\"])`. The SDK polls the parse job to completion for you.\n- The parse result exposes `result.images_content_metadata`, an object with an `images` list. Each entry has at least `.filename`, `.content_type` (e.g. `image/png`), and `.presigned_url`. Some entries also expose `.page_number` (1-indexed), but if not, you can infer the page order from the `.filename` or from the order of items in the list.\n- Use the standard library (`urllib.request.urlopen(url).read()` is enough) or `requests.get(url).content` to download each presigned URL and write the bytes to disk. Make sure to create the output directory before writing.\n- Read `trial_id` once at the top of the script and embed it in the log file so the verifier can correlate the run with the trial.\n\n## Acceptance Criteria\n- Project path: `/home/user/screenshot_task`\n- Source PDF: `/home/user/screenshot_task/sample.pdf`\n- Script path: `/home/user/screenshot_task/save_screenshots.py`\n- Screenshot output directory: `/home/user/screenshot_task/screenshots/`\n- Log file: `/home/user/screenshot_task/output.log`\n- Command: `python3 /home/user/screenshot_task/save_screenshots.py` (run from `/home/user/screenshot_task`).\n  - The command must exit with status code `0`.\n- LlamaCloud usage:\n  - `save_screenshots.py` must import from the `llama_cloud` Python SDK (the source must contain the literal substring `from llama_cloud` or `import llama_cloud`).\n  - The source must contain the literal substring `images_to_save` so the executor wired the screenshot output option.\n  - The source must contain the literal substring `images_content_metadata` so the executor opted into the presigned-URL response.\n- The screenshot output directory must contain exactly three files: `page_01.png`, `page_02.png`, `page_03.png`. Each file must:\n  - Have a non-zero size (at least 1024 bytes).\n  - Start with the canonical PNG signature `\\x89PNG\\r\\n\\x1a\\n` so the verifier can confirm the bytes are a real PNG.\n- The log file `/home/user/screenshot_task/output.log` must contain:\n  - A line of the form `Trial id: \u003ctrial_id\u003e` where `\u003ctrial_id\u003e` is the value read from `/logs/artifacts/trial_id`.\n  - A line of the form `Parse job id: \u003cjob_id\u003e` where `\u003cjob_id\u003e` is the id of the parsing job returned by LlamaCloud.\n  - A line of the form `Screenshot count: 3`.\n  - A line of the form `Saved: page_01.png`.\n  - A line of the form `Saved: page_02.png`.\n  - A line of the form `Saved: page_03.png`.\n\n"])</script><script>self.__next_f.push([1,"17:T1bc1,"])</script><script>self.__next_f.push([1,"# Update a Document in a LlamaCloud Managed Index Using `update_ref_doc` (Python)\n\n## Background\nA real-world LlamaCloud RAG pipeline must support correcting wrong content in an existing index without rebuilding the whole pipeline. The managed `LlamaCloudIndex` exposes an `update_ref_doc(document)` method that upserts a document with an explicit `id_` (a `ref_doc_id`): if a document with that `id_` is already present, the managed pipeline replaces its content with the new content and reflects the change in subsequent retrievals.\n\nIn this task you will build a Python program that:\n1. Creates a brand-new LlamaCloud managed index from a small local corpus where every seed file is loaded as a `Document` with an explicit `id_` (the file's basename without extension).\n2. After the index is fully ingested, replaces the content of one specific document (the one whose `id_` is `atlantis-aurora`) with a corrected version using `update_ref_doc(...)`. The corrected text is provided in a separate local file.\n3. Performs retrievals before and after the update so that a downstream verifier can confirm that the new content is now searchable and that the old content is no longer surfaced.\n\nThe task workspace `/home/user/update_task` is pre-seeded with two folders:\n- `/home/user/update_task/data/initial` — the documents that must be used to **create** the index. It contains:\n  - `atlantis-aurora.txt` — initial (incorrect) facts about the Atlantis Aurora.\n  - `atlantis-cuisine.txt` — facts about Atlantean cuisine. This document must remain untouched.\n- `/home/user/update_task/data/updates/atlantis-aurora.txt` — the corrected text that must replace the content of the `atlantis-aurora` document via `update_ref_doc`.\n\n## Requirements\n- Read the current `trial_id` from `/logs/artifacts/trial_id`.\n- Build a Python script `update_index.py` in `/home/user/update_task` that:\n  - Authenticates against LlamaCloud using the `LLAMA_CLOUD_API_KEY` environment variable.\n  - Constructs `llama_index.core.Document` objects from **every** file in `/home/user/update_task/data/initial`. Each `Document` must be given the explicit `id_` equal to the file's basename without extension (so the two starting documents must have `id_` values `atlantis-aurora` and `atlantis-cuisine`). The text content of each `Document` must be the contents of the corresponding seed file.\n  - Creates a brand-new LlamaCloud managed index whose name is `harbor-update-index-${trial_id}` (the literal base name `harbor-update-index-` followed by the value read from `/logs/artifacts/trial_id`) inside the `Default` project, populated with **both** starting documents. The index must use the managed embeddings provided by LlamaCloud (no separate OpenAI key is required).\n  - After the index exists and is fully ingested, builds a single new `Document` with `id_=\"atlantis-aurora\"` whose text content is the contents of `/home/user/update_task/data/updates/atlantis-aurora.txt`, and calls `LlamaCloudIndex.update_ref_doc(...)` on the **same** managed index to upsert that corrected document. The pipeline itself must not be deleted or re-created; only the `atlantis-aurora` document's content is replaced.\n  - Uses the updated index as a retriever (with a reasonably high `similarity_top_k` such as `5`) to fetch nodes for the query `What is the Atlantis Aurora?` and writes the retrieved context into the log so the verifier can confirm the update took effect.\n  - Uses the updated index as a retriever to fetch nodes for the query `What is the national dish of Atlantis?` and writes the retrieved context into the log so the verifier can confirm the **other** document was not affected by the update.\n  - Writes a log file `/home/user/update_task/output.log` summarizing the workflow (see Acceptance Criteria for the exact lines and sections that must appear).\n- The script must run end-to-end with `python3 update_index.py` and exit with status code `0`.\n\n## Implementation Hints\n- The managed-index integration is `llama_index.indices.managed.llama_cloud.LlamaCloudIndex` (already pre-installed). `LlamaCloudIndex.from_documents(documents, name=..., project_name=\"Default\")` will create the managed pipeline and ingest the documents synchronously; passing `verbose=True` is helpful while debugging.\n- Construct `Document` objects directly so you can assign explicit IDs, e.g. `Document(text=open(path).read(), id_=\"atlantis-aurora\")`. The same `id_` value is the `ref_doc_id` used by `update_ref_doc`.\n- `LlamaCloudIndex.update_ref_doc(document, verbose=True)` upserts a single document — internally it deletes the previous version and inserts the new one — and waits for the managed pipeline to finish processing before returning, so retrievals performed after the call should already reflect the update.\n- `index.as_retriever(similarity_top_k=5)` returns a retriever; calling `.retrieve(\"\u003cquestion\u003e\")` returns a list of `NodeWithScore` items whose `.get_content()` (or `.text`) attribute holds the retrieved text. Log the joined content so the verifier can search it.\n- Append `trial_id` to the index name so parallel trials do not collide. Read it once from `/logs/artifacts/trial_id` and reuse it everywhere.\n\n## Acceptance Criteria\n- Project path: `/home/user/update_task`\n- Script path: `/home/user/update_task/update_index.py`\n- Log file: `/home/user/update_task/output.log`\n- Command: `python3 /home/user/update_task/update_index.py`\n  - The command must exit with status code `0`.\n- The created LlamaCloud managed index name must be `harbor-update-index-${trial_id}` where `trial_id` is the value read from `/logs/artifacts/trial_id`, and it must live in the LlamaCloud `Default` project.\n- The script source must reference `update_ref_doc` (so the verifier can confirm that the LlamaCloud upsert API was actually used).\n- The log file must:\n  - Be a non-empty UTF-8 text file.\n  - Contain a line of the form `Index name: harbor-update-index-\u003ctrial_id\u003e` so the verifier can confirm the resource name.\n  - Contain a line of the form `Updated document id: atlantis-aurora` so the verifier can confirm which `ref_doc_id` was upserted.\n  - Contain a section that prints the retrieved context returned by the retriever for the query `What is the Atlantis Aurora?`. The section must be introduced by a line equal to `=== aurora retrieval ===` so the verifier can locate it. The retrieved context in that section must include a distinctive phrase from the corrected `data/updates/atlantis-aurora.txt` file (proving the update is now searchable) and must NOT include a distinctive phrase from the original `data/initial/atlantis-aurora.txt` file (proving the old content was actually replaced).\n  - Contain a section that prints the retrieved context returned by the retriever for the query `What is the national dish of Atlantis?`. The section must be introduced by a line equal to `=== cuisine retrieval ===` so the verifier can locate it. The retrieved context in that section must include a distinctive phrase from the seeded `atlantis-cuisine.txt` file (proving the untouched document is still searchable).\n\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"wkoxjdVGVWyDWN5FsFi7v\",\"c\":[\"\",\"tasks\",\"\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"tasks\",{\
