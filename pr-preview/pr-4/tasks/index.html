\u003cpath\u003e`: the path to the local PDF file to parse.\n  - `--output \u003cpath\u003e`: the path where the parsed markdown should be written.\n- The script MUST use the **asynchronous** LlamaCloud Python SDK client: `from llama_cloud import AsyncLlamaCloud`.\n- The script MUST define an `async def` coroutine (e.g., `async def main():`) that contains all `await`-ed SDK calls, and the program entry-point MUST drive it with `asyncio.run(main())`.\n- Validate that the `--input` file exists before uploading. If it does not, print an error message to stderr and exit with a **non-zero** status code (do NOT silently succeed when the input file is missing).\n- Inside the coroutine:\n  - Upload the input file with `purpose=\"parse\"` using `await client.files.create(file=\u003cinput_path\u003e, purpose=\"parse\")`.\n  - Trigger a parsing job using `await client.parsing.parse(file_id=..., tier=\"agentic\", version=\"latest\", expand=[\"markdown\"])`. The SDK awaits until the job finishes and returns the full result.\n- After the job completes, write the **per-page markdown joined into a single document** to the `--output` file. Pages must be joined with two consecutive newline characters (`\\n\\n`) between adjacent pages, in their original page order. Use UTF-8 encoding for the output file.\n- Print a single line to stdout in the exact format: `Parsed \u003cN\u003e pages asynchronously` where `\u003cN\u003e` is the number of pages returned by the parse job (i.e., `len(result.markdown.pages)`).\n- The script must exit with status code `0` on success.\n\n## Implementation Guide\n1. Create `/home/user/myproject/async_parse.py`.\n2. Use `argparse` (standard library) to parse `--input` and `--output`.\n3. Check existence of `--input` with `os.path.isfile(...)`. If missing, write an error message to `sys.stderr` and `sys.exit(1)`.\n4. Import the async client: `from llama_cloud import AsyncLlamaCloud`.\n5. Define `async def main(input_path: str, output_path: str) -\u003e int:` ing, exactly as provided via `--message2`).\n  - `response2`: `str(response2)` — the textual response returned by the second `chat_engine.chat(...)` call.\n- Print exactly one line to stdout: `Chat session: harbor-chat-${trial_id}` where `${trial_id}` is replaced by the trimmed value from `/logs/artifacts/trial_id`.\n- The script must exit with status code `0` on success and a non-zero status code when `--data-dir` does not exist or is not a directory.\n\n## Implementation Guide\n1. Parse `--data-dir`, `--message1`, `--message2`, and `--output` using `argparse` (standard library).\n2. Open `/logs/artifacts/trial_id`, read its content, and strip whitespace to obtain `trial_id`.\n3. Validate that `--data-dir` exists and is a directory; if not, exit with a non-zero status code.\n4. Load documents from `--data-dir` with `SimpleDirectoryReader(\u003cdata-dir\u003e).load_data()`.\n5. Create the managed index with `LlamaCloudIndex.from_documents(...)` using `name=f\"harbor-chat-{trial_id}\"`, `project_name=\"Default\"`, and `verbose=True`.\n6. Build the chat engine: `chat_engine = index.as_chat_engine(chat_mode=\"context\")`.\n7. Call `response1 = chat_engine.chat(\u003cmessage1\u003e)`.\n8. Without resetting, call `response2 = chat_engine.chat(\u003cmessage2\u003e)`.\n9. Build a Python dict with the five fields above (in the listed order) and write it to `--output` via `json.dump(..., indent=2)` in UTF-8.\n10. Print the `Chat session: harbor-chat-\u003ctrial_id\u003e` line.\n11. Return exit code `0`.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Script path: /home/user/myproject/chat.py\n- Command: `python3 chat.py --data-dir \u003cdata_dir\u003e --message1 \u003cmessage1\u003e --message2 \u003cmessage2\u003e --output \u003coutput_json_path\u003e`\n- Input argument format: `--data-dir \u003cpath_to_directory\u003e`, `--message1 \u003cuser_message_1\u003e`, `--message2 \u003cuser_message_2\u003e`, `--output \u003cpath_to_output_json_file\u003e`.\n- Exp ndle authentication explicitly — the SDK reads the API key from the environment automatically.\n\nThe convenience method `client.classifier.classify(...)` uploads, classifies, and waits for completion in a single call. Results are returned as a list of items; each item exposes a `result` attribute with `type`, `confidence`, and `reasoning` fields.\n\n## Requirements\n- Implement a Python CLI named `classify.py` at `/home/user/myproject/classify.py`.\n- The script must accept exactly two command-line arguments:\n  - `--input \u003cpath\u003e`: the path to the local input file (typically `document.txt`).\n  - `--output \u003cpath\u003e`: the path where the classification result should be written as JSON.\n- The script must use the **`llama-cloud`** Python SDK (`from llama_cloud import LlamaCloud`).\n- Upload the input file with `purpose=\"classify\"`.\n- Submit a classification job using `client.classifier.classify(...)` with the following two rules (in this exact order):\n  1. `type=\"invoice\"`, `description=\"Documents that contain an invoice number, invoice date, bill-to section, and line items with totals.\"`\n  2. `type=\"receipt\"`, `description=\"Short purchase receipts, typically from POS systems, with merchant, items and total, often a single page.\"`\n- Pass `mode=\"FAST\"` to the classify call.\n- After the call returns, take the first item from `result.items`. If `item.result` is `None`, exit with a non-zero status code.\n- Otherwise, write a JSON object to the `--output` path (UTF-8, with `indent=2`) containing exactly these fields:\n  - `type`: the classified type (string).\n  - `confidence`: the confidence value as returned by the SDK.\n  - `reasoning`: the reasoning string returned by the SDK.\n- After a successful run, print a single line to stdout in the exact format: `Classified as: \u003ctype\u003e` where `\u003ctype\u003e` is the classified type from the result item.\n- The script must exit with status code `0` on success and a non-zero status code if classification failed (no result available) or if the input file does not exist.\n\n## Implementation Guide\n1. Initialize the project at `/home/user/myproject`.\n2. Parse `--input` and `--output` using `argparse` (standard library).\n3. Instantiate `LlamaCloud()` — it reads `LLAMA_CLOUD_API_KEY` from the environment.\n4. Upload the input file using `client.files.create(file=\u003cinput_path\u003e, purpose=\"classify\")` and capture the returned file id.\n5. Call `client.classifier.classify(file_ids=[\u003cfile_id\u003e], rules=[...], mode=\"FAST\")` with the two rules described above.\n6. Inspect `result.items[0]`. If `item.result` is `None`, exit non-zero.\n7. Otherwise, build a dict with `type`, `confidence`, and `reasoning` and write it as pretty-printed JSON to `--output`.\n8. Print `Classified as: \u003ctype\u003e`.\n9. Return exit code 0.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Script path: /home/user/myproject/classify.py\n- Command: `python3 classify.py --input \u003cinput_path\u003e --output \u003coutput_json_path\u003e`\n- Input argument format: `--input \u003cpath_to_input_file\u003e` and `--output \u003cpath_to_output_json_file\u003e`\n- Expected stdout: includes exactly one line `Classified as: invoice` when the provided `document.txt` describes an invoice.\n- The output JSON file must be created at the path specified by `--output` and must contain the fields `type`, `confidence`, and `reasoning`.\n- The script must use the `llama-cloud` Python SDK with `mode=\"FAST\"`.\n- The classify call must include both rules (`type=\"invoice\"` and `type=\"receipt\"`) with the descriptions specified above.\n- The script must succeed (exit code 0) when given a valid input file and a valid `LLAMA_CLOUD_API_KEY`.\n- The script must exit with a non-zero status code when the input file does not exist.\n\n"])</script><script>self.__next_f.push([1,"b:T1c06,"])</script><script>self.__next_f.push([1,"# Build a LlamaCloud Composite Retriever Across Two Managed Indexes (Python)\n\n## Background\nYou are working in `/home/user/myproject`, which contains two pre-populated document folders:\n\n- `/home/user/myproject/products/` — product specification documents for the fictional Acme Widgets Corporation.\n- `/home/user/myproject/support/` — customer support FAQ documents for the same company.\n\nYour job is to build a Python command-line utility that uses the [LlamaIndex managed index integration](https://docs.llamaindex.ai/en/stable/api_reference/indices/llama_cloud/) (the `llama-index-indices-managed-llama-cloud` package) to:\n\n1. Create **two separate** managed indexes on LlamaCloud — one per folder.\n2. Combine both indexes into a single `LlamaCloudCompositeRetriever` running in `CompositeRetrievalMode.FULL` mode.\n3. Run a natural-language query against the composite retriever and persist the retrieved chunks.\n\nThe SDK is already installed in the environment and the `LLAMA_CLOUD_API_KEY` environment variable is configured. You do NOT need to handle authentication explicitly — the SDK reads the API key from the environment automatically.\n\n## Parallel-Run Safety\nMany trials may run concurrently and share the same LlamaCloud account, so every external resource you create on LlamaCloud **MUST** be uniquely named. The harness writes the current `trial_id` to the file `/logs/artifacts/trial_id` before the task starts. Read that file and use the value to disambiguate every index and retriever name (see Requirements).\n\n## Requirements\n- Implement a Python CLI named `composite.py` at `/home/user/myproject/composite.py`.\n- The script must accept exactly four command-line arguments:\n  - `--products-dir \u003cpath\u003e`: path to the products documents directory.\n  - `--support-dir \u003cpath\u003e`: path to the support documents directory.\n  - `--query \u003ctext\u003e`: a natural-language query string.\n  - `--output \u003cpath\u003e`: the path where the retrieved chunks should be written (UTF-8 text file).\n- Read `trial_id` from `/logs/artifacts/trial_id` (the file is a single line). Strip any trailing whitespace/newline.\n- Build the resource names using the trimmed `trial_id`:\n  - Products index name: `harbor-products-${trial_id}`\n  - Support index name: `harbor-support-${trial_id}`\n  - Composite retriever name: `harbor-composite-${trial_id}`\n- Use `SimpleDirectoryReader` from `llama_index.core` to load documents from each directory.\n- Use `LlamaCloudIndex.from_documents(...)` from `llama_index.indices.managed.llama_cloud` to create each managed index with `project_name=\"Default\"`.\n- Build a `LlamaCloudCompositeRetriever` from `llama_index.indices.managed.llama_cloud` with:\n  - `name=\"harbor-composite-${trial_id}\"`\n  - `project_name=\"Default\"`\n  - `create_if_not_exists=True`\n  - `mode=CompositeRetrievalMode.FULL` (import `CompositeRetrievalMode` from `llama_cloud`)\n  - `rerank_top_n=5`\n- Attach **both** managed indexes to the composite retriever via `composite_retriever.add_index(\u003cindex\u003e, description=\u003cdescription\u003e)`. Use these descriptions verbatim:\n  - Products index description: `Product specifications and technical details for Acme Widgets Corporation products.`\n  - Support index description: `Customer support FAQ and troubleshooting guides for Acme Widgets Corporation.`\n- Run the user-supplied query against the composite retriever via `composite_retriever.retrieve(\u003cquery\u003e)`.\n- Write the retrieved nodes to the `--output` file (UTF-8). Each retrieved node must be written as a single line in the format `score=\u003cscore\u003e: \u003ctext\u003e` followed by a newline, in the order returned by `.retrieve(...)`. `\u003cscore\u003e` should be `node.score` formatted via `repr(...)` (so `None` scores render as `None`); `\u003ctext\u003e` should be `node.get_content()` with all newline characters replaced by a single space.\n- Print exactly one line to stdout: `Retriever name: harbor-composite-${trial_id}` where `${trial_id}` is replaced by the trimmed value from `/logs/artifacts/trial_id`.\n- The script must exit with status code `0` on success and a non-zero status code when either `--products-dir` or `--support-dir` does not exist (or is not a directory).\n\n## Implementation Guide\n1. Parse `--products-dir`, `--support-dir`, `--query`, and `--output` using `argparse` (standard library).\n2. Open `/logs/artifacts/trial_id`, read its content, and strip whitespace to obtain `trial_id`.\n3. Validate that both `--products-dir` and `--support-dir` exist and are directories; if not, exit with a non-zero status code.\n4. Load documents for each folder via `SimpleDirectoryReader(\u003cdir\u003e).load_data()`.\n5. Create each managed index, e.g.:\n   ```python\n   from llama_index.indices.managed.llama_cloud import LlamaCloudIndex\n   products_index = LlamaCloudIndex.from_documents(\n       products_documents,\n       name=f\"harbor-products-{trial_id}\",\n       project_name=\"Default\",\n   )\n   ```\n6. Build the composite retriever and attach both indexes:\n   ```python\n   from llama_cloud import CompositeRetrievalMode\n   from llama_index.indices.managed.llama_cloud import LlamaCloudCompositeRetriever\n   composite_retriever = LlamaCloudCompositeRetriever(\n       name=f\"harbor-composite-{trial_id}\",\n       project_name=\"Default\",\n       create_if_not_exists=True,\n       mode=CompositeRetrievalMode.FULL,\n       rerank_top_n=5,\n   )\n   composite_retriever.add_index(products_index, description=\"...\")\n   composite_retriever.add_index(support_index, description=\"...\")\n   ```\n7. Call `nodes = composite_retriever.retrieve(\u003cquery\u003e)` and write `score=\u003crepr(node.score)\u003e: \u003cflattened-text\u003e` lines (one node per line) to `--output`.\n8. Print the `Retriever name: harbor-composite-\u003ctrial_id\u003e` line.\n9. Return exit code 0.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Script path: /home/user/myproject/composite.py\n- Command: `python3 composite.py --products-dir \u003cproducts_dir\u003e --support-dir \u003csupport_dir\u003e --query \u003cquery\u003e --output \u003coutput_path\u003e`\n- Input argument format: `--products-dir \u003cpath\u003e`, `--support-dir \u003cpath\u003e`, `--query \u003cquery_string\u003e`, `--output \u003cpath_to_text_file\u003e`.\n- Expected command stdout: includes exactly one line `Retriever name: harbor-composite-\u003ctrial_id\u003e` where `\u003ctrial_id\u003e` is read (and stripped) from `/logs/artifacts/trial_id`.\n- Two new LlamaCloud pipelines named `harbor-products-\u003ctrial_id\u003e` and `harbor-support-\u003ctrial_id\u003e` must exist in the `Default` project after the script runs.\n- A new LlamaCloud retriever named `harbor-composite-\u003ctrial_id\u003e` must exist (queryable via the `GET /api/v1/retrievers` REST endpoint). The retriever must have **exactly two** attached pipelines, whose IDs match the two indexes above.\n- The `--output` file must be created, must be non-empty, and each line must start with `score=` (one line per retrieved node).\n- The script must call `LlamaCloudIndex.from_documents` from `llama_index.indices.managed.llama_cloud` for each managed index with `project_name=\"Default\"`.\n- The script must use `LlamaCloudCompositeRetriever` with `mode=CompositeRetrievalMode.FULL` and `rerank_top_n=5`, and must call `add_index` twice.\n- The script must exit with a non-zero status code when either `--products-dir` or `--support-dir` does not exist.\n\n"])</script><script>self.__next_f.push([1,"c:T16b6,"])</script><script>self.__next_f.push([1,"# Configure a Region-Aware LlamaCloud Client (Python)\n\n## Background\nLlamaCloud offers two managed deployments: a default **North America (NA)** region and a separate **Europe (EU)** region. Each region has its own base URL, and a client created against the wrong base URL silently produces authentication errors instead of working requests. Your job is to build a small Pyt ith `indent=2`) containing **exactly** these fields, with **exactly** these names:\n  - `region`: the lowercased region string (`\"us\"` or `\"eu\"`).\n  - `base_url`: the resolved base URL string for the region (one of the two literals above).\n  - `connection_verified`: a JSON boolean. Must be `true` only when `--check` was supplied AND the project-listing call returned successfully without raising an exception. Must be `false` in every other case.\n  - `project_count`: a JSON integer. Must be the number of projects returned by the project-listing call when `--check` succeeded. Must be `0` when `--check` was not supplied or when the project-listing call failed.\n- After a successful run, print exactly one line to stdout in the **exact** format: `Region: \u003cregion\u003e | Base URL: \u003cbase_url\u003e` (single space around the pipe), where `\u003cregion\u003e` is the lowercased region string and `\u003cbase_url\u003e` is the resolved URL.\n- The script must exit with status code `0` on success (including when `--check` is omitted) and with a non-zero status code on argument-validation errors (such as an unknown region).\n\n## Implementation Guide\n1. Parse `--region`, `--output`, and the flag `--check` using `argparse` (standard library).\n2. Normalize `--region` to lowercase, then look it up in a dict that maps `\"us\"` and `\"eu\"` to their respective base URLs. If the value is unknown, exit with a non-zero status code (you may print an error to stderr).\n3. Construct the client:\n   ```python\n   from llama_cloud import LlamaCloud\n   client = LlamaCloud(base_url=resolved_url)\n   ```\n4. If `--check` is supplied, list the projects via the SDK using `client.projects.list()`. Convert the iterable to a `list(...)` so you can take its length. Wrap the call in a `try/except` so any SDK exception (network error, auth failure, etc.) results in `connection_verified=false` and `project_count=0` rather than a crash.\n5. Build the summary dictionary with the four required fields and write it to `--output` using `json.dump(summary, fp, indent=2)`.\n6. Print the line `Region: \u003cregion\u003e | Base URL: \u003cbase_url\u003e` to stdout.\n7. Return exit code 0.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Script path: /home/user/myproject/region_client.py\n- Command: `python3 region_client.py --region \u003cus|eu\u003e --output \u003cpath_to_json\u003e [--check]`\n- Input argument format: `--region \u003cus|eu\u003e` (case-insensitive), `--output \u003cpath_to_json_file\u003e`, optional `--check` flag.\n- Expected stdout: includes exactly one line `Region: \u003cregion\u003e | Base URL: \u003cbase_url\u003e` where `\u003cregion\u003e` is the lowercased input region (`us` or `eu`) and `\u003cbase_url\u003e` is the matching literal URL.\n- The `--output` JSON file must be created at the path specified by `--output` and must contain exactly the four fields `region`, `base_url`, `connection_verified`, and `project_count` with the semantics described in Requirements.\n- When `--region us --check` is supplied, the JSON file must contain `connection_verified: true` and `project_count` must be an integer `\u003e= 1` (the configured account has at least one project).\n- When `--region eu` is supplied without `--check`, the JSON file must contain `base_url: \"https://api.cloud.eu.llamaindex.ai\"`, `connection_verified: false`, and `project_count: 0` (no API call is made).\n- The script must use `LlamaCloud(base_url=...)` from the `llama_cloud` package to construct the client.\n- The script must exit with a non-zero status code when given an unknown region value (for example `--region apac`).\n\n"])</script><script>self.__next_f.push([1,"d:T11f9,"])</script><script>self.__next_f.push([1,"# Create and Query a LlamaCloud Managed Index (Python)\n\n## Background\nYou are working in `/home/user/myproject`, which already contains a small `docs/` folder with a single text file describing the fictional company **Acme Widgets Corporation**. Your job is to build a Python command-line utility that uses the [LlamaIndex managed index integration](https://docs.llamaindex.ai/en/stable/api_reference/indices/llama_cloud/) (the `llama-index-indices-managed-llama-cloud` package) to create a new managed index on **LlamaCloud**, ingest the documents, and run a natural-language query against the index.\n\nThe SDK is already installed in the environment and the `LLAMA_CLOUD_API_KEY` environment variable is configured. You do NOT need to handle authentication explicitly — the SDK reads the API key from the environment automatically.\n\n## Parallel-Run Safety\nMany trials may run concurrently and share the same LlamaCloud account, so every external resource you create on LlamaCloud **MUST** be uniquely named. The harness writes the current `trial_id` to the file `/logs/artifacts/trial_id` before the task starts. Read that file and use the value to disambiguate your index name (see Requirements).\n\n## Requirements\n- Implement a Python CLI named `build_index.py` at `/home/user/myproject/build_index.py`.\n- The script must accept exactly three command-line arguments:\n  - `--data-dir \u003cpath\u003e`: path to a local directory whose files should be loaded into the index.\n  - `--query \u003ctext\u003e`: a natural-language query string.\n  - `--output \u003cpath\u003e`: the path where the query response text should be written (UTF-8 text file).\n- Read `trial_id` from `/logs/artifacts/trial_id` (the file is a single line). Strip any trailing whitespace/newline.\n- Build the **index name** as `harbor-rag-${trial_id}` (literal prefix `harbor-rag-` followed by the trimmed `trial_id`).\n- Use `SimpleDirectoryReader` from `llama_index.core` to load documents from `--data-dir`.\n- Use `LlamaCloudIndex.from_documents(...)` from `llama_index.indices.managed.llama_cloud` to create a new managed index with:\n  - `name=\"harbor-rag-${trial_id}\"`\n  - `project_name=\"Default\"`\n  - `verbose=True`\n- After the index is created, build a query engine via `index.as_query_engine()` and run the user-supplied query against it.\n- Write the textual response (the `response` object converted to `str(...)`) to the `--output` file (UTF-8).\n- Print exactly one line to stdout: `Index name: harbor-rag-${trial_id}` where `${trial_id}` is replaced by the trimmed value from `/logs/artifacts/trial_id`.\n- The script must exit with status code `0` on success and a non-zero status code when `--data-dir` does not exist or contains no files.\n\n## Implementation Guide\n1. Parse `--data-dir`, `--query`, and `--output` using `argparse` (standard library).\n2. Open `/logs/artifacts/trial_id`, read its content, and strip whitespace to obtain `trial_id`.\n3. Validate that `--data-dir` exists and is a directory; if not, exit with a non-zero status code.\n4. Load documents:\n   ```python\n   from llama_index.core import SimpleDirectoryReader\n   documents = SimpleDirectoryReader(\u003cdata-dir\u003e).load_data()\n   ```\n5. Create the managed index:\n   ```python\n   from llama_index.indices.managed.llama_cloud import LlamaCloudIndex\n   index = LlamaCloudIndex.from_documents(\n       documents,\n       name=f\"harbor-rag-{trial_id}\",\n       project_name=\"Default\",\n       verbose=True,\n   )\n   ```\n6. Run the query:\n   ```python\n   query_engine = index.as_query_engine()\n   response = query_engine.query(\u003cquery\u003e)\n   ```\n7. Write `str(response)` to `--output`.\n8. Print the line `Index name: harbor-rag-\u003ctrial_id\u003e`.\n9. Return exit code 0.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Script path: /home/user/myproject/build_index.py\n- Command: `python3 build_index.py --data-dir \u003cdata_dir\u003e --query \u003cquery\u003e --output \u003coutput_path\u003e`\n- Input argument format: `--data-dir \u003cpath_to_directory\u003e`, `--query \u003cquery_string\u003e`, `--output \u003cpath_to_text_file\u003e`.\n- Expected command stdout: includes exactly one line ython SDK (`from llama_cloud import LlamaCloud`).\n- Define the extraction schema with **Pydantic** as a model named `Candidate` containing exactly these fields, in this order:\n  - `name: str` — Full name of the candidate.\n  - `email: str` — Email address of the candidate.\n  - `skills: list[str]` — Technical skills listed for the candidate.\n- Upload the input file with `purpose=\"extract\"`, then create an extraction job using:\n  - `data_schema=Candidate.model_json_schema()`\n  - `extraction_target=\"per_doc\"`\n  - `tier=\"agentic\"`\n- Poll the job until its `status` is one of `COMPLETED`, `FAILED`, or `CANCELLED`. Use `client.extract.get(job.id)` to refresh.\n- If the job finished with `status == \"COMPLETED\"`, write `job.extract_result` to the `--output` path as a JSON file (UTF-8, with `indent=2`).\n- After a successful run, print a single line to stdout in the exact format: `Extracted candidate: \u003cname\u003e` where `\u003cname\u003e` is taken from the extracted result.\n- The script must exit with status code `0` on success and a non-zero status code if the extraction job did not complete successfully (e.g., `FAILED` or `CANCELLED`).\n\n## Implementation Guide\n1. Initialize the project at `/home/user/myproject`.\n2. Parse `--input` and `--output` using `argparse` (standard library).\n3. Define the `Candidate` Pydantic model with the three required fields.\n4. Instantiate `LlamaCloud()` — it reads `LLAMA_CLOUD_API_KEY` from the environment.\n5. Upload the input file using `client.files.create(file=\u003cinput_path\u003e, purpose=\"extract\")` and capture the returned file object.\n6. Submit the extraction job with `client.extract.create(file_input=\u003cfile_id\u003e, configuration={...})` using the configuration dict described above.\n7. Poll the job with a short delay (e.g., `time.sleep(2)`) until `job.status` is terminal. Refresh with `client.extract.get(job.id)`.\n8. On `COMPLETED`, serialize `job.extract_result` to JSON and write it to `--output tion](https://docs.llamaindex.ai/en/stable/api_reference/indices/llama_cloud/) (the `llama-index-indices-managed-llama-cloud` package) to:\n\n1. Create a brand-new managed index on LlamaCloud from the initial batch.\n2. Incrementally upload the second batch of files into the **same** index, using the SDK's `upload_file` method (NOT by recreating the index and NOT by passing `documents=...` again).\n3. Wait for ingestion of the newly uploaded files to complete.\n\nThe SDK is already installed in the environment and the `LLAMA_CLOUD_API_KEY` environment variable is configured. You do NOT need to handle authentication explicitly — the SDK reads the API key from the environment automatically.\n\n## Parallel-Run Safety\nMany trials may run concurrently and share the same LlamaCloud account, so every external resource you create on LlamaCloud **MUST** be uniquely named. The harness writes the current `trial_id` to the file `/logs/artifacts/trial_id` before the task starts. Read that file and use the value to disambiguate your index name (see Requirements).\n\n## Requirements\n- Implement a Python CLI named `ingest.py` at `/home/user/myproject/ingest.py`.\n- The script must accept exactly three command-line arguments:\n  - `--initial-dir \u003cpath\u003e`: path to the directory containing the initial batch of documents (must be loaded as LlamaIndex `Document` objects via `SimpleDirectoryReader`).\n  - `--new-dir \u003cpath\u003e`: path to the directory containing the additional batch of files that must be uploaded one-by-one via `upload_file`.\n  - `--output \u003cpath\u003e`: path where the final JSON summary should be written.\n- Read `trial_id` from `/logs/artifacts/trial_id` (the file is a single line). Strip any trailing whitespace/newline.\n- Build the **index name** as `harbor-inc-${trial_id}` (literal prefix `harbor-inc-` followed by the trimmed `trial_id`).\n- Use `SimpleDirectoryReader` from `llama_index.core` to load the **initial** documents from `--initial-dir`.\n- Create a new managed index using `LlamaCloudIndex.from_documents(...)` from `llama_index.indices.managed.llama_cloud` with:\n  - `name=\"harbor-inc-${trial_id}\"`\n  - `project_name=\"Default\"`\n  - `verbose=True`\n- After the index is created, iterate over the files in `--new-dir` (top-level only, in `sorted()` order) and add each file to the index using `index.upload_file(\u003cfile_path\u003e, wait_for_ingestion=False)`.\n- After all files have been uploaded, call `index.wait_for_completion()` to block until ingestion of the newly uploaded files is finished.\n- Write a JSON object to `--output` (UTF-8, with `indent=2`) containing exactly these fields:\n  - `index_name`: the full index name (string, `\"harbor-inc-\u003ctrial_id\u003e\"`).\n  - `initial_documents`: the number of `Document` objects loaded from `--initial-dir` (integer).\n  - `uploaded_files`: an ordered list of the **base file names** (NOT full paths) of every file uploaded from `--new-dir`, in the same `sorted()` order in which they were uploaded.\n- Print exactly one line to stdout in the format: `Ingested N file(s) into harbor-inc-${trial_id}` where `N` is the integer length of `uploaded_files` (e.g., `Ingested 2 file(s) into harbor-inc-abc123`).\n- The script must exit with status code `0` on success and a non-zero status code when `--initial-dir` or `--new-dir` does not exist (or is not a directory).\n\n## Implementation Guide\n1. Parse `--initial-dir`, `--new-dir`, and `--output` using `argparse` (standard library).\n2. Open `/logs/artifacts/trial_id`, read its content, and strip whitespace to obtain `trial_id`.\n3. Validate that both `--initial-dir` and `--new-dir` exist and are directories; if not, exit with a non-zero status code.\n4. Load the initial documents:\n   ```python\n   from llama_index.core import SimpleDirectoryReader\n   initial_documents = SimpleDirectoryReader(\u003cinitial-dir\u003e).load_data()\n   ```\n5. Create the managed index from the initial documents:\n   ```python\n   from llama_index.indices.managed.llama_cloud import LlamaCloudIndex\n   index = LlamaCloudIndex.from_documents(\n       initial_documents,\n       name=f\"harbor-inc-{trial_id}\",\n       project_name=\"Default\",\n       verbose=True,\n   )\n   ```\n6. List the top-level files inside `--new-dir` (`os.listdir(...)`, sorted), keeping only entries that are files (not subdirectories). For each file, call `index.upload_file(\u003cfull_path\u003e, wait_for_ingestion=False)`.\n7. Call `index.wait_for_completion()` to block until ingestion is done.\n8. Write the JSON summary to `--output` with the three fields above.\n9. Print the `Ingested N file(s) into harbor-inc-\u003ctrial_id\u003e` line to stdout.\n10. Return exit code 0.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Script path: /home/user/myproject/ingest.py\n- Command: `python3 ingest.py --initial-dir \u003cinitial_dir\u003e --new-dir \u003cnew_dir\u003e --output \u003coutput_json_path\u003e`\n- Input argument format: `--initial-dir \u003cpath_to_initial_directory\u003e`, `--new-dir \u003cpath_to_new_directory\u003e`, `--output \u003cpath_to_output_json_file\u003e`.\n- Expected stdout: includes exactly one line `Ingested \u003cN\u003e file(s) into harbor-inc-\u003ctrial_id\u003e` where `\u003cN\u003e` matches the number of files uploaded from `--new-dir` and `\u003ctrial_id\u003e` is read (and stripped) from `/logs/artifacts/trial_id`.\n- A new LlamaCloud index/pipeline named `harbor-inc-\u003ctrial_id\u003e` must exist in the `Default` project after the script runs.\n- The number of files attached to that pipeline on LlamaCloud must be at least `initial_documents_count + N` (i.e., the new files must actually have been uploaded to the same index, not to a fresh one).\n- The output JSON file must be created at the path specified by `--output` and must contain the fields `index_name`, `initial_documents`, and `uploaded_files`. `uploaded_files` must be a list of base file names (no dire
