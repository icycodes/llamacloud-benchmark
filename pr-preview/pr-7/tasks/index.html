\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Log file: /home/user/myproject/output.log\n- Command: `python3 parse_folder.py` executed from the project directory.\n- The script reads the active `trial_id` from `/logs/artifacts/trial_id`.\n- For every `\u003cname\u003e.pdf` in `/home/user/myproject/input_pdfs/`, a Markdown file `/home/user/myproject/output_md/\u003cname\u003e.md` must exist and contain non-empty Markdown content produced by LlamaParse.\n- `/home/user/myproject/output.log` must contain, for every parsed file, a line in the exact format:\n  `Parsed: \u003cname\u003e.pdf -\u003e output_md/\u003cname\u003e.md (trial_id=\u003ctrial_id\u003e)`\n- The script must exit with status code 0.\n\n"])</script><script>self.__next_f.push([1,"a:Tc76,"])</script><script>self.__next_f.push([1,"# Build a LlamaCloudCompositeRetriever for Multi-Source RAG\n\n## Background\nYour team maintains two separate knowledge bases on LlamaCloud: one for product documentation and one for customer FAQs. To answer support questions that may pull from either source, you must build a Python application that combines both managed indices into a single `LlamaCloudCompositeRetriever` and exposes it as a query script.\n\n## Requirements\n- Create a Python script `run_retrieval.py` in `/home/user/myproject` that:\n  - Builds two LlamaCloud managed indices from local document folders (one folder per index).\n  - Wires both indices into a `LlamaCloudCompositeRetriever` using the FULL retrieval mode so that every sub-index is queried and results are globally reranked.\n  - Accepts a query string from the command line and prints the retrieval result, including the retrieved chunk text and its source index name, to stdout and to a log file.\n- All LlamaCloud resources created by the script must be uniquely named per trial run.\n- The two source folders (`docs/product/` and `docs/faq/`) and their markdown files are already provided.\n\n## Implementation Hints\n- Read the `trial_id` from `/logs/artifacts/trial_id` and append it to every LlamaCloud resource name you create (the two index names and the composite retriever name).\n- Use the `LlamaCloudIndex.from_documents(...)` constructor (from `llama_index.indices.managed.llama_cloud`) to create each managed index from the local folders. Load files with `SimpleDirectoryReader`.\n- Use `LlamaCloudCompositeRetriever` together with `CompositeRetrievalMode.FULL` from `llama_cloud.types`. Set `create_if_not_exists=True` and `rerank_top_n=3`.\n- When attaching each index via `add_index(...)`, supply a clear `description` so the retriever knows what each sub-index covers.\n- Read the LlamaCloud API key from `LLAMA_CLOUD_API_KEY` and the project name from `LLAMA_CLOUD_PROJECT_NAME` (default to `Default`).\n- Use `argparse` to accept the query string via `--query`.\n- For each retrieved node, print a line of the form `INDEX=\u003csub_index_name\u003e | SCORE=\u003cscore\u003e | TEXT=\u003cretrieved_text\u003e` and also append it to the log file. Print a final line `Retrieved \u003cn\u003e nodes` after iteration.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Command: `python3 run_retrieval.py --query \u003cquery_string\u003e`\n- Log file: /home/user/myproject/retrieval.log\n- Reads `trial_id` from `/logs/artifacts/trial_id` and uses it to scope all created LlamaCloud resource names with the pattern:\n  - Product index name: `product-docs-${trial_id}`\n  - FAQ index name: `faq-docs-${trial_id}`\n  - Composite retriever name: `support-composite-${trial_id}`\n- After running the script:\n  - Both managed indices and the composite retriever must exist in the configured LlamaCloud project.\n  - The composite retriever must be configured in `FULL` mode and reference both indices.\n  - Stdout and `retrieval.log` must contain at least one line matching the pattern `INDEX=\u003cname\u003e | SCORE=\u003cfloat\u003e | TEXT=\u003ctext\u003e` and a final line `Retrieved \u003cn\u003e nodes`.\n  - Stdout/log content must demonstrate that retrieved nodes come from the correct sub-index for the queried topic (product vs. FAQ).\n\n"])</script><script>self.__next_f.push([1,"b:Tf3f,"])</script><script>self.__next_f.push([1,"# Composite Retriever across Multiple LlamaCloud Indices (TypeScript)\n\n## Background\nLlamaCloud is a managed RAG-as-a-Service platform from LlamaIndex. In real applications, different document types (e.g. company policies vs. product FAQs) benefit from being stored in separate managed indices so each can use its own parsing and chunking configuration. The LlamaCloud Client SDK (`@llamaindex/llama-cloud`) exposes a Composite Retriever that fans out a single query across multiple indices and globally re-ranks the results.\n\nYour task is to build a small TypeScript program that programmatically creates two managed indices, ingests local files into each one, wires them together with a Composite Retriever, and runs a query that returns hits drawn from both indices.\n\n## Requirements\n- The program must be implemented in TypeScript and executed with `tsx`.\n- Use the `@llamaindex/llama-cloud` Client SDK to:\n  - Create (upsert) two separate managed pipelines (indices) — one for \"policies\" content and one for \"faq\" content.\n  - Upload the local input files into the correct pipeline.\n  - Wait until both pipelines finish ingestion.\n  - Create a Composite Retriever that references both pipelines.\n  - Run a query against the Composite Retriever in `full` mode and capture the returned nodes.\n- All externally visible resource names (pipelines and retriever) must be scoped with the current `trial_id` so concurrent runs do not collide.\n- Write a structured log file that summarizes the created resources and the query result.\n\n## Implementation Hints\n- Read the current `trial_id` from `/logs/artifacts/trial_id` (a single-line file). Trim whitespace before using it.\n- The two pipelines must be named exactly:\n  - `policies-${trial_id}` — ingest the files under `./data/policies`\n  - `faq-${trial_id}` — ingest the files under `./data/faq`\n- Use `client.pipelines.upsert(...)` to create or update each pipeline. For embeddings, configure `OPENAI_EMBEDDING` with `text-embedding-3-small` and the API key from the `OPENAI_API_KEY` environment variable. Use the managed data sink (`data_sink_id: null`).\n- Upload local files with `client.files.create({ file: fs.createReadStream(...), purpose: \"user_data\" })`, then attach them to a pipeline using `client.pipelines.files.create(pipelineId, { body: [...] })`.\n- Poll `client.pipelines.getStatus(pipelineId)` until ingestion leaves the `NOT_STARTED` / `IN_PROGRESS` states for both pipelines before retrieval.\n- Create the composite retriever via `client.retrievers.create({ name: \"composite-retriever-${trial_id}\", pipelines: [...] })`. Give each sub-pipeline a meaningful `description` so the routing agent could disambiguate them.\n- Query with `client.retrievers.retriever.search(retrieverId, { query, mode: \"full\", rerank_top_n: 5 })`.\n- The `LLAMA_CLOUD_API_KEY` and `OPENAI_API_KEY` environment variables are already set in the runtime.\n\n## Acceptance Criteria\n- Project path: /home/user/composite_retriever\n- Log file: /home/user/composite_retriever/output.log\n- The program is run with `npx tsx index.ts` from the project path and must exit with status 0.\n- The `trial_id` is read from `/logs/artifacts/trial_id`.\n- Two LlamaCloud pipelines named `policies-${trial_id}` and `faq-${trial_id}` exist in the configured LlamaCloud project after the run.\n- A LlamaCloud retriever named `composite-retriever-${trial_id}` exists and references both pipelines.\n- The log file must contain the following lines, in any order, with literal prefixes (case-sensitive):\n  - `Trial ID: \u003ctrial_id\u003e`\n  - `Policies Pipeline ID: \u003cpipeline_id\u003e`\n  - `FAQ Pipeline ID: \u003cpipeline_id\u003e`\n  - `Composite Retriever ID: \u003cretriever_id\u003e`\n  - `Query: \u003cquery string\u003e`\n  - `Result Count: \u003cn\u003e` where `\u003cn\u003e` is the integer number of retrieved nodes (must be \u003e= 1)\n  - At least one line per retrieved node in the format `Node Score: \u003cscore\u003e | Text: \u003cfirst 80 chars of text\u003e`\n\n"])</script><script>self.__next_f.push([1,"c:Tc32,"])</script><script>self.__next_f.push([1,"# Create a LlamaCloud Managed Index in Python\n\n## Background\nLlamaCloud is LlamaIndex's managed service for production-grade RAG. Instead of running your own vector store, you push your documents to LlamaCloud and let it handle parsing, embedding, indexing, and retrieval. In this task you will write a Python program that ingests a small corpus of local text documents into a new LlamaCloud managed index and then performs a retrieval query against it.\n\nThe task environment contains three small plain-text documents under `/home/user/myproject/data/` (one each about cats, dogs, and birds). Your program must build a LlamaCloud managed index from those documents, perform a retrieval, and record the results in a log file.\n\n## Requirements\n- Read the `trial_id` from `/logs/artifacts/trial_id` and use it to derive a unique LlamaCloud index name.\n- Create a brand-new LlamaCloud managed index in the `default` project that contains all three of the provided documents.\n- Wait for ingestion to complete so that retrieval is possible.\n- Use the LlamaCloud index's retriever to retrieve the top-3 most relevant nodes for the query `What do cats like to eat?`.\n- Write the index name, the number of nodes retrieved, and the text content of every retrieved node to a log file.\n- The same script must be runnable as a one-off command and must not depend on any pre-existing index with the same name.\n\n## Implementation Hints\n- Install and use the `llama-index-indices-managed-llama-cloud` Python package (the `LlamaCloudIndex` class) together with `llama-index-core` (for `SimpleDirectoryReader`).\n- The LlamaCloud API key is provided via the `LLAMA_CLOUD_API_KEY` environment variable.\n- `LlamaCloudIndex.from_documents(...)` accepts `name`, `project_name`, `verbose`, and similar arguments and will create the managed index.\n- The retriever returned by `index.as_retriever(...)` exposes a `.retrieve(query_str)` method and returns a list of `NodeWithScore` objects whose text is accessible via `node.get_content()` or `node.text`.\n- You do not need an LLM or an `OPENAI_API_KEY` for retrieval; LlamaCloud handles embeddings server-side with its managed defaults.\n\n## Acceptance Criteria\n- Project path: `/home/user/myproject`\n- Log file: `/home/user/myproject/output.log`\n- The program must create a new LlamaCloud managed index whose name is exactly `harbor-managed-index-${trial_id}`, where `trial_id` is read from `/logs/artifacts/trial_id`. The index must live in the LlamaCloud project named `default`.\n- The newly created managed index must contain ingested content from all three files in `/home/user/myproject/data/` (`cats.txt`, `dogs.txt`, `birds.txt`).\n- The log file must contain:\n  - A line in the form: `Index name: harbor-managed-index-\u003ctrial_id\u003e`\n  - A line in the form: `Retrieved nodes: \u003cN\u003e` where `\u003cN\u003e` is an integer greater than or equal to 1.\n  - The full text of every retrieved node, each printed on its own line prefixed with `Node text: `.\n- The retrieval query used must be `What do cats like to eat?` and at least one logged `Node text:` line must contain the substring `cat` (case-insensitive).\n\n"])</script><script>self.__next_f.push([1,"d:Tb03,"])</script><script>self.__next_f.push([1,"# Extract Structured Resume Data with LlamaExtract (Python)\n\n## Background\nLlamaCloud's LlamaExtract service turns unstructured documents (PDFs, text files, etc.) into JSON that conforms to a user-defined schema. In this task you will build a small, rerunnable command-line tool that uses the LlamaExtract Python SDK (`llama-cloud-services`) to extract structured information from a candidate's resume and write the result to a JSON file.\n\n## Requirements\n- Build a Python CLI at `/home/user/myproject/extract.py` that:\n  - Accepts the path to a resume file as `--input` and the path to a JSON output file as `--output`.\n  - Reads the `LLAMA_CLOUD_API_KEY` from the environment (it will already be exported).\n  - Defines a Pydantic schema named `Resume` with the fields `name: str`, `email: str`, and `skills: list[str]`.\n  - Uses `LlamaExtract` (from `llama_cloud_services`) to create or reuse an extraction agent and run extraction on the input file.\n  - Writes the extracted data as a JSON object to the `--output` path with the keys `name`, `email`, and `skills`.\n  - Exits with status code `0` on success and prints `Extraction completed: \u003coutput_path\u003e` to stdout when finished.\n\n## Implementation Hints\n- Use the legacy Python SDK package `llama-cloud-services` (`pip install llama-cloud-services`). It exposes `LlamaExtract` and accepts a Pydantic model as `data_schema` when creating an agent.\n- To avoid collisions when this task runs concurrently across trials, name the extraction agent using the `trial_id` read from `/logs/artifacts/trial_id` (for example, `resume-parser-${trial_id}`). If an agent with that name already exists, reuse it instead of failing.\n- The `LlamaExtract` client picks up `LLAMA_CLOUD_API_KEY` from the environment automatically.\n- `agent.extract(\u003cpath\u003e)` returns a result whose `.data` attribute is a dict that matches the schema; serialize it with `json.dump`.\n- Make the script idempotent: it should succeed when run multiple times on the same input.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Command: `python3 /home/user/myproject/extract.py --input \u003cinput_path\u003e --output \u003coutput_path\u003e`\n- Input arguments:\n  - `--input \u003cinput_path\u003e`: Path to an existing resume file (plain text or PDF).\n  - `--output \u003coutput_path\u003e`: Path where the extracted JSON will be written.\n- The command must exit with status `0` and print a line in the format `Extraction completed: \u003coutput_path\u003e` to stdout.\n- The output file must be a valid JSON object containing exactly the keys `name`, `email`, and `skills` with the shape:\n\n  ```json\n  {\n    \"name\": string,\n    \"email\": string,\n    \"skills\": [string, ...]\n  }\n  ```\n\n- The extraction agent created (or reused) on LlamaCloud must be named `resume-parser-${trial_id}` where `trial_id` is read from `/logs/artifacts/trial_id`.\n\n"])</script><script>self.__next_f.push([1,"e:Td1b,"])</script><script>self.__next_f.push([1,"# Incremental Ingestion into a LlamaCloud Index (Python)\n\n## Background\nIngesting documents into a managed LlamaCloud index can be expensive: every file uploaded consumes parsing credits and re-uploading the same files wastes time and money. In production pipelines that watch a folder, you typically only want to upload files that are not already present in the index. In this task you will build a Python CLI that connects to a LlamaCloud index, inspects which files are already ingested, and uploads only the new ones, in a way that is safe to rerun.\n\n## Requirements\n- Build a Python CLI at `/home/user/myproject/sync.py` that:\n  - Accepts a folder of source files via `--folder \u003cpath\u003e`.\n  - Accepts the LlamaCloud index name via `--index \u003cname\u003e` and the project name via `--project \u003cname\u003e` (default `Default`).\n  - Reads the `LLAMA_CLOUD_API_KEY` from the environment.\n  - Connects to a LlamaCloud index named `--index` under `--project`, creating it if it does not yet exist.\n  - Determines which files inside `--folder` are already present in the index (by file name) and uploads only the missing ones, waiting for ingestion to finish.\n  - Reports the result on the last line of stdout in the exact format:\n    `Uploaded \u003cN\u003e new file(s): \u003ccomma-separated-sorted-filenames-or-none\u003e`\n    where `\u003cN\u003e` is the integer number of files uploaded by this invocation and the file-name list is sorted alphabetically. If `\u003cN\u003e` is `0`, the list portion must be the literal string `none`.\n  - Exits with status `0` on success.\n  - Is idempotent: rerunning the script over the same folder must upload `0` additional files.\n\n## Implementation Hints\n- Use the `llama_cloud_services.LlamaCloudIndex` (from `pip install llama-cloud-services`) to connect to or create the managed index.\n- The underlying `llama_cloud.LlamaCloud` client exposes `client.pipelines.list_pipeline_files(pipeline_id=...)` which returns the files already attached to the pipeline (index). Use the `name` attribute on each returned file to detect previously-uploaded files.\n- `LlamaCloudIndex.upload_file(file_path)` uploads a local file and waits for ingestion by default.\n- To avoid colliding with other concurrent runs, scope the index name with `trial_id` read from `/logs/artifacts/trial_id`. The caller will pass `--index llama-sync-\u003ctrial_id\u003e` to your CLI, so your code just needs to honor whatever `--index` value it receives.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Command: `python3 /home/user/myproject/sync.py --folder \u003cfolder\u003e --index \u003cname\u003e --project \u003cproject\u003e`\n- Input arguments:\n  - `--folder \u003cfolder\u003e`: Path to a directory of source files to ingest.\n  - `--index \u003cname\u003e`: Target LlamaCloud index name (will be created if it does not exist).\n  - `--project \u003cproject\u003e`: LlamaCloud project name; if omitted defaults to `Default`.\n- The command must exit with status `0`.\n- The last line of stdout must match the exact format `Uploaded \u003cN\u003e new file(s): \u003clist\u003e` where `\u003clist\u003e` is either the literal string `none` (when `\u003cN\u003e == 0`) or a comma-and-space separated list (e.g. `a.txt, b.txt`) of file names sorted alphabetically.\n- Running the same command twice in a row on the same `--folder` must report `0` newly uploaded files on the second invocation.\n- After successful execution, every file in `--folder` must be present in the named LlamaCloud index.\n\n"])</script><script>self.__next_f.push([1,"f:Tcc0,"])</script><script>self.__next_f.push([1,"# Parse a PDF to Markdown with LlamaCloud (Python)\n\n## Background\nLlamaCloud is the managed RAG platform from LlamaIndex. Its Parse service (LlamaParse) turns visually rich documents like PDFs into clean, layout-aware markdown that can be fed into downstream LLM pipelines. In this task you will use the official `llama-cloud` Python SDK to upload a small PDF, run a parse job against LlamaCloud, and persist the resulting markdown to disk so the rest of the pipeline can consume it.\n\nThe PDF you need to parse is already on disk at `/home/user/myproject/quarterly_report.pdf`. It is a one-page synthetic report whose body contains the title `ACME CORP QUARTERLY REPORT`, a sentence stating `Total revenue for Q3 was 12345 USD.`, and a short paragraph about the company's outlook.\n\nA LlamaCloud API key is already exported as the `LLAMA_CLOUD_API_KEY` environment variable.\n\n## Requirements\n- Write a Python script at `/home/user/myproject/parse_report.py` that, when executed, performs the following one-off job:\n  - Uploads `/home/user/myproject/quarterly_report.pdf` to LlamaCloud using the official Python SDK.\n  - Runs a parse job against the uploaded file and retrieves the markdown output.\n  - Concatenates the markdown for every page of the document into a single string and writes it to `/home/user/myproject/output.md` (UTF-8 encoded).\n  - Writes a structured log line to `/home/user/myproject/parse.log` indicating success and the LlamaCloud parse job identifier.\n- Run the script once so that `output.md` and `parse.log` are populated before verification begins.\n\n## Implementation Hints\n- The current SDK is the `llama-cloud` Python package; install it with `pip3 install --break-system-packages llama-cloud`.\n- The high-level entry point is `from llama_cloud import LlamaCloud`. The client automatically reads `LLAMA_CLOUD_API_KEY` from the environment.\n- Use `client.files.create(file=..., purpose=\"parse\")` to upload the PDF and grab the returned `id`. Pass that id to `client.parsing.parse(...)` with `expand=[\"markdown\"]` to retrieve the markdown payload synchronously.\n- The markdown payload exposes one entry per page (e.g. `result.markdown.pages[i].markdown`). Join them with blank lines before writing to disk so multi-page documents are not truncated.\n- LlamaParse needs to know the file type. When uploading from disk this is taken from the file extension, so make sure you pass the real PDF path (or, if you use bytes, supply the original file name).\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Script path: /home/user/myproject/parse_report.py\n- Log file: /home/user/myproject/parse.log\n- Markdown output file: /home/user/myproject/output.md\n- The script must be runnable as `python3 /home/user/myproject/parse_report.py` and must exit with status code 0.\n- After running the script:\n  - `/home/user/myproject/output.md` must exist, be non-empty, and contain the parsed markdown for the PDF (every page concatenated).\n  - `/home/user/myproject/parse.log` must contain a line of the form: `Parse job ID: \u003cjob_id\u003e` where `\u003cjob_id\u003e` is the identifier returned by LlamaCloud for the parse job.\n  - `/home/user/myproject/parse.log` must contain a line of the form: `Parsed file: /home/user/myproject/quarterly_report.pdf`.\n\n"])</script><script>self.__next_f.push([1,"10:Tbb1,"])</script><script>self.__next_f.push([1,"# Parse a PDF to Markdown with LlamaCloud (TypeScript)\n\n## Background\nLlamaCloud provides a managed Parse service that turns complex PDFs into clean, layout-aware markdown via the agentic LlamaParse pipeline. Your job is to build a small CLI utility in TypeScript that uses the official `@llamaindex/llama-cloud` SDK to upload a PDF, run a parse job, and write the resulting markdown to disk.\n\n## Requirements\n- Build a Node.js/TypeScript project located at `/home/user/myproject`.\n- The project must expose an executable `parse.ts` script that can be invoked with `npx tsx parse.ts --input \u003cpdf_path\u003e --output \u003cmd_path\u003e`.\n- The script must:\n  - Read the LlamaCloud API key from the `LLAMA_CLOUD_API_KEY` environment variable (do not hard-code it).\n  - Upload the PDF referenced by `--input` to LlamaCloud, then run the Parse job and collect the markdown output for every page.\n  - Concatenate the per-page markdown into a single markdown document and write it to the path supplied via `--output`, creating any intermediate directories if they do not yet exist.\n  - Print the line `Parsed \u003cN\u003e pages to \u003coutput_path\u003e` to stdout on success, where `\u003cN\u003e` is the number of parsed pages.\n- Exit with a non-zero status if the API key is missing or the input file does not exist.\n\n## Implementation Hints\n- Install the official SDK with `npm install @llamaindex/llama-cloud` and a runtime such as `tsx` for executing TypeScript directly.\n- The SDK's `client.parsing.parse({...})` call blocks until the job is finished and returns a result object that exposes the per-page markdown when you pass `expand: [\"markdown\"]`.\n- The `agentic` tier with `version: \"latest\"` is a sensible default for general-purpose PDFs.\n- A minimal arg parser is enough; you do not need a heavy CLI framework.\n- Be careful with module resolution: top-level `await` requires an ESM project (`\"type\": \"module\"` in `package.json`) or you can wrap the body inside an async `main` function.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Command: `npx tsx parse.ts --input \u003cpdf_path\u003e --output \u003cmd_path\u003e`\n- Required CLI flags:\n  - `--input \u003cpdf_path\u003e`: Path to an existing PDF file on disk.\n  - `--output \u003cmd_path\u003e`: Path where the resulting markdown should be written.\n- On success, the script must:\n  - Exit with status code 0.\n  - Create a markdown file at `\u003cmd_path\u003e` whose content is a non-empty string assembled from the per-page markdown returned by LlamaCloud.\n  - Print a line matching the pattern `Parsed \u003cN\u003e pages to \u003cmd_path\u003e` to stdout, where `\u003cN\u003e` is an integer ≥ 1.\n- On failure:\n  - When `LLAMA_CLOUD_API_KEY` is unset, the command must exit with a non-zero status and not create the output file.\n  - When `--input` points to a non-existent file, the command must exit with a non-zero status and not create the output file.\n- The project must declare `@llamaindex/llama-cloud` as a dependency in `package.json` and the implementation must actually call the LlamaCloud Parse API (no local stubs).\n\n"])</script><script>self.__next_f.push([1,"11:Tb0e,"])</script><script>self.__next_f.push([1,"# LlamaCloud Regional Client Setup (Python)\n\n## Background\nLlamaCloud is hosted in multiple regions: North America (the default) and the European Union. API keys are region-specific, so users must point the SDK at the correct regional endpoint or all requests will fail with `401 Unauthorized` errors. Build a small Python CLI that constructs a `LlamaParse` client targeted at the requested region and reports the resolved configuration so it can be wired into a larger pipeline.\n\n## Requirements\n- Implement a Python CLI script that selects the correct LlamaCloud base URL for the requested region and constructs a real `LlamaParse` client from the `llama-cloud-services` package.\n- The CLI must accept a `--region` argument with values `us` or `eu` (case-insensitive).\n- The CLI must read the API key from the `LLAMA_CLOUD_API_KEY` environment variable. Use a placeholder value such as `\"llx-dummy\"` if the variable is empty so the SDK can still be instantiated.\n- The CLI must print exactly one line of JSON to standard output containing the resolved configuration (see `Acceptance Criteria` for the schema).\n- For unsupported regions, the CLI must exit with a non-zero status code and emit an error message on standard error.\n\n## Implementation Hints\n- Install the official `llama-cloud-services` Python package and import `LlamaParse` and the `EU_BASE_URL` constant from it.\n- The default (NA / US) base URL is `https://api.cloud.llamaindex.ai`; the EU base URL is exported by the SDK as the `EU_BASE_URL` constant (`https://api.cloud.eu.llamaindex.ai`).\n- When building the JSON output, read the `base_url` back from the constructed `LlamaParse` instance to confirm that the SDK accepted the configuration.\n- Use `argparse` (or any equivalent) to parse the CLI argument, and `json.dumps` to emit the result.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Command: `python3 /home/user/myproject/regional_client.py --region \u003cregion\u003e`\n- Command input argument format: `--region \u003cus|eu\u003e` (case-insensitive).\n- For a recognized region, the command exits with status code `0` and prints a single JSON object on standard output with this shape:\n\n  ```json\n  {\n    \"region\": \"us\" | \"eu\",\n    \"base_url\": \"https://api.cloud.llamaindex.ai\" | \"https://api.cloud.eu.llamaindex.ai\",\n    \"parser_base_url\": \"https://api.cloud.llamaindex.ai\" | \"https://api.cloud.eu.llamaindex.ai\"\n  }\n  ```\n\n  - `region`: lowercase, matching the requested region.\n  - `base_url`: the canonical regional endpoint chosen by the CLI.\n  - `parser_base_url`: the `base_url` read back from the constructed `LlamaParse` instance.\n- For any other region value (e.g. `apac`, empty string, missing argument), the command exits with a non-zero status code and prints an error message containing the substring `unsupported region` on standard error.\n\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"YmPGxfOM2
