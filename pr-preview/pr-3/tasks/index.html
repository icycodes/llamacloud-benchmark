hey typically expose them to an LLM agent via `LlamaCloudCompositeRetriever`. The composite retriever supports two modes: `CompositeRetrievalMode.FULL` (query every sub-index and globally rerank) and `CompositeRetrievalMode.ROUTING` (let an agent pick the best sub-index based on its `description`). In `ROUTING` mode the per-index `description` is critical because that is the only signal the router has, so every sub-index MUST have a non-empty description. Composite retrievers also accept a `rerank_top_n` knob (positive integer) that bounds how many nodes survive reranking.\n\nProduction teams almost always commit a YAML config describing the composite retriever and validate it offline before applying it with the SDK. You must build a small, fully offline Python CLI that:\n\n1. Imports `LlamaCloudCompositeRetriever` from `llama_index.indices.managed.llama_cloud` and `CompositeRetrievalMode` from `llama_cloud` at module top-level. These imports prove the SDK is wired up correctly, but they must NOT be called and no network requests may be made.\n2. Reads a YAML config describing the composite retriever and the sub-indices to attach.\n3. Validates the config against the rules below and emits an actionable JSON plan that downstream code (or an agent) can later feed into `LlamaCloudCompositeRetriever(...)` / `composite_retriever.add_index(...)` calls.\n\n## Requirements\n- Implement a Python CLI script `build_plan.py` that imports, at module top-level (verbatim):\n  - `from llama_index.indices.managed.llama_cloud import LlamaCloudCompositeRetriever`\n  - `from llama_cloud import CompositeRetrievalMode`\n  The script MUST NOT instantiate `LlamaCloudCompositeRetriever` or `CompositeRetrievalMode`, and MUST NOT issue any HTTP request.\n- The CLI must accept the following arguments:\n  - `--config` (required): absolute path to a YAML config file (schema described below).\n  - `--output` (required): absolute path of the JSON plan file to write.\n- The YAML config has this exact schema:\n  ```yaml\n  retriever:\n    name: \u003cnon-empty string\u003e\n    project_name: \u003cnon-empty string\u003e\n    mode: FULL | ROUTING       # case-insensitive in the config; output normalises to upper-case\n    rerank_top_n: \u003cpositive integer\u003e\n    create_if_not_exists: \u003cbool\u003e\n  sub_indices:\n    - name: \u003cnon-empty string\u003e\n      project_name: \u003cnon-empty string\u003e\n      description: \u003cnon-empty string\u003e\n  ```\n  - `sub_indices` is a list with at least 1 entry.\n  - `mode` is matched case-insensitively. Any value other than `full`/`FULL` or `routing`/`ROUTING` is an error.\n- The script must validate the config and on any validation failure print exactly one error line to stderr in the format `Error: \u003cmessage\u003e` and exit with a non-zero status code (and NOT write any output file). The exact error messages required are:\n  - `Error: config file not found: \u003cconfig_path\u003e` - when `--config` does not exist on disk.\n  - `Error: retriever.name must be a non-empty string`\n  - `Error: retriever.project_name must be a non-empty string`\n  - `Error: retriever.mode must be one of FULL or ROUTING (case-insensitive)`\n  - `Error: retriever.rerank_top_n must be a positive integer`\n  - `Error: sub_indices must be a non-empty list`\n  - `Error: sub_indices[\u003ci\u003e].name must be a non-empty string`\n  - `Error: sub_indices[\u003ci\u003e].project_name must be a non-empty string`\n  - `Error: sub_indices[\u003ci\u003e].description must be a non-empty string` (this rule applies in BOTH modes; descriptions are always required)\n  - `Error: sub_indices contains duplicate (name, project_name) pair: (\u003cname\u003e, \u003cproject_name\u003e)`\n  Validation MUST stop and report the FIRST failure encountered, in the listed order. The check order is: file existence -\u003e retriever.name -\u003e retriever.project_name -\u003e retriever.mode -\u003e retriever.rerank_top_n -\u003e sub_indices is non-empty list -\u003e per-entry checks in list order (name -\u003e project_name -\u003e description) -\u003e duplicate pair check after all per-entry checks pass.\n- On success, the script must write a JSON file at `--output` with this exact top-level shape (no extra keys):\n  ```json\n  {\n    \"retriever\": {\n      \"name\": \"\u003cretriever.name\u003e\",\n      \"project_name\": \"\u003cretriever.project_name\u003e\",\n      \"mode\": \"FULL\" | \"ROUTING\",\n      \"rerank_top_n\": \u003cint\u003e,\n      \"create_if_not_exists\": \u003cbool\u003e\n    },\n    \"sub_indices\": [\n      {\n        \"name\": \"\u003cname\u003e\",\n        \"project_name\": \"\u003cproject_name\u003e\",\n        \"description\": \"\u003cdescription\u003e\"\n      }\n    ],\n    \"summary\": {\n      \"sub_index_count\": \u003cint\u003e,\n      \"mode\": \"FULL\" | \"ROUTING\"\n    }\n  }\n  ```\n  - The `sub_indices` list in the output MUST preserve the original ordering from the YAML config (do NOT sort).\n  - `summary.sub_index_count` MUST equal `len(sub_indices)`.\n  - `mode` in the output MUST be upper-case (`FULL` or `ROUTING`) regardless of the case used in the config.\n  - Write the JSON with `json.dump(..., indent=2)` so the file is human-readable.\n- On success, the script must print exactly one line to stdout and exit `0`:\n  `Composite retriever plan written to \u003coutput_path\u003e: name=\u003cretriever.name\u003e mode=\u003cMODE\u003e sub_indices=\u003cN\u003e`\n  where `\u003cMODE\u003e` is the normalised upper-case mode and `\u003cN\u003e` is the integer count of sub-indices.\n\n## Implementation Guide\n1. The project directory `/home/user/composite_planner` already exists and contains a starter `configs/valid.yaml` describing a two-index composite retriever (`slides_index` and `financial_index`). Do NOT modify or delete that file.\n2. Create the script at `/home/user/composite_planner/build_plan.py`.\n3. Use `argparse` for argument parsing and `pyyaml` (`import yaml`) for config parsing. Both packages are pre-installed.\n4. Import the SDK classes at module top-level exactly as listed in the Requirements (these imports are verified by string match).\n5. Run the validation checks in the listed order. For each failure, print `Error: \u003cmessage\u003e` to `sys.stderr` and `sys.exit(1)`. Do NOT print to stdout in the error path. Do NOT create the output file in the error path.\n6. Normalise `mode` to upper-case (`FULL` or `ROUTING`) when writing the output and the stdout success line.\n7. Write the JSON plan, print the success line, exit `0`.\n\n## Acceptance Criteria\n- Project path: /home/user/composite_planner\n- Script path: /home/user/composite_planner/build_plan.py\n- Command (happy path, FULL mode): `python3 /home/user/composite_planner/build_plan.py --config /home/user/composite_planner/configs/valid.yaml --output /home/user/composite_planner/plan.json`\n  - Exit code: `0`.\n  - Stdout (exact single line): `Composite retriever plan written to /home/user/composite_planner/plan.json: name=Essays Retriever mode=FULL sub_indices=2`\n  - The file `/home/user/composite_planner/plan.json` exists and is valid JSON matching the schema above.\n  - `retriever` equals `{\"name\": \"Essays Retriever\", \"project_name\": \"Essays\", \"mode\": \"FULL\", \"rerank_top_n\": 5, \"create_if_not_exists\": true}`.\n  - `sub_indices` has length 2, with index 0 = `{\"name\": \"slides_index\", \"project_name\": \"Essays\", \"description\": \"Information source for slide shows presented during team meetings\"}` and index 1 = `{\"name\": \"financial_index\", \"project_name\": \"Essays\", \"description\": \"Information source for company financial reports\"}` (original order from the YAML preserved).\n  - `summary` equals `{\"sub_index_count\": 2, \"mode\": \"FULL\"}`.\n- Command (routing mode, lowercase in YAML): the user must create a new config at `/home/user/composite_planner/configs/routing.yaml` describing the SAME two sub-indices but with the following retriever block (verbatim values):\n  ```yaml\n  retriever:\n    name: Routing Retriever\n    project_name: Essays\n    mode: routing\n    rerank_top_n: 3\n    create_if_not_exists: false\n  sub_indices:\n    - name: slides_index\n      project_name: Essays\n      description: Information source for slide shows presented during team meetings\n    - name: financial_index\n      project_name: Essays\n      description: Information source for company financial reports\n  ```\n  Then run: `python3 /home/user/composite_planner/build_plan.py --config /home/user/composite_planner/configs/routing.yaml --output /home/user/composite_planner/routing_plan.json`\n  - Exit code: `0`.\n  - Stdout (exact single line): `Composite retriever plan written to /home/user/composite_planner/routing_plan.json: name=Routing Retriever mode=ROUTING sub_indices=2`\n  - The output JSON `retriever.mode` is `\"ROUTING\"` (upper-cased) and `summary.mode` is `\"ROUTING\"`.\n- Command (validation error - missing description in routing-style config): the user must create a config at `/home/user/composite_planner/configs/missing_desc.yaml` with a valid retriever block but with the SECOND sub-index missing the `description` field (set it to the empty string `\"\"`):\n  ```yaml\n  retriever:\n    name: Bad Retriever\n    project_name: Essays\n    mode: FULL\n    rerank_top_n: 5\n    create_if_not_exists: true\n  sub_indices:\n    - name: slides_index\n      project_name: Essays\n      description: Information source for slide shows presented during team meetings\n    - name: financial_index\n      project_name: Essays\n      description: \"\"\n  ```\n  Then run: `python3 /home/user/composite_planner/build_plan.py --config /home/user/composite_planner/configs/missing_desc.yaml --output /home/user/composite_planner/bad_plan.json`\n  - Exit code: non-zero.\n  - Stderr (exact line): `Error: sub_indices[1].description must be a non-empty string`\n  - The file `/home/user/composite_planner/bad_plan.json` MUST NOT be created.\n- Command (validation error - missing config file): `python3 /home/user/composite_planner/build_plan.py --config /home/user/composite_planner/configs/no_such_file.yaml --output /home/user/composite_planner/should_not_exist.json`\n  - Exit code: non-zero.\n  - Stderr (exact line): `Error: config file not found: /home/user/composite_planner/configs/no_such_file.yaml`\n  - The file `/home/user/composite_planner/should_not_exist.json` MUST NOT be created.\n- SDK usage: the script source must contain BOTH of the following verbatim substrings:\n  - `from llama_index.indices.managed.llama_cloud import LlamaCloudCompositeRetriever`\n  - `from llama_cloud import CompositeRetrievalMode`\n\n"])</script><script>self.__next_f.push([1,"9:T2065,"])</script><script>self.__next_f.push([1,"# LlamaCloud Incremental Ingestion Planner\n\n## Background\nA common production pattern with LlamaCloud is keeping a managed index in sync with a local directory: as files are added, modified, or removed on disk, the equivalent documents in the managed index must be inserted, refreshed, or deleted. Re-uploading every file on every run wastes credits and parsing time, so teams build a small \"sync planner\" that compares the previous synced state (file paths + content hashes) to the current state on disk and emits an action plan describing exactly which files to ADD, UPDATE, DELETE, or leave UNCHANGED.\n\nYou must build a Python CLI that computes such a plan offline. The plan is keyed by `index_name` and `project_name` so it can later be applied with the `LlamaCloudIndex` SDK class (`from llama_index.indices.managed.llama_cloud import LlamaCloudIndex`). To prove the SDK is wired up correctly, the script MUST import that class at module top-level, but it MUST NOT instantiate it, and it MUST NOT make any network calls.\n\n## Requirements\n- Implement a Python CLI script `sync_planner.py` that imports `LlamaCloudIndex` from `llama_index.indices.managed.llama_cloud` at module top-level.\n- The CLI must accept the following arguments:\n  - `--input-dir` (required): absolute path to the local source directory to scan.\n  - `--previous-state` (required): absolute path to a JSON file describing the previously-synced state (schema documented below). The file may not exist on a first run.\n  - `--output` (required): absolute path of the JSON sync plan to write.\n  - `--index-name` (required): the LlamaCloud index name to record in the plan.\n  - `--project-name` (optional, default `Default`): the LlamaCloud project name to record in the plan.\n- The script must enumerate files in `--input-dir` non-recursively and include only files with one of these supported extensions (case-insensitive): `.pdf`, `.docx`, `.pptx`, `.txt`, `.md`, `.html`. All other files MUST be ignored entirely (they must NOT appear in the plan and must NOT trigger DELETE entries).\n- For each included file, compute:\n  - `file_name`: the basename of the file (e.g., `report.md`).\n  - `path`: the absolute path of the file.\n  - `size_bytes`: the integer file size in bytes.\n  - `sha256`: the lowercase hex SHA-256 digest of the file's full byte contents.\n- Compare the current scan against the previous state to classify each file_name:\n  - **ADD**: file_name appears in the current scan but is NOT present in the previous state.\n  - **UPDATE**: file_name appears in BOTH but the `sha256` differs.\n  - **UNCHANGED**: file_name appears in BOTH and the `sha256` matches.\n  - **DELETE**: file_name appears in the previous state but is NOT in the current scan.\n- The previous state JSON file has this exact schema (when it exists):\n  ```json\n  {\n    \"index_name\": \"\u003cstring\u003e\",\n    \"project_name\": \"\u003cstring\u003e\",\n    \"files\": [\n      {\"file_name\": \"\u003cbasename\u003e\", \"sha256\": \"\u003clowercase hex\u003e\"}\n    ]\n  }\n  ```\n  If `--previous-state` does not exist on disk, treat the previous file list as empty (every current file becomes an ADD).\n- Output JSON schema (exact top-level keys, no extras):\n  ```json\n  {\n    \"index_name\": \"\u003cfrom --index-name\u003e\",\n    \"project_name\": \"\u003cfrom --project-name\u003e\",\n    \"actions\": {\n      \"add\":       [ { \"file_name\": \"...\", \"path\": \"...\", \"size_bytes\": \u003cint\u003e, \"sha256\": \"...\" } ],\n      \"update\":    [ { \"file_name\": \"...\", \"path\": \"...\", \"size_bytes\": \u003cint\u003e, \"sha256\": \"...\", \"previous_sha256\": \"...\" } ],\n      \"unchanged\": [ { \"file_name\": \"...\", \"sha256\": \"...\" } ],\n      \"delete\":    [ { \"file_name\": \"...\", \"previous_sha256\": \"...\" } ]\n    },\n    \"summary\": {\n      \"add\": \u003cint\u003e, \"update\": \u003cint\u003e, \"unchanged\": \u003cint\u003e, \"delete\": \u003cint\u003e\n    }\n  }\n  ```\n  - Each of the four `actions` lists MUST be sorted alphabetically by `file_name` (case-sensitive `sorted()` order).\n  - Each integer in `summary` MUST equal the length of the corresponding `actions` list.\n  - Write the JSON with `json.dump(..., indent=2)` so it is human-readable.\n- On success, the script must print exactly one line to stdout (then exit `0`):\n  `Sync plan written to \u003coutput_path\u003e: add=\u003cA\u003e update=\u003cU\u003e unchanged=\u003cN\u003e delete=\u003cD\u003e`\n  where `\u003coutput_path\u003e` is the absolute path from `--output` and `\u003cA\u003e/\u003cU\u003e/\u003cN\u003e/\u003cD\u003e` are the integer counts.\n- If `--input-dir` does not exist or is not a directory, the script MUST:\n  - print the line `Error: input directory not found: \u003cinput_dir\u003e` to stderr,\n  - NOT write any output file,\n  - exit with a non-zero status code.\n- The script MUST NOT make any outbound HTTP calls and MUST NOT instantiate `LlamaCloudIndex`. The import statement is enough to demonstrate SDK availability.\n\n## Implementation Guide\n1. The project directory `/home/user/sync_planner` already exists and contains:\n   - `inputs/` with three pre-populated files: `report.md`, `notes.txt`, and `image.jpg`.\n   - `previous_state.json` with a recorded baseline that lists `report.md` (with its current hash) and `archive.txt` (a file that no longer exists on disk).\n   Do NOT modify or delete any of these starter fixtures.\n2. Create the script at `/home/user/sync_planner/sync_planner.py`.\n3. Use `argparse` for argument parsing. Use `hashlib.sha256` for hashing.\n4. Filter files by the allowed extensions (case-insensitive). Skip `image.jpg` (it has an unsupported extension).\n5. Read the previous state if present; otherwise treat as empty. Build a dict keyed by `file_name`.\n6. Compute ADD/UPDATE/UNCHANGED/DELETE classification, sort each list alphabetically by `file_name`, and assemble the output JSON.\n7. Write the JSON using `json.dump(..., indent=2)`. Print the required success line and exit `0`.\n8. Handle the missing-input-directory error by printing to `sys.stderr` and exiting with status `1`.\n\n## Acceptance Criteria\n- Project path: /home/user/sync_planner\n- Script path: /home/user/sync_planner/sync_planner.py\n- Command (happy path): `python3 /home/user/sync_planner/sync_planner.py --input-dir /home/user/sync_planner/inputs --previous-state /home/user/sync_planner/previous_state.json --output /home/user/sync_planner/plan.json --index-name my_index --project-name Default`\n  - Exit code: `0`.\n  - Stdout (exact single line): `Sync plan written to /home/user/sync_planner/plan.json: add=1 update=0 unchanged=1 delete=1`\n  - The file `/home/user/sync_planner/plan.json` exists and matches the JSON schema described above.\n  - `index_name` == `\"my_index\"`, `project_name` == `\"Default\"`.\n  - `actions.add` is exactly one entry for `notes.txt` (correct path/size/sha256).\n  - `actions.unchanged` is exactly one entry for `report.md` (correct sha256 of the on-disk file).\n  - `actions.delete` is exactly one entry for `archive.txt` (with `previous_sha256` copied from the previous state).\n  - roject_name: \u003cnon-empty string\u003e         # LlamaCloud project name; written to env.LLAMA_CLOUD_PROJECT_NAME\n  indices:\n    - name: \u003cnon-empty string\u003e\n      description: \u003cnon-empty string\u003e\n      top_k: \u003cpositive integer, optional\u003e\n  ```\n  - `indices` is a non-empty list.\n  - Per-index `name` values must be unique within `indices` (duplicates are an error).\n  - `top_k` is optional; when present it MUST be a positive integer.\n- The script must validate the config and on the FIRST failure print exactly one error line to stderr in the format `Error: \u003cmessage\u003e` and exit with a non-zero status code (and NOT write any output file). The exact error messages required, checked in this exact order, are:\n  - `Error: config file not found: \u003cconfig_path\u003e` - when `--config` does not exist on disk.\n  - `Error: server_name must be a non-empty string`\n  - `Error: project_name must be a non-empty string`\n  - `Error: indices must be a non-empty list`\n  - `Error: indices[\u003ci\u003e].name must be a non-empty string`\n  - `Error: indices[\u003ci\u003e].description must be a non-empty string`\n  - `Error: indices[\u003ci\u003e].top_k must be a positive integer`\n  - `Error: indices contains duplicate name: \u003cname\u003e`\n  The check order is: file existence -\u003e `server_name` -\u003e `project_name` -\u003e `indices` is non-empty list -\u003e per-entry checks in list order (`name` -\u003e `description` -\u003e `top_k`) -\u003e duplicate-name check AFTER all per-entry checks pass.\n- On success, the script must write a JSON file at `--output` with this exact top-level shape (no extra keys):\n  ```json\n  {\n    \"mcpServers\": {\n      \"\u003cserver_name\u003e\": {\n        \"command\": \"npx\",\n        \"args\": [\n          \"-y\",\n          \"@llamaindex/mcp-server-llamacloud\",\n          \"--index\", \"\u003cindex name\u003e\",\n          \"--description\", \"\u003cindex description\u003e\",\n          \"--topK\", \"\u003cint\u003e\"          // only present when top_k was set in the YAML for this index\n        ],\n        \"env\": {\n          \"LLAMA_CLOUD_PROJECT_NAME\": \"\u003cproject_name\u003e\",\n          \"LLAMA_CLOUD_API_KEY\": \"${LLAMA_CLOUD_API_KEY}\"\n        }\n      }\n    }\n  }\n  ```\n  Specifically:\n  - The `args` list MUST start with the literal entries `\"-y\"` and `\"@llamaindex/mcp-server-llamacloud\"`, in that order.\n  - After those two entries, the script MUST emit each index from the YAML in the YAML's original order. For each index, append in this order:\n    1. `\"--index\"`\n    2. the index `name`\n    3. `\"--description\"`\n    4. the index `description`\n    5. (only if the YAML provided `top_k`) `\"--topK\"` then the integer top_k value rendered as a string (e.g. `\"5\"`).\n  - The `args` value for `--topK` MUST be a string (the JSON-encoded decimal of the integer), not a JSON integer, because process arguments are strings.\n  - `env.LLAMA_CLOUD_API_KEY` MUST be the literal string `${LLAMA_CLOUD_API_KEY}` (NOT the value of the environment variable at script runtime). This makes the config portable and lets the MCP client interpolate the secret at launch time.\n  - `env.LLAMA_CLOUD_PROJECT_NAME` MUST be the project name from the YAML (no default substitution: the YAML field is required).\n  - Write the JSON with `json.dump(..., indent=2)` so the file is human-readable.\n- On success, the script must print exactly one line to stdout and exit `0`:\n  `MCP config written to \u003coutput_path\u003e: server=\u003cserver_name\u003e indices=\u003cN\u003e`\n  where `\u003coutput_path\u003e` is the absolute path passed to `--output` and `\u003cN\u003e` is the integer count of indices.\n\n## Implementation Guide\n1. The project directory `/home/user/mcp_config_builder` already exists and contains a starter YAML config at `/home/user/mcp_config_builder/configs/valid.yaml` describing two LlamaCloud indices (`10k-SEC-Tesla` and `10k-SEC-Ap f parse jobs in a YAML manifest, validate the manifest offline, and emit a JSON list of ready-to-submit Parse v2 request payloads. You must build that offline, fully self-contained CLI utility.\n\nThe utility must demonstrate that the LlamaCloud SDK is installed and importable by importing `LlamaCloud` from the `llama_cloud` package at module top level. However, it MUST NOT instantiate the client and MUST NOT make any outbound HTTP request.\n\n## Requirements\n- Implement a Python CLI script `build_requests.py` that imports, at module top level (verbatim): `from llama_cloud import LlamaCloud`. The script MUST NOT instantiate `LlamaCloud`, and MUST NOT make any network request.\n- The CLI must accept the following arguments:\n  - `--config` (required): absolute path to a YAML manifest file (schema described below).\n  - `--output` (required): absolute path of the JSON request bundle to write.\n- The YAML config has this exact schema:\n  ```yaml\n  requests:\n    - file_id: \u003cnon-empty string\u003e\n      tier: fast | cost_effective | agentic | agentic_plus\n      version: latest | YYYY-MM-DD\n      expand: [\u003callowed value\u003e, ...]   # optional; default is the empty list\n  ```\n  - `requests` is a non-empty list.\n  - `tier` must be one of exactly four lowercase strings: `fast`, `cost_effective`, `agentic`, `agentic_plus`.\n  - `version` must be either the literal string `latest` OR a date string that matches the regex `^\\d{4}-\\d{2}-\\d{2}$` (any 4-digit year, 2-digit month, 2-digit day separated by single dashes). No further calendar validation is required.\n  - `expand`, when present, must be a list of strings. Allowed values are: `text`, `markdown`, `items`, `images_content_metadata`.\n  - If `expand` is omitted, treat it as an empty list `[]` in the output.\n- The script must validate the config and on the FIRST failure print exactly one error line to stderr in the format `Error: \u003cmessage\u003e` and exit with a non-zero status code (and NOT write any output file). The exact error messages required are:\n  - `Error: config file not found: \u003cconfig_path\u003e` - when `--config` does not exist on disk.\n  - `Error: requests must be a non-empty list`\n  - `Error: requests[\u003ci\u003e].file_id must be a non-empty string`\n  - `Error: requests[\u003ci\u003e].tier must be one of: agentic, agentic_plus, cost_effective, fast`\n  - `Error: requests[\u003ci\u003e].version must be 'latest' or a date string in YYYY-MM-DD format`\n  - `Error: requests[\u003ci\u003e].expand must be a list of strings`\n  - `Error: requests[\u003ci\u003e].expand contains unsupported value '\u003cvalue\u003e'. Allowed: text, markdown, items, images_content_metadata`\n  - `Error: requests[\u003ci\u003e] uses tier 'fast' which does not support 'markdown' in expand`\n  The check order is: file existence -\u003e `requests` is non-empty list -\u003e per-entry checks in list order, and within each entry: `file_id` -\u003e `tier` -\u003e `version` -\u003e `expand` is list of strings -\u003e per-element allowed-value check -\u003e fast/markdown incompatibility check.\n- On success, the script must write a JSON file at `--output` with this exact top-level shape (no extra keys):\n  ```json\n  {\n    \"requests\": [\n      {\n        \"file_id\": \"\u003cstring\u003e\",\n        \"tier\": \"\u003cone of the four tiers\u003e\",\n        \"version\": \"\u003clatest or YYYY-MM-DD\u003e\",\n        \"expand\": [\"\u003callowed value\u003e\", ...]\n      }\n    ],\n    \"summary\": {\n      \"total\": \u003cint\u003e,\n      \"by_tier\": {\n        \"fast\": \u003cint\u003e,\n        \"cost_effective\": \u003cint\u003e,\n        \"agentic\": \u003cint\u003e,\n        \"agentic_plus\": \u003cint\u003e\n      }\n    }\n  }\n  ```\n  - The order of entries in `requests` MUST preserve the order from the YAML manifest (do NOT sort).\n  - Each entry MUST include all four fields `file_id`, `tier`, `version`, `expand` (with `expand` defaulting to `[]` when ld a local pre-flight \"parse plan\" so they can audit which files will be uploaded, compute content hashes for change detection, and verify that the SDK is wired up correctly. A common friction point with LlamaParse is forgetting to provide `extra_info={\"file_name\": ...}` when feeding raw bytes into the parser; the parser uses the extension contained in `file_name` to pick the correct parsing strategy. Building a manifest up front prevents this entire class of error.\n\nYou must build a small, fully offline Python CLI utility that uses the `llama_cloud_services.LlamaParse` SDK class to capture the parser configuration, then scans an input directory to produce a JSON parse plan. The script must NOT make any network calls.\n\n## Requirements\n- Implement a Python CLI script `parse_plan.py` that instantiates `LlamaParse` from the `llama_cloud_services` package and uses its configuration attributes to populate the output plan.\n- The CLI must accept the following arguments:\n  - `--input-dir` (required): path to a directory of source documents.\n  - `--output` (required): path to the JSON plan file to write.\n  - `--result-type` (optional, default `markdown`): forwarded to `LlamaParse(result_type=...)`. Must accept one of `markdown` or `text`.\n  - `--num-workers` (optional, integer, default `2`): forwarded to `LlamaParse(num_workers=...)`.\n  - `--language` (optional, default `en`): forwarded to `LlamaParse(language=...)`.\n- The script must instantiate the parser like this (no other arguments are needed):\n  ```python\n  parser = LlamaParse(\n      api_key=\"llx-dummy-offline-key\",\n      result_type=args.result_type,\n      num_workers=args.num_workers,\n      language=args.language,\n  )\n  ```\n  The literal `api_key=\"llx-dummy-offline-key\"` is required because no network calls are made; it merely satisfies the SDK constructor.\n- The script must enumerate files in `--input-dir` non-recursively and include only files with one of these supported extensions (case-insensitive match): `.pdf`, `.docx`, `.pptx`, `.txt`, `.md`, `.html`.\n- For each included file, the script must compute:\n  - `file_name`: the basename of the file (e.g., `notes.md`).\n  - `path`: the absolute path of the file.\n  - `size_bytes`: integer file size in bytes from the filesystem.\n  - `sha256`: lowercase hex digest of the file's full byte contents using SHA-256.\n  - `extra_info`: a dict literally equal to `{\"file_name\": \u003cbasename\u003e}` (this is the exact shape LlamaParse requires for byte-stream parsing).\n- The script must produce a JSON file at `--output` with this exact top-level shape (no extra keys):\n  ```json\n  {\n    \"parser_config\": {\n      \"result_type\": \"\u003cresolved result_type\u003e\",\n      \"num_workers\": \u003cresolved num_workers\u003e,\n      \"language\": \"\u003cresolved language\u003e\"\n    },\n    \"files\": [\n      {\n        \"file_name\": \"\u003cbasename\u003e\",\n        \"path\": \"\u003cabsolute path\u003e\",\n        \"size_bytes\": \u003cint\u003e,\n        \"sha256\": \"\u003clowercase hex digest\u003e\",\n        \"extra_info\": {\"file_name\": \"\u003cbasename\u003e\"}\n      }\n    ]\n  }\n  ```\n- The `files` array MUST be sorted alphabetically by `file_name` (case-sensitive `sorted()` order).\n- On success, the script must print exactly one line to stdout in this exact format and then exit with status `0`:\n  `Parse plan created with \u003cN\u003e files at \u003coutput_path\u003e`\n  where `\u003cN\u003e` is the integer count of files included and `\u003coutput_path\u003e` is the absolute output path as provided by `--output`.\n- If `--input-dir` does not exist or is not a directory, the script must:\n  - print the message `Error: input directory not found: \u003cinput_dir\u003e` to stderr,\n  - NOT write any output file,\n  - exit with a non-zero status code.\n- The script MUST NOT make any outbound HTTP calls.\n\n## Implementation Guide\n1. The project directory `/home/user/parse_planner` already exists and contains an `inputs/` subdirectory pre-populated with sample files. Do NOT delete or modify those files.\n2. Create the script at `/home/user/parse_planner/parse_plan.py`.\n3. Use `argparse` for argument parsing.\n4. Import the SDK class with: `from llama_cloud_services import LlamaParse`.\n5. Instantiate the parser exactly as shown in the Requirements section, then read back `parser.result_type`, `parser.num_workers`, and `parser.language` to populate the `parser_config` block. If these attributes are enum members, coerce them to their underlying string values (e.g., `getattr(parser.result_type, 'value', parser.result_type)`).\n6. Scan the input directory non-recursively with `os.listdir` (or `pathlib.Path.iterdir`), filter to the allowed extensions, compute the per-file fields, and sort by `file_name`.\n7. Write the JSON with `json.dump(..., indent=2)` so it is human-readable.\n8. Print the success line and exit `0`. For the missing-directory error, print to `sys.stderr` and `sys.exit(1)`.\n\n## Acceptance Criteria\n- Project path: /home/user/parse_planner\n- Script path: /home/user/parse_planner/parse_plan.py\n- Command (happy path): `python3 /home/user/parse_planner/parse_plan.py --input-dir /home/user/parse_planner/inputs --output /home/user/parse_planner/plan.json --result-type markdown --num-workers 3 --language en`\n  - Exit code: `0`.\n  - Stdout (exact line): `Parse plan created with 2 files at /home/user/parse_planner/plan.json`\n  - The file `/home/user/parse_planner/plan.json` exists and is valid JSON with the schema described above.\n  - `parser_config` equals `{\"result_type\": \"markdown\", \"num_workers\": 3, \"language\": \"en\"}`.\n  - `files` has exactly 2 entries, sorted by `file_name`, covering `data.txt` and `notes.md`. The unsupported `image.jpg` MUST be omitted.\n  - Each file entry has the correct `path`, on-disk `size_bytes`, lowercase hex `sha256`, and `extra_info` equal to `{\"file_name\": \u003cbasename\u003e}`.\n- base_url`.\n- After instantiation, the script must write a JSON object to the `--output` path with the following exact shape:\n  ```json\n  {\n    \"region\": \"NA\" | \"EU\",\n    \"base_url\": \"https://api.cloud.llamaindex.ai\" | \"https://api.cloud.eu.llamaindex.ai\",\n    \"client_initialized\": true\n  }\n  ```\n  The `region` field MUST be the uppercase code (`NA` or `EU`).\n- The script must print a single line to stdout in this exact format (using the resolved values):\n  `Configured LlamaCloud client for region=\u003cNA|EU\u003e base_url=\u003cresolved_url\u003e`\n- If `--region` is anything other than `na`/`eu` (case-insensitive), the script MUST exit with a non-zero status code and print an error message to stderr in this exact format: `Error: unsupported region '\u003cvalue\u003e'. Use 'na' or 'eu'.`\n- The script MUST NOT make any outbound HTTP calls. The verification environment does not validate against the real LlamaCloud servers.\n\n## Implementation Guide\n1. Create the project directory `/home/user/llamacloud_region`.\n2. Inside it, create `region_setup.py`. Use Python's `argparse` for argument parsing.\n3. Import the SDK:\n   ```python\n   from llama_cloud.client import LlamaCloud\n   ```\n4. Map the lowercase region to the proper base URL and uppercase code.\n5. Instantiate the client:\n   ```python\n   client = LlamaCloud(token=os.environ.get(\"LLAMA_CLOUD_API_KEY\", \"\"), base_url=base_url)\n   ```\n6. Write the JSON report to the `--output` path.\n7. Print the required confirmation line to stdout and exit with status `0`.\n8. For an invalid region argument, write the error to stderr and exit with status `1`.\n\n## Acceptance Criteria\n- Project path: /home/user/llamacloud_region\n- Script path: /home/user/llamacloud_region/region_setup.py\n- Command (NA): `python3 /home/user/llamacloud_region/region_setup.py --region na --output /home/user/llamacloud_region/na_report.json`\n  - Exit code: `0`\n  - Stdout must contain exactly: `Configured LlamaCloud client for region=NA base_url=https://api.cloud.llamaindex.ai`\n  - The file `/home/user/llamacloud_region/na_report.json` must exist and contain JSON with `region` set to `\"NA\"`, `base_url` set to `\"https://api.cloud.llamaindex.ai\"`, and `client_initialized` set to `true`.\n- Command (EU): `python3 /home/user/llamacloud_region/region_setup.py --region EU --output /home/user/llamacloud_region/eu_report.json`\n  - Exit code: `0`\n  - Stdout must contain exactly: `Configured LlamaCloud client for region=EU base_url=https://api.cloud.eu.llamaindex.ai`\n  - The file `/home/user/llamacloud_region/eu_report.json` must exist and contain JSON with `region` set to `\"EU\"`, `base_url` set to `\"https://api.cloud.eu.llamaindex.ai\"`, and `client_initialized` set to `true`.\n- Command (invalid): `python3 /home/user/llamacloud_region/region_setup.py --region apac --output /tmp/should_not_exist.json`\n  - Exit code: non-zero (e.g., `1`).\n  - Stderr must contain: `Error: unsupported region 'apac'. Use 'na' or 'eu'.`\n  - The output file `/tmp/should_not_exist.json` must NOT be created.\n\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"d9JATwUsZ3TcDamXbTzm5\",\"c\":[\"\",\"tasks\",\"\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"tasks\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/llamacloud-benchmark/pr-preview/pr-3/_next/static/chunks/b116ed35a74bb765.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-0\",{\"src\":\"/llamacloud-benchmark/pr-preview/pr-3/_next/static/chunks/babff0e7418ab052.js\",\"async\":true,\"nonce\":\"$undefined\"}],[\"$\",\"script\",\"script-1\",{\"src\":\"/llamacloud-benchmark/pr-preview/pr-3/_next/static/chunks/3ecbb78a8ff87549.js\",\"async\":true,\"nonce\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"en\",\"suppressHydrationW
